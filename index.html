<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>应用入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        /* ===== 登录区域 ===== */
        .login-wrap {
            width: 85%;
            max-width: 360px;
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 8px; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 36px; }
        .input-wrap { position: relative; margin-bottom: 16px; }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 14px 48px 14px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus { border-color: rgba(255,255,255,0.4); }
        .toggle-pwd {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer;
        }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        .msg { margin-top: 14px; font-size: 13px; min-height: 20px; color: #ff6b6b; }
        .msg.ok { color: #51cf66; }
        .loading { display: none; margin-top: 20px; }
        .loading.show { display: block; }
        .loading .spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 管理员面板 ===== */
        .admin-panel {
            display: none;
            width: 92%;
            max-width: 480px;
            max-height: 92vh;
            overflow: hidden;
            flex-direction: column;
        }
        .admin-panel.show { display: flex; }

        /* 顶部标题栏 */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0 14px 0;
            flex-shrink: 0;
        }
        .admin-header-left { display: flex; align-items: center; gap: 10px; }
        .admin-header h2 { font-size: 18px; font-weight: 600; }
        .total-badge {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .admin-logout {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .admin-logout:active { background: rgba(255,255,255,0.08); }

        /* 搜索框 */
        .search-wrap {
            position: relative;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 14px; color: rgba(255,255,255,0.3);
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 36px 10px 36px !important;
            border: 1px solid rgba(255,255,255,0.12) !important;
            border-radius: 10px !important;
            background: rgba(255,255,255,0.07) !important;
            color: #fff !important;
            font-size: 14px !important;
        }
        .search-input:focus { border-color: rgba(102,126,234,0.6) !important; }
        .search-clear {
            display: none;
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: rgba(255,255,255,0.3); font-size: 16px; cursor: pointer;
            line-height: 1;
        }
        .search-clear.show { display: block; }

        /* 筛选标签行通用样式 */
        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .filter-label {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            align-self: center;
            white-space: nowrap;
            margin-right: 2px;
        }
        .cat-tab {
            padding: 4px 11px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .cat-tab:active { opacity: 0.7; }
        .cat-tab.active {
            background: rgba(102,126,234,0.35);
            border-color: rgba(102,126,234,0.6);
            color: #fff;
        }
        .date-tab.active {
            background: rgba(251,191,36,0.25);
            border-color: rgba(251,191,36,0.5);
            color: #fde68a;
        }

        /* 结果统计 */
        .result-info {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        /* 项目列表 */
        .project-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .project-list::-webkit-scrollbar { width: 3px; }
        .project-list::-webkit-scrollbar-track { background: transparent; }
        .project-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .project-list li {
            padding: 11px 14px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }
        .project-list li:active { background: rgba(255,255,255,0.14); }
        .project-list li:last-child { margin-bottom: 0; }

        .proj-icon {
            font-size: 18px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }
        .proj-info { flex: 1; min-width: 0; }
        .proj-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .proj-meta {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            align-items: center;
        }
        .proj-id {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
        }
        .proj-cat {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            border: 1px solid;
        }
        .proj-arrow { color: rgba(255,255,255,0.2); font-size: 12px; flex-shrink: 0; }

        /* 无结果提示 */
        .empty-tip {
            display: none;
            text-align: center;
            padding: 32px 0;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
        }
        .empty-tip.show { display: block; }

        /* 高亮 */
        .highlight { color: #a78bfa; font-weight: 600; }

        /* 分类颜色 */
        .cat-health    { color: #f87171; border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.1); }
        .cat-env       { color: #4ade80; border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.1); }
        .cat-home      { color: #60a5fa; border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.1); }
        .cat-safety    { color: #fbbf24; border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.1); }
        .cat-education { color: #a78bfa; border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.1); }
        .cat-other     { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <!-- 登录区域 -->
    <div class="login-wrap" id="loginWrap">
        <div class="logo">🔐</div>
        <h1>应用入口</h1>
        <p class="subtitle">输入口令进入对应应用</p>
        <div class="input-wrap">
            <input type="password" id="pwd" placeholder="请输入口令" autocomplete="off">
            <button class="toggle-pwd" onclick="togglePassword()">👁</button>
        </div>
        <button class="btn" id="enterBtn" onclick="enter()">进 入</button>
        <div class="msg" id="msg"></div>
        <div class="loading" id="loading"><div class="spinner"></div></div>
    </div>

    <!-- 管理员面板 -->
    <div class="admin-panel" id="adminPanel">

        <!-- 标题栏 -->
        <div class="admin-header">
            <div class="admin-header-left">
                <h2>全部项目</h2>
                <span class="total-badge" id="totalBadge">0 个</span>
            </div>
            <button class="admin-logout" onclick="adminLogout()">退出管理</button>
        </div>

        <!-- 搜索 -->
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" type="text" id="searchInput"
                   placeholder="搜索项目名称或 ID…" oninput="onSearch(this.value)">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
        </div>

        <!-- 分类标签 -->
        <div class="filter-row" id="categoryTabs"></div>

        <!-- 日期筛选 -->
        <div class="filter-row" id="dateTabs"></div>

        <!-- 结果计数 -->
        <div class="result-info" id="resultInfo"></div>

        <!-- 项目列表 -->
        <ul class="project-list" id="projectList"></ul>

        <!-- 无结果 -->
        <div class="empty-tip" id="emptyTip">😶 没有找到匹配的项目</div>

    </div>

    <script>
        // ========== 配置 ==========
        // date 字段格式 "YYYY-MM"，新增项目时填入当月即可
        const BUILTIN_PROJECTS = [
            {"id":"001001","name":"独居老人智能监护",          "date":"2026-03"},
            {"id":"001002","name":"智能木屋环境监控系统",      "date":"2026-03"},
            {"id":"112233","name":"教师桌面助手系统",          "date":"2026-03"},
            {"id":"117365","name":"智能台灯控制系统",          "date":"2026-03"},
            {"id":"1233",  "name":"畜禽舍环境监控系统",        "date":"2026-02"},
            {"id":"123124","name":"易燃物品智能安全检测系统",  "date":"2026-03"},
            {"id":"001003","name":"水质监测系统",              "date":"2026-03"},
            {"id":"123455","name":"智能蔬菜大棚",              "date":"2026-02"},
            {"id":"123456","name":"家居物联网监控系统",        "date":"2026-03"},
            {"id":"123457","name":"智能药箱管理系统",          "date":"2026-02"},
            {"id":"134902","name":"智能药箱管理系统",          "date":"2026-03"},
            {"id":"231234","name":"智能路灯",                  "date":"2026-02"},
            {"id":"284558","name":"智能垃圾桶控制",            "date":"2026-02"},
            {"id":"312332","name":"智慧雨水利用系统",          "date":"2026-02"},
            {"id":"364875","name":"ESP32S3 控制面板",          "date":"2026-02"},
            {"id":"459821","name":"智能垃圾桶系统",            "date":"2026-03"},
            {"id":"556677","name":"独居老人智能监护",          "date":"2026-03"},
            {"id":"583921","name":"计算机实验室安全监测系统",  "date":"2026-03"},
            {"id":"665522","name":"易燃物品智能安全检测系统",  "date":"2026-03"},
            {"id":"738291","name":"智能电动窗帘控制系统",      "date":"2026-03"},
            {"id":"738292","name":"易燃物品智能安全检测系统",  "date":"2026-03"},
            {"id":"857364","name":"独居老人智能监护",          "date":"2026-03"},
            {"id":"888888","name":"多参数智能空气净化系统",    "date":"2026-03"},
            {"id":"001004","name":"豆芽生长箱智能控制系统",    "date":"2026-03"},
            {"id":"847291","name":"智能调光照明系统",          "date":"2026-03"},
            {"id":"001005","name":"婴幼儿智能监护系统",        "date":"2026-03"},
            {"id":"711111","name":"空气质量监测预警系统",      "date":"2026-03"}
        ];

        let PROJECTS = [...BUILTIN_PROJECTS];
        const BASE_URL = '';
        const ADMIN_PWD = 'admin888';

        // ========== 分类规则 ==========
        const CATEGORIES = [
            { key: 'health',    label: '健康监护', icon: '🏥', cls: 'cat-health',
              keywords: ['老人','监护','药箱','用药','健康','心率','血压'] },
            { key: 'env',       label: '环境监测', icon: '🌿', cls: 'cat-env',
              keywords: ['大棚','蔬菜','畜禽','空气','净化','温湿','气压','雨水','污水','环境'] },
            { key: 'home',      label: '智能家居', icon: '🏠', cls: 'cat-home',
              keywords: ['路灯','垃圾桶','窗帘','家居','开关','灯光','插座'] },
            { key: 'safety',    label: '安全检测', icon: '🔥', cls: 'cat-safety',
              keywords: ['易燃','安全','烟雾','火焰','报警','危险','消防'] },
            { key: 'education', label: '教育管理', icon: '📚', cls: 'cat-education',
              keywords: ['教师','桌面','助手','课程','班级','学生','校园'] },
        ];

        function getCategory(name) {
            for (const cat of CATEGORIES) {
                if (cat.keywords.some(kw => name.includes(kw))) return cat;
            }
            return { key: 'other', label: '其他', icon: '📦', cls: 'cat-other' };
        }

        // ========== 加载项目 ==========
        async function loadProjects() {
            try {
                const res = await fetch('projects.json');
                if (res.ok) {
                    const data = await res.json();
                    if (data.length > 0 && typeof data[0] === 'string') {
                        PROJECTS = data.map(id => {
                            const found = BUILTIN_PROJECTS.find(p => p.id === id);
                            return found || { id, name: id };
                        });
                    } else {
                        PROJECTS = data;
                    }
                }
            } catch (e) { /* 使用内置列表 */ }
            autoLogin();
        }
        loadProjects();

        // ========== 自动登录 ==========
        function autoLogin() {
            if (localStorage.getItem('admin_token') === 'admin888') {
                showMsg('管理员模式', true);
                showAdminPanel();
                return;
            }
            const saved = localStorage.getItem('app_token');
            if (!saved) return;
            const matched = PROJECTS.find(p => p.id.toLowerCase() === saved.toLowerCase());
            if (matched) goToProject(matched.id);
            else localStorage.removeItem('app_token');
        }

        // ========== 跳转 ==========
        function goToProject(id) {
            showMsg('验证成功，正在跳转...', true);
            document.getElementById('loading').classList.add('show');
            document.getElementById('enterBtn').disabled = true;
            setTimeout(() => {
                const url = BASE_URL ? `${BASE_URL}/projects/${id}/index.html` : `projects/${id}/index.html`;
                window.location.href = url;
            }, 300);
        }

        // ========== 登录逻辑 ==========
        function enter() {
            const pwd = document.getElementById('pwd').value.trim().toLowerCase();
            if (!pwd) { showMsg('请输入口令', false); return; }
            if (pwd === ADMIN_PWD.toLowerCase()) {
                showMsg('管理员模式', true);
                localStorage.setItem('admin_token', 'admin888');
                showAdminPanel();
                return;
            }
            const matched = PROJECTS.find(p => p.id.toLowerCase() === pwd);
            if (matched) {
                localStorage.setItem('app_token', matched.id);
                goToProject(matched.id);
            } else {
                showMsg('口令错误，请重试', false);
                document.getElementById('pwd').value = '';
                document.getElementById('pwd').focus();
            }
        }

        function showMsg(text, ok) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg' + (ok ? ' ok' : '');
        }

        function togglePassword() {
            const input = document.getElementById('pwd');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });

        // ========== 管理员面板 ==========
        let currentCat  = 'all';
        let currentDate = 'all';
        let currentKeyword = '';

        function showAdminPanel() {
            document.getElementById('loginWrap').style.display = 'none';
            const panel = document.getElementById('adminPanel');
            panel.classList.add('show');
            document.getElementById('totalBadge').textContent = PROJECTS.length + ' 个';
            buildCategoryTabs();
            buildDateTabs();
            renderList();
        }

        function buildCategoryTabs() {
            const counts = {};
            PROJECTS.forEach(p => {
                const cat = getCategory(p.name);
                counts[cat.key] = (counts[cat.key] || 0) + 1;
            });

            const tabs = document.getElementById('categoryTabs');
            tabs.innerHTML = '<span class="filter-label">分类</span>';

            const allTab = document.createElement('button');
            allTab.className = 'cat-tab active';
            allTab.dataset.cat = 'all';
            allTab.textContent = `全部`;
            allTab.onclick = () => switchCat('all');
            tabs.appendChild(allTab);

            [...CATEGORIES, { key: 'other', label: '其他', icon: '📦' }].forEach(cat => {
                if (!counts[cat.key]) return;
                const btn = document.createElement('button');
                btn.className = 'cat-tab';
                btn.dataset.cat = cat.key;
                btn.textContent = `${cat.icon} ${cat.label} ${counts[cat.key]}`;
                btn.onclick = () => switchCat(cat.key);
                tabs.appendChild(btn);
            });
        }

        function buildDateTabs() {
            // 收集所有月份（去重、倒序）
            const monthSet = new Set();
            PROJECTS.forEach(p => { if (p.date) monthSet.add(p.date); });
            const months = [...monthSet].sort().reverse();  // 最新在前

            const tabs = document.getElementById('dateTabs');
            tabs.innerHTML = '<span class="filter-label">月份</span>';

            const allBtn = document.createElement('button');
            allBtn.className = 'cat-tab date-tab active';
            allBtn.dataset.date = 'all';
            allBtn.textContent = '全部';
            allBtn.onclick = () => switchDate('all');
            tabs.appendChild(allBtn);

            months.forEach(m => {
                const [y, mo] = m.split('-');
                const label = `${y}年${parseInt(mo)}月`;
                const cnt = PROJECTS.filter(p => p.date === m).length;
                const btn = document.createElement('button');
                btn.className = 'cat-tab date-tab';
                btn.dataset.date = m;
                btn.textContent = `${label} ${cnt}`;
                btn.onclick = () => switchDate(m);
                tabs.appendChild(btn);
            });
        }

        function switchCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-tab:not(.date-tab)').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
            renderList();
        }

        function switchDate(date) {
            currentDate = date;
            document.querySelectorAll('.date-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.date === date);
            });
            renderList();
        }

        function onSearch(val) {
            currentKeyword = val.trim();
            document.getElementById('searchClear').classList.toggle('show', currentKeyword.length > 0);
            renderList();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            onSearch('');
            document.getElementById('searchInput').focus();
        }

        function renderList() {
            const kw = currentKeyword.toLowerCase();

            let filtered = PROJECTS.filter(p => {
                if (currentCat !== 'all') {
                    const cat = getCategory(p.name);
                    if (cat.key !== currentCat) return false;
                }
                if (currentDate !== 'all') {
                    if ((p.date || '') !== currentDate) return false;
                }
                if (kw) {
                    return p.name.toLowerCase().includes(kw) || p.id.toLowerCase().includes(kw);
                }
                return true;
            });

            const list = document.getElementById('projectList');
            const empty = document.getElementById('emptyTip');
            const info  = document.getElementById('resultInfo');

            list.innerHTML = '';

            if (filtered.length === 0) {
                empty.classList.add('show');
                info.textContent = '';
                return;
            }
            empty.classList.remove('show');

            if (kw || currentCat !== 'all') {
                info.textContent = `找到 ${filtered.length} 个项目`;
            } else {
                info.textContent = '';
            }

            filtered.forEach(p => {
                const cat = getCategory(p.name);
                const li = document.createElement('li');

                // 高亮关键词
                let displayName = escapeHtml(p.name);
                if (kw) {
                    const re = new RegExp(escapeRegex(kw), 'gi');
                    displayName = displayName.replace(re, m => `<span class="highlight">${m}</span>`);
                }

                li.innerHTML = `
                    <span class="proj-icon">${cat.icon}</span>
                    <div class="proj-info">
                        <div class="proj-name">${displayName}</div>
                        <div class="proj-meta">
                            <span class="proj-id">${p.id}</span>
                            <span class="proj-cat ${cat.cls}">${cat.label}</span>
                        </div>
                    </div>
                    <span class="proj-arrow">›</span>
                `;
                li.onclick = () => goToProject(p.id);
                list.appendChild(li);
            });
        }

        function adminLogout() {
            localStorage.removeItem('admin_token');
            document.getElementById('loginWrap').style.display = '';
            document.getElementById('adminPanel').classList.remove('show');
            document.getElementById('msg').textContent = '';
            document.getElementById('pwd').value = '';
            // 重置筛选状态
            currentCat     = 'all';
            currentDate    = 'all';
            currentKeyword = '';
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>
</html>
