<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多功能农业补光系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 24px;
        }
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        /* ===== 顶栏 ===== */
        .topbar {
            padding: 44px 16px 10px;
            background: var(--card);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .topbar h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .conn-status {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 13px; color: var(--sub);
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--alarm);
        }
        .status-dot.connected { background: var(--ok); }

        /* ===== 卡片 ===== */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin: 12px;
            padding: 16px;
        }
        .card-title {
            font-size: 14px; font-weight: 600; color: var(--sub);
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
        }

        /* ===== 实时数据 ===== */
        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { font-size: 13px; color: var(--sub); }
        .data-value { font-size: 28px; font-weight: bold; }
        .data-unit { font-size: 13px; color: var(--sub); margin-left: 2px; }
        .data-alarm { color: var(--alarm); }

        /* ===== 报警 ===== */
        .alarm-normal {
            text-align: center; color: var(--ok); font-size: 15px;
            padding: 12px; background: #E8F5E9; border-radius: 8px;
        }
        .alarm-item {
            background: #FFEBEE; color: var(--alarm); padding: 10px 14px;
            border-radius: 8px; margin-bottom: 8px; font-size: 14px; font-weight: 500;
        }
        .alarm-item:last-child { margin-bottom: 0; }
        .btn-dismiss {
            margin-top: 10px; width: 100%; padding: 12px;
            background: var(--alarm); color: #fff; border: none;
            border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        .btn-dismiss:active { opacity: 0.8; }

        /* ===== 控制按钮 ===== */
        .mode-display {
            text-align: center; padding: 10px; background: #E3F2FD;
            border-radius: 8px; margin-bottom: 12px; font-size: 14px; color: var(--primary);
        }
        .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ctrl-btn {
            padding: 14px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            color: #fff; min-height: 48px;
        }
        .ctrl-btn:active { opacity: 0.8; }
        .ctrl-btn:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--ok); }
        .btn-red { background: var(--alarm); }
        .btn-orange { background: #FF9800; }

        /* ===== 阈值 ===== */
        .thr-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .thr-row:last-child { border-bottom: none; }
        .thr-label { font-size: 14px; color: var(--sub); }
        .thr-value { font-size: 18px; font-weight: 600; }
        .thr-set-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .thr-set-row:last-child { border-bottom: none; }
        .thr-set-label { font-size: 14px; color: var(--sub); flex: 1; }
        .thr-set-input {
            width: 80px; padding: 8px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; text-align: center;
        }
        .thr-set-btn {
            padding: 8px 16px; background: var(--primary); color: #fff;
            border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
            min-height: 40px;
        }
        .thr-set-btn:active { opacity: 0.8; }

        /* ===== 日志 ===== */
        .log-header {
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
        }
        .log-toggle { font-size: 18px; transition: transform 0.2s; }
        .log-toggle.open { transform: rotate(180deg); }
        .log-body {
            max-height: 0; overflow: hidden; transition: max-height 0.3s;
            font-size: 12px; color: var(--sub); margin-top: 8px;
        }
        .log-body.open { max-height: 300px; overflow-y: auto; }
        .log-entry { padding: 4px 0; border-bottom: 1px dashed #eee; }
        .log-send { color: var(--primary); }

        /* ===== LED状态 ===== */
        .led-on { color: var(--ok); }
        .led-off { color: var(--sub); }
    </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
    <h1>多功能农业补光系统</h1>
    <div class="conn-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">未连接</span>
    </div>
</div>

<!-- 实时数据 -->
<div class="card">
    <div class="card-title">实时数据</div>
    <div class="data-row">
        <span class="data-label">光照 (ADC)</span>
        <span><span class="data-value" id="LIGHT">--</span><span class="data-unit"></span></span>
    </div>
    <div class="data-row">
        <span class="data-label">温度</span>
        <span><span class="data-value" id="TEMP">--</span><span class="data-unit"> °C</span></span>
    </div>
    <div class="data-row">
        <span class="data-label">湿度</span>
        <span><span class="data-value" id="HUMI">--</span><span class="data-unit"> %</span></span>
    </div>
    <div class="data-row">
        <span class="data-label">补光灯</span>
        <span><span class="data-value" id="LED_STATE">--</span><span class="data-unit"></span></span>
    </div>
    <div class="data-row">
        <span class="data-label">模式</span>
        <span><span class="data-value" id="SYSTEM_MODE" style="font-size:18px">--</span><span class="data-unit"></span></span>
    </div>
</div>

<!-- 报警状态 -->
<div class="card" id="alarmCard">
    <div class="card-title">报警状态</div>
    <div id="alarmBody">
        <div class="alarm-normal">运行正常 ✓</div>
    </div>
</div>

<!-- 控制卡 -->
<div class="card">
    <div class="card-title">系统控制</div>
    <div class="mode-display" id="modeDisplay">当前模式：--</div>
    <div class="ctrl-grid">
        <button class="ctrl-btn btn-blue" id="btnAuto" onclick="sendCmd('04')">自动模式</button>
        <button class="ctrl-btn btn-orange" id="btnManual" onclick="sendCmd('05')">手动模式</button>
        <button class="ctrl-btn btn-green" id="btnLedOn" onclick="sendCmd('06')" disabled>打开补光灯</button>
        <button class="ctrl-btn btn-red" id="btnLedOff" onclick="sendCmd('07')" disabled>关闭补光灯</button>
    </div>
</div>

<!-- 阈值显示卡 -->
<div class="card">
    <div class="card-title">当前阈值</div>
    <div class="thr-row">
        <span class="thr-label">光照下限 LIGHTL</span>
        <span class="thr-value" id="LIGHTL_display">--</span>
    </div>
    <div class="thr-row">
        <span class="thr-label">温度上限 TEMPH</span>
        <span class="thr-value" id="TEMPH_display">-- °C</span>
    </div>
</div>

<!-- 阈值设置卡 -->
<div class="card">
    <div class="card-title">阈值设置</div>
    <div class="thr-set-row">
        <span class="thr-set-label">光照上限 (0-4095)</span>
        <input class="thr-set-input" type="number" id="LIGHTL_input" min="0" max="4095" placeholder="值">
        <button class="thr-set-btn" onclick="setThreshold('LIGHT', '02', 0, 4095)">发送</button>
    </div>
    <div class="thr-set-row">
        <span class="thr-set-label">温度上限 (20-50)</span>
        <input class="thr-set-input" type="number" id="TEMPH_input" min="20" max="50" placeholder="值">
        <button class="thr-set-btn" onclick="setThreshold('TEMP', '03', 20, 50)">发送</button>
    </div>
</div>

<!-- 日志卡（折叠） -->
<div class="card">
    <div class="log-header" onclick="toggleLog()">
        <span class="card-title" style="margin:0">通信日志</span>
        <span class="log-toggle" id="logToggle">&#9660;</span>
    </div>
    <div class="log-body" id="logBody"></div>
</div>

<script>
// ==================== MQTT 配置 ====================
const UPLOAD_TOPIC = '753284/291067/nongyebuguang/upload';
const CMD_TOPIC    = '753284/291067/nongyebuguang/cmd';

const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
    clientId: 'web_' + Math.random().toString(36).substr(2, 6),
    reconnectPeriod: 3000
});

// ==================== 数据与状态 ====================
let currentData = {
    LIGHT: null, TEMP: null, HUMI: null,
    LED_STATE: null, SYSTEM_MODE: null, ALARM_STATE: null,
    LIGHTL: null, TEMPH: null
};

// 同步保护状态
let waitingSync = { LIGHT: false, TEMP: false };
let pendingValue = { LIGHT: null, TEMP: null };
let syncTimeoutTimer = { LIGHT: null, TEMP: null };

let lastUserSetTime = { LIGHTL: 0, TEMPH: 0 };
const DEBOUNCE_MS = 500;
const SYNC_TIMEOUT_MS = 5000;

// ==================== MQTT 事件 ====================
client.on('connect', () => {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = '已连接';
    client.subscribe(UPLOAD_TOPIC);
    addLog('MQTT 已连接');
});

client.on('close', () => {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = '未连接';
});

client.on('error', (err) => {
    console.error('MQTT error:', err);
});

client.on('message', (topic, payload) => {
    parseMessage(payload.toString());
});

// ==================== 消息解析 ====================
function parseMessage(message) {
    const parts = message.split(',');
    if (parts.length < 8) return;

    const newData = {
        LIGHT: parseFloat(parts[0]),
        TEMP: parseFloat(parts[1]),
        HUMI: parseFloat(parts[2]),
        LED_STATE: parts[3],
        SYSTEM_MODE: parts[4],
        ALARM_STATE: parts[5],
        LIGHTL: parseInt(parts[6]),
        TEMPH: parseInt(parts[7])
    };

    // 传感器值始终更新
    currentData.LIGHT = newData.LIGHT;
    currentData.TEMP = newData.TEMP;
    currentData.HUMI = newData.HUMI;
    currentData.LED_STATE = newData.LED_STATE;
    currentData.SYSTEM_MODE = newData.SYSTEM_MODE;
    currentData.ALARM_STATE = newData.ALARM_STATE;

    // 检查是否有正在等待同步的阈值
    let hasPendingSync = false;
    for (const [key, isWaiting] of Object.entries(waitingSync)) {
        if (isWaiting) {
            hasPendingSync = true;
            const expectedValue = pendingValue[key];
            const threshKey = key === 'LIGHT' ? 'LIGHTL' : 'TEMPH';
            const receivedValue = newData[threshKey];

            if (expectedValue !== null && Math.abs(receivedValue - expectedValue) < 0.5) {
                console.log(`Sync confirmed for ${key}: ${receivedValue}`);
                if (syncTimeoutTimer[key]) {
                    clearTimeout(syncTimeoutTimer[key]);
                    syncTimeoutTimer[key] = null;
                }
                waitingSync[key] = false;
                pendingValue[key] = null;
                lastUserSetTime[threshKey] = 0;
            }
        }
    }

    // 阈值更新逻辑（三重保护）
    const now = Date.now();
    if (!lastUserSetTime.LIGHTL || (now - lastUserSetTime.LIGHTL) >= DEBOUNCE_MS) {
        if (!waitingSync.LIGHT) {
            currentData.LIGHTL = newData.LIGHTL;
        }
    }
    if (!lastUserSetTime.TEMPH || (now - lastUserSetTime.TEMPH) >= DEBOUNCE_MS) {
        if (!waitingSync.TEMP) {
            currentData.TEMPH = newData.TEMPH;
        }
    }

    updateUI();

    if (hasPendingSync) {
        checkAlarmsWithPending();
    } else {
        checkAlarms();
    }

    addLog(message);
}

// ==================== UI 更新 ====================
function updateUI() {
    // 光照
    if (currentData.LIGHT !== null) {
        const el = document.getElementById('LIGHT');
        el.textContent = currentData.LIGHT;
        if (currentData.LIGHT !== null && currentData.LIGHTL !== null && currentData.LIGHT < currentData.LIGHTL) {
            el.classList.add('data-alarm');
        } else {
            el.classList.remove('data-alarm');
        }
    }

    // 温度
    if (currentData.TEMP !== null) {
        const el = document.getElementById('TEMP');
        el.textContent = currentData.TEMP.toFixed(1);
        if (currentData.TEMP !== null && currentData.TEMPH !== null && currentData.TEMP > currentData.TEMPH) {
            el.classList.add('data-alarm');
        } else {
            el.classList.remove('data-alarm');
        }
    }

    // 湿度
    if (currentData.HUMI !== null) {
        document.getElementById('HUMI').textContent = currentData.HUMI.toFixed(1);
    }

    // LED状态
    if (currentData.LED_STATE !== null) {
        const el = document.getElementById('LED_STATE');
        el.textContent = currentData.LED_STATE === '1' ? 'ON' : 'OFF';
        el.className = 'data-value ' + (currentData.LED_STATE === '1' ? 'led-on' : 'led-off');
    }

    // 模式
    if (currentData.SYSTEM_MODE) {
        document.getElementById('SYSTEM_MODE').textContent = currentData.SYSTEM_MODE;
        document.getElementById('modeDisplay').textContent = '当前模式：' + currentData.SYSTEM_MODE;
        updateModeButtons();
    }

    // 阈值显示（等待期间显示预测值）
    if (currentData.LIGHTL !== null) {
        document.getElementById('LIGHTL_display').textContent =
            waitingSync.LIGHT ? pendingValue.LIGHT : currentData.LIGHTL;
    }
    if (currentData.TEMPH !== null) {
        document.getElementById('TEMPH_display').textContent =
            waitingSync.TEMP ? pendingValue.TEMP : currentData.TEMPH + ' °C';
    }
}

function updateModeButtons() {
    const isManual = currentData.SYSTEM_MODE === 'MANUAL';
    document.getElementById('btnLedOn').disabled = !isManual;
    document.getElementById('btnLedOff').disabled = !isManual;
}

// ==================== 报警判断 ====================
function checkAlarms() {
    const alarms = [];

    if (currentData.LIGHT !== null && currentData.LIGHTL !== null && currentData.LIGHT < currentData.LIGHTL) {
        alarms.push('光照不足！当前 ' + currentData.LIGHT + ' < 下限 ' + currentData.LIGHTL);
    }
    if (currentData.TEMP !== null && currentData.TEMPH !== null && currentData.TEMP > currentData.TEMPH) {
        alarms.push('高温预警！当前 ' + currentData.TEMP.toFixed(1) + '°C > 上限 ' + currentData.TEMPH + '°C');
    }

    renderAlarms(alarms);
    if (alarms.length > 0) {
        sendAlarmToNative({ alarms: alarms.join('; ') });
    }
}

function checkAlarmsWithPending() {
    const alarms = [];

    const lightL = waitingSync.LIGHT ? pendingValue.LIGHT : currentData.LIGHTL;
    const tempH = waitingSync.TEMP ? pendingValue.TEMP : currentData.TEMPH;

    if (currentData.LIGHT !== null && lightL !== null && currentData.LIGHT < lightL) {
        alarms.push('光照不足！当前 ' + currentData.LIGHT + ' < 下限 ' + lightL);
    }
    if (currentData.TEMP !== null && tempH !== null && currentData.TEMP > tempH) {
        alarms.push('高温预警！当前 ' + currentData.TEMP.toFixed(1) + '°C > 上限 ' + tempH + '°C');
    }

    renderAlarms(alarms);
    if (alarms.length > 0) {
        sendAlarmToNative({ alarms: alarms.join('; ') });
    }
}

function renderAlarms(alarms) {
    const body = document.getElementById('alarmBody');
    if (alarms.length === 0) {
        body.innerHTML = '<div class="alarm-normal">运行正常 ✓</div>';
    } else {
        body.innerHTML = alarms.map(a => '<div class="alarm-item">' + a + '</div>').join('') +
            '<button class="btn-dismiss" onclick="sendCmd(\'01\')">消警</button>';
    }
}

function sendAlarmToNative(data) {
    if (window.Android && window.Android.onAlarm) {
        window.Android.onAlarm(JSON.stringify(data));
    } else if (window.Notification && Notification.permission === 'granted') {
        new Notification('补光系统告警', { body: data.alarms || JSON.stringify(data) });
    }
}

// ==================== 发送指令 ====================
function sendCmd(cmd) {
    if (client.connected) {
        client.publish(CMD_TOPIC, cmd);
        addLog('→ ' + cmd, true);
    }
}

// ==================== 阈值设置 ====================
function setThreshold(type, cmdCode, minVal, maxVal) {
    const inputId = type === 'LIGHT' ? 'LIGHTL_input' : 'TEMPH_input';
    const value = document.getElementById(inputId).value;

    if (!value || value === '') {
        alert('请输入阈值');
        return;
    }

    const numValue = parseFloat(value);
    if (isNaN(numValue)) {
        alert('请输入有效数字');
        return;
    }

    if (numValue < minVal || numValue > maxVal) {
        alert('阈值范围：' + minVal + ' - ' + maxVal);
        return;
    }

    if (waitingSync[type]) {
        console.log(`Already waiting sync for ${type}`);
        return;
    }

    // 1. 设置等待同步状态
    waitingSync[type] = true;
    pendingValue[type] = numValue;

    // 2. 发送指令
    sendCmd(cmdCode + ',' + numValue);

    // 3. 记录用户操作时间（防抖）
    const threshKey = type === 'LIGHT' ? 'LIGHTL' : 'TEMPH';
    lastUserSetTime[threshKey] = Date.now();

    // 4. 立即更新显示（预测状态）
    currentData[threshKey] = numValue;
    updateUI();

    // 5. 立即检查报警（即时反馈）
    checkAlarmsWithPending();

    // 6. 设置超时保护
    syncTimeoutTimer[type] = setTimeout(() => {
        if (waitingSync[type]) {
            console.warn(`Sync timeout for ${type}, releasing protection`);
            waitingSync[type] = false;
            pendingValue[type] = null;
            syncTimeoutTimer[type] = null;
        }
    }, SYNC_TIMEOUT_MS);

    document.getElementById(inputId).blur();
}

// ==================== 日志 ====================
let logOpen = false;
let logEntries = [];

function addLog(msg, isSend) {
    const now = new Date();
    const ts = now.toLocaleTimeString();
    logEntries.unshift({ ts, msg, isSend });
    if (logEntries.length > 20) logEntries.pop();
    renderLog();
}

function renderLog() {
    const body = document.getElementById('logBody');
    body.innerHTML = logEntries.map(e =>
        '<div class="log-entry' + (e.isSend ? ' log-send' : '') + '">[' + e.ts + '] ' + e.msg + '</div>'
    ).join('');
}

function toggleLog() {
    logOpen = !logOpen;
    document.getElementById('logBody').classList.toggle('open', logOpen);
    document.getElementById('logToggle').classList.toggle('open', logOpen);
}
</script>
</body>
</html>
