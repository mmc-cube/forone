<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>婴儿车环境监测与安全看护系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
        }
        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .status-dot.connected { background: var(--ok); }
        .status-dot.disconnected { background: var(--alarm); }
        .mode-badge {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-auto { background: #E3F2FD; color: #1565C0; }
        .mode-manual { background: #FFF3E0; color: #E65100; }
        /* 实时数据卡 */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-unit {
            font-size: 13px;
            color: var(--sub);
            margin-left: 4px;
        }
        .alarm-mark {
            color: var(--alarm);
            font-weight: bold;
            font-size: 28px;
        }
        .data-row.alarm-row .data-value,
        .data-row.alarm-row .alarm-mark {
            color: var(--alarm);
        }
        /* 报警状态卡 */
        .alarm-card {
            padding: 12px;
            border-radius: 8px;
        }
        .alarm-ok {
            background: #E8F5E9;
            color: var(--ok);
            text-align: center;
            font-weight: bold;
        }
        .alarm-list { background: #FFEBEE; }
        .alarm-item {
            color: var(--alarm);
            padding: 8px 0;
            font-weight: bold;
        }
        /* 控制卡 */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .ctrl-btn {
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:active { transform: scale(0.98); }
        .ctrl-btn.mute-btn {
            background: #FF9800;
            color: white;
            grid-column: span 2;
        }
        .ctrl-btn.fan-btn { background: var(--primary); color: white; }
        .ctrl-btn.fan-btn.on-active { background: var(--ok); }
        .ctrl-btn.mode-btn { background: var(--primary); color: white; }
        .ctrl-btn.mode-btn.manual-active { background: #FF9800; }
        .ctrl-btn.disabled {
            background: #E0E0E0;
            color: #9E9E9E;
            cursor: not-allowed;
        }
        /* 阈值设置卡 */
        .threshold-set-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .threshold-set-row:last-child { border-bottom: none; }
        .threshold-set-label {
            font-size: 13px;
            color: var(--sub);
            flex: 1;
        }
        .threshold-input {
            width: 80px;
            height: 36px;
            border: 1px solid #E0E0E0;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            margin-right: 8px;
        }
        .threshold-send-btn {
            width: 60px;
            height: 36px;
            border: none;
            border-radius: 4px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        /* 日志卡 */
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .log-toggle {
            font-size: 12px;
            color: var(--primary);
        }
        .log-content {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
            font-size: 12px;
            color: var(--sub);
            background: #F5F5F5;
            border-radius: 8px;
            padding: 8px;
            display: none;
        }
        .log-content.expanded { display: block; }
        .log-item {
            padding: 4px 0;
            border-bottom: 1px dashed #E0E0E0;
        }
        .log-item:last-child { border-bottom: none; }
        /* 当前阈值显示 */
        .threshold-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .thr-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }
        .thr-label { color: var(--sub); }
        .thr-value { font-weight: bold; }
    </style>
</head>
<body>

<!-- 状态栏 -->
<div class="card">
    <div class="status-bar">
        <div class="status-item">
            <span class="status-dot disconnected" id="mqtt-dot"></span>
            <span id="mqtt-status">未连接</span>
        </div>
        <div class="status-item">
            <span id="last-update">--:--:--</span>
        </div>
        <div class="status-item">
            <span class="mode-badge mode-auto" id="mode-badge">AUTO</span>
        </div>
    </div>
</div>

<!-- 实时数据卡 -->
<div class="card">
    <div class="card-title">实时监测数据</div>
    <div class="data-row" id="row-pm25">
        <span class="data-label">PM2.5</span>
        <span><span class="data-value" id="pm25">--</span><span class="data-unit">μg/m³</span><span class="alarm-mark" id="pm25-alarm"></span></span>
    </div>
    <div class="data-row" id="row-tvoc">
        <span class="data-label">TVOC</span>
        <span><span class="data-value" id="tvoc">--</span><span class="data-unit">mg/m³</span><span class="alarm-mark" id="tvoc-alarm"></span></span>
    </div>
    <div class="data-row" id="row-ch2o">
        <span class="data-label">CH₂O（甲醛）</span>
        <span><span class="data-value" id="ch2o">--</span><span class="data-unit">mg/m³</span></span>
    </div>
    <div class="data-row" id="row-co2">
        <span class="data-label">CO₂</span>
        <span><span class="data-value" id="co2">--</span><span class="data-unit">ppm</span></span>
    </div>
    <div class="data-row" id="row-uv">
        <span class="data-label">UV指数</span>
        <span><span class="data-value" id="uv">--</span><span class="alarm-mark" id="uv-alarm"></span></span>
    </div>
    <div class="data-row" id="row-temp">
        <span class="data-label">温度</span>
        <span><span class="data-value" id="temp">--</span><span class="data-unit">°C</span><span class="alarm-mark" id="temp-alarm"></span></span>
    </div>
    <div class="data-row">
        <span class="data-label">加速度 (X/Y/Z)</span>
        <span><span class="data-value" id="acc" style="font-size:18px">-- / -- / --</span><span class="data-unit">g</span></span>
    </div>
    <div class="data-row" id="row-fall">
        <span class="data-label">跌倒/异常移动</span>
        <span><span class="data-value" id="fall" style="font-size:20px">--</span><span class="alarm-mark" id="fall-alarm"></span></span>
    </div>
    <div class="data-row">
        <span class="data-label">风扇</span>
        <span><span class="data-value" id="fan-sta" style="font-size:20px">--</span></span>
    </div>
</div>

<!-- 报警状态卡 -->
<div class="card">
    <div class="card-title">报警状态</div>
    <div class="alarm-card alarm-ok" id="alarm-box">
        <span id="alarm-text">运行正常 ✓</span>
    </div>
</div>

<!-- 控制卡 -->
<div class="card">
    <div class="card-title">远程控制 <span id="ctrl-hint" style="color:#FF9800;font-size:12px;"></span></div>
    <div class="control-grid">
        <button class="ctrl-btn mute-btn" onclick="sendCmd('ALARM_MUTE')">消警</button>
        <button class="ctrl-btn fan-btn disabled" id="fan-on-btn" onclick="sendCmd('FAN_ON')">风扇开</button>
        <button class="ctrl-btn fan-btn disabled" id="fan-off-btn" onclick="sendCmd('FAN_OFF')">风扇关</button>
        <button class="ctrl-btn mode-btn" id="mode-btn" onclick="sendCmd('TOGGLE_MODE')">切换为MANUAL</button>
    </div>
</div>

<!-- 当前阈值显示（下位机上报） -->
<div class="card">
    <div class="card-title">当前阈值（下位机上报）</div>
    <div class="threshold-display">
        <div class="thr-item"><span class="thr-label">PM2.5</span><span class="thr-value" id="thr-pm25">-- μg/m³</span></div>
        <div class="thr-item"><span class="thr-label">TVOC</span><span class="thr-value" id="thr-tvoc">-- mg/m³</span></div>
        <div class="thr-item"><span class="thr-label">UV</span><span class="thr-value" id="thr-uv">--</span></div>
        <div class="thr-item"><span class="thr-label">温度</span><span class="thr-value" id="thr-temp">-- °C</span></div>
    </div>
</div>

<!-- 阈值设置卡 -->
<div class="card">
    <div class="card-title">阈值设置</div>
    <div class="threshold-set-row">
        <span class="threshold-set-label">PM2.5上限 (μg/m³)</span>
        <input class="threshold-input" type="number" id="input-pm25" placeholder="2000">
        <button class="threshold-send-btn" onclick="setThreshold('pm25','SET_PM25H')">发送</button>
    </div>
    <div class="threshold-set-row">
        <span class="threshold-set-label">TVOC上限 (mg/m³)</span>
        <input class="threshold-input" type="number" id="input-tvoc" placeholder="200" step="0.01">
        <button class="threshold-send-btn" onclick="setThreshold('tvoc','SET_VOCH')">发送</button>
    </div>
    <div class="threshold-set-row">
        <span class="threshold-set-label">UV上限</span>
        <input class="threshold-input" type="number" id="input-uv" placeholder="8" step="0.1">
        <button class="threshold-send-btn" onclick="setThreshold('uv','SET_UVH')">发送</button>
    </div>
    <div class="threshold-set-row">
        <span class="threshold-set-label">温度上限 (°C)</span>
        <input class="threshold-input" type="number" id="input-temp" placeholder="30" step="0.1">
        <button class="threshold-send-btn" onclick="setThreshold('temp','SET_TEMPH')">发送</button>
    </div>
</div>

<!-- 日志卡 -->
<div class="card">
    <div class="card-title log-header" onclick="toggleLog()">
        <span>通信日志</span>
        <span class="log-toggle" id="log-toggle">展开 ▼</span>
    </div>
    <div class="log-content" id="log-content"></div>
</div>

<script>
// ==================== MQTT 配置 ====================
const UPLOAD_TOPIC = '847293/516082/yingerche/upload';
const CMD_TOPIC    = '847293/516082/yingerche/cmd';

// ==================== 数据状态 ====================
let currentData = {
    pm25: null, tvoc: null, ch2o: null, co2: null,
    uv: null, temp: null,
    acc_x: null, acc_y: null, acc_z: null,
    fall: null, fan_sta: null, system_mode: 'AUTO',
    pm25h: null, voch: null, uvh: null, temph: null
};

// ==================== 同步保护（三步状态机） ====================
let waitingSync = { pm25: false, tvoc: false, uv: false, temp: false };
let pendingValue = { pm25: null, tvoc: null, uv: null, temp: null };
let syncTimeoutTimer = { pm25: null, tvoc: null, uv: null, temp: null };
let lastUserSetTime = { pm25: 0, tvoc: 0, uv: 0, temp: 0 };

const DEBOUNCE_MS = 500;
const SYNC_TIMEOUT_MS = 5000;

// ==================== 日志 ====================
let logs = [];
const MAX_LOGS = 20;

function addLog(msg) {
    const time = new Date().toLocaleTimeString();
    logs.unshift(`[${time}] ${msg}`);
    if (logs.length > MAX_LOGS) logs.pop();
    renderLogs();
}

function renderLogs() {
    const el = document.getElementById('log-content');
    el.innerHTML = logs.map(l => `<div class="log-item">${l}</div>`).join('');
}

function toggleLog() {
    const el = document.getElementById('log-content');
    const toggle = document.getElementById('log-toggle');
    if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        toggle.textContent = '展开 ▼';
    } else {
        el.classList.add('expanded');
        toggle.textContent = '收起 ▲';
    }
}

// ==================== MQTT 连接 ====================
let client = null;
let isConnected = false;

function connectMQTT() {
    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
        clientId: 'web_' + Math.random().toString(36).substr(2, 6),
        reconnectPeriod: 3000
    });

    client.on('connect', () => {
        isConnected = true;
        updateConnectionStatus(true);
        client.subscribe(UPLOAD_TOPIC);
        addLog('MQTT 已连接');
    });

    client.on('message', (topic, payload) => {
        const msg = payload.toString();
        addLog('RX: ' + msg);
        parseMessage(msg);
    });

    client.on('close', () => {
        isConnected = false;
        updateConnectionStatus(false);
        addLog('MQTT 断开');
    });

    client.on('error', (err) => {
        addLog('MQTT 错误: ' + err.message);
    });
}

function updateConnectionStatus(connected) {
    const dot = document.getElementById('mqtt-dot');
    const status = document.getElementById('mqtt-status');
    if (connected) {
        dot.className = 'status-dot connected';
        status.textContent = '已连接';
    } else {
        dot.className = 'status-dot disconnected';
        status.textContent = '未连接';
    }
}

// ==================== 发送指令 ====================
function sendCmd(cmd) {
    if (!client || !isConnected) {
        alert('MQTT 未连接');
        return;
    }
    client.publish(CMD_TOPIC, cmd);
    addLog('TX: ' + cmd);
}

// ==================== 阈值设置（带同步保护） ====================
function setThreshold(type, cmdCode) {
    const inputId = 'input-' + type;
    const value = document.getElementById(inputId).value;

    if (!value || value === '') {
        alert('请输入阈值');
        return;
    }

    let numValue = parseFloat(value);
    if (isNaN(numValue)) {
        alert('请输入有效数字');
        return;
    }

    if (waitingSync[type]) {
        console.log('Already waiting sync for ' + type);
        return;
    }

    // 1. 设置等待同步
    waitingSync[type] = true;
    pendingValue[type] = numValue;

    // 2. 发送指令
    sendCmd(cmdCode + ',' + numValue);

    // 3. 记录时间
    lastUserSetTime[type] = Date.now();

    // 4. 立即更新显示（预测）
    if (type === 'pm25') currentData.pm25h = numValue;
    else if (type === 'tvoc') currentData.voch = numValue;
    else if (type === 'uv') currentData.uvh = numValue;
    else if (type === 'temp') currentData.temph = numValue;
    updateUI();

    // 5. 立即检查报警
    checkAlarmsWithPending();

    // 6. 超时保护
    syncTimeoutTimer[type] = setTimeout(() => {
        if (waitingSync[type]) {
            console.warn('Sync timeout for ' + type);
            waitingSync[type] = false;
            pendingValue[type] = null;
            syncTimeoutTimer[type] = null;
        }
    }, SYNC_TIMEOUT_MS);

    document.getElementById(inputId).blur();
}

// ==================== 解析消息 ====================
function parseMessage(msg) {
    const parts = msg.split(',');
    if (parts.length < 16) return;

    const newData = {
        pm25: parseFloat(parts[0]),
        tvoc: parseFloat(parts[1]),
        ch2o: parseFloat(parts[2]),
        co2: parseFloat(parts[3]),
        uv: parseFloat(parts[4]),
        temp: parseFloat(parts[5]),
        acc_x: parseFloat(parts[6]),
        acc_y: parseFloat(parts[7]),
        acc_z: parseFloat(parts[8]),
        fall: parseInt(parts[9]),
        fan_sta: parseInt(parts[10]),
        system_mode: parts[11],
        pm25h: parseFloat(parts[12]),
        voch: parseFloat(parts[13]),
        uvh: parseFloat(parts[14]),
        temph: parseFloat(parts[15])
    };

    // 传感器值始终更新
    currentData.pm25 = newData.pm25;
    currentData.tvoc = newData.tvoc;
    currentData.ch2o = newData.ch2o;
    currentData.co2 = newData.co2;
    currentData.uv = newData.uv;
    currentData.temp = newData.temp;
    currentData.acc_x = newData.acc_x;
    currentData.acc_y = newData.acc_y;
    currentData.acc_z = newData.acc_z;
    currentData.fall = newData.fall;
    currentData.fan_sta = newData.fan_sta;
    currentData.system_mode = newData.system_mode;

    // 检查同步确认
    let hasPendingSync = false;
    const thresholdKeys = ['pm25', 'tvoc', 'uv', 'temp'];
    for (const key of thresholdKeys) {
        if (waitingSync[key]) {
            hasPendingSync = true;
            const expected = pendingValue[key];
            let received;
            if (key === 'pm25') received = newData.pm25h;
            else if (key === 'tvoc') received = newData.voch;
            else if (key === 'uv') received = newData.uvh;
            else if (key === 'temp') received = newData.temph;

            if (expected !== null && Math.abs(received - expected) < 0.01) {
                console.log('Sync confirmed: ' + key);
                if (syncTimeoutTimer[key]) {
                    clearTimeout(syncTimeoutTimer[key]);
                    syncTimeoutTimer[key] = null;
                }
                waitingSync[key] = false;
                pendingValue[key] = null;
                lastUserSetTime[key] = 0;
            }
        }
    }

    // 阈值更新（等待期间冻结）
    const now = Date.now();
    for (const key of thresholdKeys) {
        const thrKey = key === 'pm25' ? 'pm25h' : key === 'tvoc' ? 'voch' : key === 'uv' ? 'uvh' : 'temph';
        if (!lastUserSetTime[key] || (now - lastUserSetTime[key]) >= DEBOUNCE_MS) {
            if (!waitingSync[key]) {
                currentData[thrKey] = newData[thrKey];
            }
        }
    }

    updateUI();
    updateControlButtons();

    if (hasPendingSync) {
        checkAlarmsWithPending();
    } else {
        checkAlarms();
    }

    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
}

// ==================== UI 更新 ====================
function updateUI() {
    // PM2.5
    if (currentData.pm25 !== null) {
        document.getElementById('pm25').textContent = currentData.pm25.toFixed(0);
    }
    // TVOC
    if (currentData.tvoc !== null) {
        document.getElementById('tvoc').textContent = currentData.tvoc.toFixed(2);
    }
    // CH2O
    if (currentData.ch2o !== null) {
        document.getElementById('ch2o').textContent = currentData.ch2o.toFixed(2);
    }
    // CO2
    if (currentData.co2 !== null) {
        document.getElementById('co2').textContent = currentData.co2.toFixed(0);
    }
    // UV
    if (currentData.uv !== null) {
        document.getElementById('uv').textContent = currentData.uv.toFixed(1);
    }
    // TEMP
    if (currentData.temp !== null) {
        document.getElementById('temp').textContent = currentData.temp.toFixed(1);
    }
    // ACC
    if (currentData.acc_x !== null) {
        document.getElementById('acc').textContent =
            currentData.acc_x.toFixed(2) + ' / ' +
            currentData.acc_y.toFixed(2) + ' / ' +
            currentData.acc_z.toFixed(2);
    }
    // FALL
    if (currentData.fall !== null) {
        document.getElementById('fall').textContent = currentData.fall === 1 ? '跌倒!' : '正常';
    }
    // FAN_STA
    if (currentData.fan_sta !== null) {
        document.getElementById('fan-sta').textContent = currentData.fan_sta === 1 ? 'ON' : 'OFF';
    }

    // 模式
    const modeBadge = document.getElementById('mode-badge');
    if (currentData.system_mode === 'MANUAL') {
        modeBadge.className = 'mode-badge mode-manual';
        modeBadge.textContent = 'MANUAL';
    } else {
        modeBadge.className = 'mode-badge mode-auto';
        modeBadge.textContent = 'AUTO';
    }

    // 阈值显示（等待期间显示预测值）
    const pm25h = waitingSync.pm25 ? pendingValue.pm25 : currentData.pm25h;
    const voch = waitingSync.tvoc ? pendingValue.tvoc : currentData.voch;
    const uvh = waitingSync.uv ? pendingValue.uv : currentData.uvh;
    const temph = waitingSync.temp ? pendingValue.temp : currentData.temph;

    if (pm25h !== null) document.getElementById('thr-pm25').textContent = pm25h.toFixed(0) + ' μg/m³';
    if (voch !== null) document.getElementById('thr-tvoc').textContent = voch.toFixed(2) + ' mg/m³';
    if (uvh !== null) document.getElementById('thr-uv').textContent = uvh.toFixed(1);
    if (temph !== null) document.getElementById('thr-temp').textContent = temph.toFixed(1) + ' °C';
}

// ==================== 控制按钮状态 ====================
function updateControlButtons() {
    const isManual = currentData.system_mode === 'MANUAL';
    const hint = document.getElementById('ctrl-hint');
    const fanOnBtn = document.getElementById('fan-on-btn');
    const fanOffBtn = document.getElementById('fan-off-btn');
    const modeBtn = document.getElementById('mode-btn');

    if (isManual) {
        hint.textContent = '(MANUAL 模式)';
        fanOnBtn.classList.remove('disabled');
        fanOffBtn.classList.remove('disabled');
        modeBtn.classList.add('manual-active');
        modeBtn.textContent = '切换为AUTO';
    } else {
        hint.textContent = '(AUTO 模式，风扇自动控制)';
        fanOnBtn.classList.add('disabled');
        fanOffBtn.classList.add('disabled');
        modeBtn.classList.remove('manual-active');
        modeBtn.textContent = '切换为MANUAL';
    }
}

// ==================== 报警判断 ====================
function getThreshold(key) {
    return waitingSync[key] ? pendingValue[key] : currentData[key === 'pm25' ? 'pm25h' : key === 'tvoc' ? 'voch' : key === 'uv' ? 'uvh' : 'temph'];
}

function checkAlarms() {
    const alarms = [];

    // PM2.5 超标
    if (currentData.pm25 !== null && currentData.pm25h !== null && currentData.pm25 > currentData.pm25h) {
        alarms.push('PM2.5超标');
    }
    // TVOC 超标
    if (currentData.tvoc !== null && currentData.voch !== null && currentData.tvoc > currentData.voch) {
        alarms.push('TVOC超标');
    }
    // UV 超标
    if (currentData.uv !== null && currentData.uvh !== null && currentData.uv > currentData.uvh) {
        alarms.push('UV超标（注意防晒）');
    }
    // 温度过高
    if (currentData.temp !== null && currentData.temph !== null && currentData.temp > currentData.temph) {
        alarms.push('温度过高');
    }
    // 跌倒/异常移动
    if (currentData.fall === 1) {
        alarms.push('异常移动/跌倒');
    }

    renderAlarms(alarms);
    updateAlarmMarks(alarms);
}

function checkAlarmsWithPending() {
    const alarms = [];

    const pm25h = getThreshold('pm25');
    const voch = getThreshold('tvoc');
    const uvh = getThreshold('uv');
    const temph = getThreshold('temp');

    if (currentData.pm25 !== null && pm25h !== null && currentData.pm25 > pm25h) {
        alarms.push('PM2.5超标');
    }
    if (currentData.tvoc !== null && voch !== null && currentData.tvoc > voch) {
        alarms.push('TVOC超标');
    }
    if (currentData.uv !== null && uvh !== null && currentData.uv > uvh) {
        alarms.push('UV超标（注意防晒）');
    }
    if (currentData.temp !== null && temph !== null && currentData.temp > temph) {
        alarms.push('温度过高');
    }
    if (currentData.fall === 1) {
        alarms.push('异常移动/跌倒');
    }

    renderAlarms(alarms);
    updateAlarmMarks(alarms);
}

function renderAlarms(alarms) {
    const box = document.getElementById('alarm-box');
    const text = document.getElementById('alarm-text');

    if (alarms.length === 0) {
        box.className = 'alarm-card alarm-ok';
        text.textContent = '运行正常 ✓';
    } else {
        box.className = 'alarm-card alarm-list';
        text.innerHTML = alarms.map(a => `<div class="alarm-item">⚠ ${a}</div>`).join('');
    }
}

function updateAlarmMarks(alarms) {
    // 清除所有标记
    ['pm25', 'tvoc', 'uv', 'temp', 'fall'].forEach(id => {
        document.getElementById(id + '-alarm').textContent = '';
    });
    // 清除报警行样式
    ['row-pm25', 'row-tvoc', 'row-uv', 'row-temp', 'row-fall'].forEach(id => {
        document.getElementById(id).classList.remove('alarm-row');
    });

    // 添加超限标记
    if (alarms.includes('PM2.5超标')) {
        document.getElementById('pm25-alarm').textContent = ' !';
        document.getElementById('row-pm25').classList.add('alarm-row');
    }
    if (alarms.includes('TVOC超标')) {
        document.getElementById('tvoc-alarm').textContent = ' !';
        document.getElementById('row-tvoc').classList.add('alarm-row');
    }
    if (alarms.includes('UV超标（注意防晒）')) {
        document.getElementById('uv-alarm').textContent = ' !';
        document.getElementById('row-uv').classList.add('alarm-row');
    }
    if (alarms.includes('温度过高')) {
        document.getElementById('temp-alarm').textContent = ' !';
        document.getElementById('row-temp').classList.add('alarm-row');
    }
    if (alarms.includes('异常移动/跌倒')) {
        document.getElementById('fall-alarm').textContent = ' !';
        document.getElementById('row-fall').classList.add('alarm-row');
    }
}

// ==================== 初始化 ====================
connectMQTT();
</script>
