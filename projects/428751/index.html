<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多参数环境监测报警系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 12px 24px;
        }

        /* 顶栏状态栏 */
        .topbar {
            padding: 44px 0 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }
        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-title {
            font-size: 18px;
            font-weight: 600;
        }
        .conn-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--sub);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--alarm);
            transition: background 0.3s;
        }
        .status-dot.connected { background: var(--ok); }

        /* 通用卡片 */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--sub);
            margin-bottom: 12px;
        }

        /* 实时数据行 */
        .data-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-unit {
            font-size: 13px;
            color: var(--sub);
            margin-left: 4px;
        }
        .data-value.alarm { color: var(--alarm); }
        .alarm-mark {
            color: var(--alarm);
            font-size: 20px;
            font-weight: bold;
            margin-left: 2px;
        }

        /* 报警状态卡 */
        .alarm-ok {
            text-align: center;
            padding: 12px;
            color: var(--ok);
            font-size: 15px;
            font-weight: 500;
        }
        .alarm-item {
            background: #ffeaea;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            color: var(--alarm);
            font-size: 14px;
            font-weight: 500;
        }
        .alarm-item:last-child { margin-bottom: 0; }

        /* 控制按钮 */
        .ctrl-btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ctrl-btn:active { background: #1976D2; }

        /* 阈值显示行 */
        .thresh-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .thresh-row:last-child { border-bottom: none; }
        .thresh-label { font-size: 13px; color: var(--sub); }
        .thresh-value { font-size: 16px; font-weight: 600; }
        .thresh-unit { font-size: 13px; color: var(--sub); margin-left: 4px; }

        /* 阈值设置行 */
        .thresh-set-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .thresh-set-row:last-child { border-bottom: none; }
        .thresh-set-label { font-size: 13px; color: var(--sub); flex: 1; }
        .thresh-set-input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            outline: none;
        }
        .thresh-set-input:focus { border-color: var(--primary); }
        .thresh-send-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .thresh-send-btn:active { background: #1976D2; }

        /* 日志卡 */
        .log-toggle {
            cursor: pointer;
            user-select: none;
        }
        .log-toggle::after {
            content: ' ▼';
            font-size: 12px;
            color: var(--sub);
        }
        .log-toggle.collapsed::after { content: ' ▶'; }
        .log-content { max-height: 300px; overflow-y: auto; }
        .log-content.hidden { display: none; }
        .log-entry {
            font-size: 12px;
            font-family: monospace;
            padding: 4px 0;
            border-bottom: 1px solid #f5f5f5;
            color: var(--sub);
        }

        /* 无数据提示 */
        .no-data {
            text-align: center;
            padding: 24px;
            color: var(--sub);
            font-size: 14px;
        }

        /* 同步状态提示 */
        .sync-indicator {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #FF9800;
            margin-left: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- 状态栏 -->
    <div class="topbar">
        <div class="topbar-inner">
            <span class="topbar-title">多参数环境监测</span>
            <div class="conn-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">实时数据</div>
        <div id="dataRows">
            <div class="no-data">等待数据...</div>
        </div>
    </div>

    <!-- 报警状态卡 -->
    <div class="card" id="alarmCard">
        <div class="card-title">报警状态</div>
        <div id="alarmContent">
            <div class="alarm-ok">运行正常 ✓</div>
        </div>
    </div>

    <!-- 控制卡 -->
    <div class="card">
        <div class="card-title">远程控制</div>
        <button class="ctrl-btn" onclick="sendAlarmSilence()">消警</button>
    </div>

    <!-- 阈值显示卡（只读） -->
    <div class="card">
        <div class="card-title">当前阈值</div>
        <div id="threshDisplay"></div>
    </div>

    <!-- 阈值设置卡 -->
    <div class="card">
        <div class="card-title">设置阈值</div>
        <div id="threshSettings"></div>
    </div>

    <!-- 日志卡（折叠） -->
    <div class="card">
        <div class="card-title log-toggle" id="logToggle" onclick="toggleLog()">原始日志</div>
        <div class="log-content hidden" id="logContent"></div>
    </div>

    <script>
        // ==================== MQTT 配置 ====================
        const UPLOAD_TOPIC = '428751/639204/duocanshuhuanjingjiance/upload';
        const CMD_TOPIC    = '428751/639204/duocanshuhuanjingjiance/cmd';

        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        const client = mqtt.connect(MQTT_BROKER, {
            clientId: 'web_' + Math.random().toString(36).substr(2, 6),
            reconnectPeriod: 3000
        });

        // ==================== 状态 ====================
        let currentData = {
            temp: null, humi: null, pm25: null, gas: null,
            thr_temp: null, thr_humi: null, thr_pm25: null, thr_gas: null
        };

        // 同步保护状态
        let waitingSync = { temp: false, humi: false, pm25: false, gas: false };
        let pendingValue = { temp: null, humi: null, pm25: null, gas: null };
        let syncTimeoutTimer = { temp: null, humi: null, pm25: null, gas: null };

        let lastUserSetTime = {};
        const DEBOUNCE_MS = 500;
        const SYNC_TIMEOUT_MS = 5000;

        let logEntries = [];
        let logExpanded = false;

        // 字段定义
        const fields = [
            { key: 'temp',   label: '温度',   unit: '℃',    decimals: 1 },
            { key: 'humi',   label: '湿度',   unit: '%',    decimals: 1 },
            { key: 'pm25',   label: 'PM2.5', unit: 'μg/m³', decimals: 0 },
            { key: 'gas',    label: '气体',   unit: '',     decimals: 0 }
        ];
        const thresholds = [
            { key: 'temp',   label: '温度阈值', unit: '℃',    cmdCode: '02', decimals: 1 },
            { key: 'humi',   label: '湿度阈值', unit: '%',    cmdCode: '03', decimals: 1 },
            { key: 'pm25',   label: 'PM2.5阈值', unit: 'μg/m³', cmdCode: '04', decimals: 0 },
            { key: 'gas',    label: '气体阈值', unit: '',     cmdCode: '05', decimals: 0 }
        ];

        // ==================== MQTT 事件 ====================
        client.on('connect', () => {
            document.getElementById('statusDot').classList.add('connected');
            document.getElementById('statusText').textContent = '已连接';
            client.subscribe(UPLOAD_TOPIC, (err) => {
                if (!err) console.log('Subscribed:', UPLOAD_TOPIC);
            });
        });

        client.on('close', () => {
            document.getElementById('statusDot').classList.remove('connected');
            document.getElementById('statusText').textContent = '未连接';
        });

        client.on('message', (topic, payload) => {
            const msg = payload.toString();
            parseMessage(msg);
        });

        // ==================== 解析消息 ====================
        function parseMessage(message) {
            const parts = message.split(',');
            if (parts.length < 8) return;

            const newData = {
                temp: parseFloat(parts[0]),
                humi: parseFloat(parts[1]),
                pm25: parseFloat(parts[2]),
                gas: parseFloat(parts[3]),
                thr_temp: parseFloat(parts[4]),
                thr_humi: parseFloat(parts[5]),
                thr_pm25: parseFloat(parts[6]),
                thr_gas: parseFloat(parts[7])
            };

            // 传感器值始终更新
            currentData.temp = newData.temp;
            currentData.humi = newData.humi;
            currentData.pm25 = newData.pm25;
            currentData.gas = newData.gas;

            // 检查是否有正在等待同步的阈值
            let hasPendingSync = false;
            for (const [key, isWaiting] of Object.entries(waitingSync)) {
                if (isWaiting) {
                    hasPendingSync = true;
                    const expectedValue = pendingValue[key];
                    const receivedValue = newData['thr_' + key];

                    if (expectedValue !== null && Math.abs(receivedValue - expectedValue) < 0.5) {
                        console.log(`Sync confirmed for ${key}: ${receivedValue}`);
                        if (syncTimeoutTimer[key]) {
                            clearTimeout(syncTimeoutTimer[key]);
                            syncTimeoutTimer[key] = null;
                        }
                        waitingSync[key] = false;
                        pendingValue[key] = null;
                        lastUserSetTime['thr_' + key] = 0;
                    }
                }
            }

            // 阈值更新逻辑（三重保护）
            const now = Date.now();
            for (const t of thresholds) {
                const threshKey = 'thr_' + t.key;
                if (!lastUserSetTime[threshKey] || (now - lastUserSetTime[threshKey]) >= DEBOUNCE_MS) {
                    if (!waitingSync[t.key]) {
                        currentData[threshKey] = newData[threshKey];
                    }
                }
            }

            updateUI();

            if (hasPendingSync) {
                checkAlarmsWithPending();
            } else {
                checkAlarms();
            }

            addLog(message);
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            // 实时数据行
            let dataHTML = '';
            for (const f of fields) {
                if (currentData[f.key] === null) continue;
                const isAlarm = currentData[f.key] !== null && currentData['thr_' + f.key] !== null &&
                                currentData[f.key] > currentData['thr_' + f.key];
                const valStr = currentData[f.key].toFixed(f.decimals);
                dataHTML += `
                    <div class="data-row">
                        <span class="data-label">${f.label}</span>
                        <span>
                            <span class="data-value${isAlarm ? ' alarm' : ''}">${valStr}</span>
                            <span class="data-unit">${f.unit}</span>
                            ${isAlarm ? '<span class="alarm-mark">!</span>' : ''}
                        </span>
                    </div>`;
            }
            if (!dataHTML) dataHTML = '<div class="no-data">等待数据...</div>';
            document.getElementById('dataRows').innerHTML = dataHTML;

            // 阈值显示
            let dispHTML = '';
            for (const t of thresholds) {
                if (currentData['thr_' + t.key] === null) continue;
                const displayVal = waitingSync[t.key] ? pendingValue[t.key] : currentData['thr_' + t.key];
                dispHTML += `
                    <div class="thresh-row">
                        <span class="thresh-label">${t.label}</span>
                        <span>
                            <span class="thresh-value">${typeof displayVal === 'number' ? displayVal.toFixed(t.decimals) : displayVal}</span>
                            <span class="thresh-unit">${t.unit}</span>
                            ${waitingSync[t.key] ? '<span class="sync-indicator"></span>' : ''}
                        </span>
                    </div>`;
            }
            document.getElementById('threshDisplay').innerHTML = dispHTML;
        }

        // ==================== 报警判断 ====================
        function checkAlarms() {
            const alarms = [];
            for (const f of fields) {
                const threshKey = 'thr_' + f.key;
                if (currentData[f.key] !== null && currentData[threshKey] !== null &&
                    currentData[f.key] > currentData[threshKey]) {
                    alarms.push(f.label + '超标');
                }
            }
            renderAlarms(alarms);
            if (alarms.length > 0) {
                sendAlarmToNative({ alarms, data: {...currentData} });
            }
        }

        function checkAlarmsWithPending() {
            const alarms = [];
            for (const f of fields) {
                const threshKey = 'thr_' + f.key;
                const threshVal = waitingSync[f.key] ? pendingValue[f.key] : currentData[threshKey];
                if (currentData[f.key] !== null && threshVal !== null &&
                    currentData[f.key] > threshVal) {
                    alarms.push(f.label + '超标');
                }
            }
            renderAlarms(alarms);
            if (alarms.length > 0) {
                sendAlarmToNative({ alarms, data: {...currentData} });
            }
        }

        function renderAlarms(alarms) {
            const el = document.getElementById('alarmContent');
            if (alarms.length === 0) {
                el.innerHTML = '<div class="alarm-ok">运行正常 ✓</div>';
            } else {
                el.innerHTML = alarms.map(a => `<div class="alarm-item">${a}</div>`).join('');
            }
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            if (client.connected) {
                client.publish(CMD_TOPIC, cmd);
                console.log('Sent:', cmd);
            } else {
                alert('MQTT未连接');
            }
        }

        function sendAlarmSilence() {
            sendCmd('01');
        }

        function setThreshold(type, cmdCode, decimals) {
            const inputId = 'thresh_' + type + '_input';
            const value = document.getElementById(inputId).value;
            if (!value || value === '') { alert('请输入阈值'); return; }

            const numValue = parseFloat(value);
            if (isNaN(numValue)) { alert('请输入有效数字'); return; }
            if (waitingSync[type]) { console.log('Already waiting sync for ' + type); return; }

            waitingSync[type] = true;
            pendingValue[type] = numValue;

            sendCmd(`${cmdCode},${numValue}`);

            lastUserSetTime['thr_' + type] = Date.now();
            currentData['thr_' + type] = numValue;

            checkAlarmsWithPending();
            updateUI();

            syncTimeoutTimer[type] = setTimeout(() => {
                if (waitingSync[type]) {
                    console.warn('Sync timeout for ' + type + ', releasing protection');
                    waitingSync[type] = false;
                    pendingValue[type] = null;
                    syncTimeoutTimer[type] = null;
                }
            }, SYNC_TIMEOUT_MS);

            document.getElementById(inputId).blur();
        }

        // ==================== 日志 ====================
        function addLog(msg) {
            logEntries.unshift(msg);
            if (logEntries.length > 20) logEntries.pop();
            if (logExpanded) renderLog();
        }

        function toggleLog() {
            logExpanded = !logExpanded;
            const el = document.getElementById('logContent');
            const toggle = document.getElementById('logToggle');
            if (logExpanded) {
                el.classList.remove('hidden');
                toggle.classList.remove('collapsed');
                renderLog();
            } else {
                el.classList.add('hidden');
                toggle.classList.add('collapsed');
            }
        }

        function renderLog() {
            const el = document.getElementById('logContent');
            el.innerHTML = logEntries.map(e => `<div class="log-entry">${escapeHtml(e)}</div>`).join('');
        }

        // ==================== JS Bridge ====================
        function sendAlarmToNative(data) {
            if (window.Android) {
                window.Android.onAlarm(JSON.stringify(data));
            } else if (window.Notification && Notification.permission === 'granted') {
                new Notification('告警', { body: JSON.stringify(data) });
            }
        }

        // ==================== 初始化 ====================
        function initThreshSettings() {
            let html = '';
            for (const t of thresholds) {
                html += `
                    <div class="thresh-set-row">
                        <span class="thresh-set-label">${t.label}</span>
                        <input type="number" class="thresh-set-input" id="thresh_${t.key}_input"
                               step="any" placeholder="输入值">
                        <button class="thresh-send-btn"
                                onclick="setThreshold('${t.key}','${t.cmdCode}',${t.decimals})">发送</button>
                    </div>`;
            }
            document.getElementById('threshSettings').innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        initThreshSettings();
    </script>
</body>
</html>
