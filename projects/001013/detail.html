<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康监护仪 - 详情</title>
    <script src="mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 12px;
            padding-top: 56px;
        }
        /* 顶部页面切换栏 */
        .page-switcher {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        .page-tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            background: #eee;
            color: var(--sub);
            border: none;
            transition: all 0.2s;
        }
        .page-tab.active {
            background: var(--primary);
            color: white;
        }
        .page-tab:active { opacity: 0.8; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chart-container {
            height: 200px;
            margin-top: 8px;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            min-height: 48px;
            width: 100%;
        }
        .btn:active { background: #1976D2; }
        .btn-green { background: var(--ok); }
        .btn-green:active { background: #388E3C; }
        .food-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .food-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .food-total {
            font-size: 14px;
            color: var(--primary);
            margin-top: 8px;
        }
        .food-list {
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        .food-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
            font-size: 13px;
        }
        .weight-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .weight-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        .weight-display {
            font-size: 24px;
            color: var(--text);
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }
        .weight-unit {
            font-size: 14px;
            color: var(--sub);
        }
        .status-msg {
            font-size: 12px;
            color: var(--sub);
            margin-top: 8px;
            text-align: center;
        }
        .status-msg.success { color: var(--ok); }
        .status-msg.error { color: var(--alarm); }
        .empty-tip {
            font-size: 13px;
            color: var(--sub);
            text-align: center;
            padding: 20px;
        }
        @media (max-width: 420px) {
            body { padding: 8px; padding-top: 48px; }
            .card { padding: 12px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
    <!-- 顶部页面切换栏 -->
    <div class="page-switcher">
        <button class="page-tab" onclick="location.href='index.html'">📊 监控</button>
        <button class="page-tab active" onclick="location.href='detail.html'">📝 详情</button>
    </div>

    <!-- 体重设置卡 -->
    <div class="card">
        <div class="card-title">⚖ 体重设置</div>
        <div class="weight-display">
            <span id="currentWeight">65.5</span><span class="weight-unit"> kg</span>
        </div>
        <div class="weight-input-row">
            <input type="number" step="0.1" class="weight-input" id="weightInput" placeholder="输入新体重 (kg)">
            <button class="btn btn-green" onclick="setWeight()" style="width:100px;">发送</button>
        </div>
        <div class="status-msg" id="weightStatus">输入体重后点击发送，将同步到设备</div>
    </div>

    <!-- 历史数据卡 -->
    <div class="card">
        <div class="card-title">📈 体重变化趋势</div>
        <div class="chart-container">
            <canvas id="weightChart"></canvas>
        </div>
        <div id="weightEmptyTip" class="empty-tip" style="display:none;">暂无历史数据，设置体重后将自动记录</div>
    </div>

    <div class="card">
        <div class="card-title">🏃 本周运动</div>
        <div class="chart-container">
            <canvas id="stepsChart"></canvas>
        </div>
    </div>

    <!-- 饮食录入卡 -->
    <div class="card">
        <div class="card-title">🍎 饮食录入</div>
        <div class="food-row">
            <input type="text" class="food-input" id="foodName" placeholder="饮食名称">
            <input type="number" class="food-input" id="foodCal" placeholder="热量(kcal)">
        </div>
        <button class="btn" onclick="addFood()">记录</button>
        <div class="food-total">今日摄入：<span id="foodTotal">0</span> kcal</div>
        <div class="food-list" id="foodList"></div>
    </div>

    <script>
        // ==================== MQTT 配置 ====================
        const UPLOAD_TOPIC = '123124/234235/jiankanghujuyi/upload';
        const CMD_TOPIC = '123124/234235/jiankanghujuyi/cmd';
        let client = null;
        let currentWeight = 0;

        // ==================== 历史数据存储 ====================
        let weightHistory = JSON.parse(localStorage.getItem('weightHistory') || '[]');
        let foodRecords = JSON.parse(localStorage.getItem('foodRecords') || '[]');
        let stepsWeek = JSON.parse(localStorage.getItem('stepsWeek') || '[]');

        // ==================== 生成模拟数据（首次运行时） ====================
        function initMockData() {
            const today = new Date();

            // 生成过去7天体重数据
            if (weightHistory.length === 0) {
                const baseWeight = 65 + Math.random() * 3; // 基础体重 65-68kg
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    weightHistory.push({
                        date: date.toLocaleDateString(),
                        value: parseFloat((baseWeight + (Math.random() - 0.5) * 1.5).toFixed(1))
                    });
                }
                localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
            }

            // 生成本周步数数据
            if (stepsWeek.length === 0 || stepsWeek.every(v => v === 0)) {
                stepsWeek = [];
                for (let i = 0; i < 7; i++) {
                    stepsWeek.push(Math.floor(5000 + Math.random() * 8000)); // 5000-13000 步
                }
                localStorage.setItem('stepsWeek', JSON.stringify(stepsWeek));
            }

            // 生成过去3天饮食记录
            if (foodRecords.length === 0) {
                const foodItems = [
                    { name: '早餐-燕麦粥', cal: 200 },
                    { name: '午餐-米饭套餐', cal: 650 },
                    { name: '晚餐-清炒时蔬', cal: 300 },
                    { name: '早餐-牛奶面包', cal: 280 },
                    { name: '午餐-面条', cal: 500 },
                    { name: '晚餐-鸡胸肉沙拉', cal: 350 },
                    { name: '零食-苹果', cal: 80 },
                    { name: '早餐-鸡蛋三明治', cal: 320 },
                    { name: '午餐-便当', cal: 600 },
                    { name: '晚餐-蒸鱼', cal: 280 }
                ];

                for (let i = 2; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toDateString();

                    // 每天随机 3-4 条记录
                    const count = 3 + Math.floor(Math.random() * 2);
                    const startIndex = (3 - i) * 3;
                    for (let j = 0; j < count; j++) {
                        const item = foodItems[startIndex + j] || foodItems[Math.floor(Math.random() * foodItems.length)];
                        foodRecords.push({
                            name: item.name,
                            cal: item.cal,
                            time: `${7 + j * 5}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
                            date: dateStr
                        });
                    }
                }
                localStorage.setItem('foodRecords', JSON.stringify(foodRecords));
            }
        }

        // ==================== MQTT 连接 ====================
        function connectMQTT() {
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                clientId: 'webview_detail_' + Math.random().toString(36).substr(2, 6),
                reconnectPeriod: 3000
            });

            client.on('connect', () => {
                client.subscribe(UPLOAD_TOPIC);
            });

            client.on('message', (topic, payload) => {
                parseMessage(payload.toString());
            });
        }

        function parseMessage(msg) {
            const parts = msg.split(',');
            const weight = parseFloat(parts[4]) || 0;
            const steps = parseInt(parts[2]) || 0;

            if (weight > 0 && weight !== currentWeight) {
                currentWeight = weight;
                document.getElementById('currentWeight').textContent = weight.toFixed(1);
                recordWeight(weight);
            }

            // 更新本周步数（周几索引）
            const dayIndex = new Date().getDay(); // 0=周日, 1=周一...
            const adjustedIndex = dayIndex === 0 ? 6 : dayIndex - 1; // 转换为周一=0
            stepsWeek[adjustedIndex] = steps;
            localStorage.setItem('stepsWeek', JSON.stringify(stepsWeek));

            updateFoodList();
        }

        // ==================== 体重设置 ====================
        function setWeight() {
            const value = document.getElementById('weightInput').value;
            const statusEl = document.getElementById('weightStatus');

            if (!value || value === '') {
                statusEl.textContent = '请输入体重值';
                statusEl.className = 'status-msg error';
                return;
            }

            const numValue = parseFloat(value);
            if (isNaN(numValue) || numValue < 20 || numValue > 200) {
                statusEl.textContent = '请输入有效体重 (20-200 kg)';
                statusEl.className = 'status-msg error';
                return;
            }

            // 发送指令 06,值 (新增体重设置指令)
            if (client && client.connected) {
                client.publish(CMD_TOPIC, `06,${numValue.toFixed(1)}`);
                statusEl.textContent = `已发送：${numValue.toFixed(1)} kg，等待设备确认...`;
                statusEl.className = 'status-msg';

                // 立即更新显示
                currentWeight = numValue;
                document.getElementById('currentWeight').textContent = numValue.toFixed(1);
                recordWeight(numValue);

                document.getElementById('weightInput').value = '';
            } else {
                statusEl.textContent = 'MQTT 未连接，无法发送';
                statusEl.className = 'status-msg error';
            }
        }

        function recordWeight(weight) {
            const today = new Date().toLocaleDateString();
            const existing = weightHistory.find(w => w.date === today);
            if (!existing) {
                weightHistory.push({
                    date: today,
                    value: weight
                });
                if (weightHistory.length > 30) weightHistory.shift();
                localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
                updateWeightChart();
            }
        }

        // ==================== 图表初始化 ====================
        let weightChart = null;
        let stepsChartInst = null;

        function initCharts() {
            // 体重趋势图
            const ctx1 = document.getElementById('weightChart').getContext('2d');
            weightChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: weightHistory.map(w => w.date),
                    datasets: [{
                        label: '体重(kg)',
                        data: weightHistory.map(w => w.value),
                        borderColor: '#2196F3',
                        backgroundColor: 'rgba(33,150,243,0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } },
                    plugins: { legend: { display: false } }
                }
            });

            if (weightHistory.length === 0) {
                document.getElementById('weightEmptyTip').style.display = 'block';
            }

            // 运动周报图
            const ctx2 = document.getElementById('stepsChart').getContext('2d');
            const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            stepsChartInst = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: weekDays,
                    datasets: [{
                        label: '步数',
                        data: stepsWeek,
                        backgroundColor: '#4CAF50'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateWeightChart() {
            if (weightChart) {
                weightChart.data.labels = weightHistory.map(w => w.date);
                weightChart.data.datasets[0].data = weightHistory.map(w => w.value);
                weightChart.update();

                if (weightHistory.length > 0) {
                    document.getElementById('weightEmptyTip').style.display = 'none';
                }
            }
        }

        // ==================== 饮食录入 ====================
        function addFood() {
            const name = document.getElementById('foodName').value;
            const cal = parseInt(document.getElementById('foodCal').value);

            if (!name || !cal) {
                alert('请填写完整信息');
                return;
            }

            const record = {
                name: name,
                cal: cal,
                time: new Date().toLocaleTimeString(),
                date: new Date().toDateString()
            };
            foodRecords.push(record);
            localStorage.setItem('foodRecords', JSON.stringify(foodRecords));

            document.getElementById('foodName').value = '';
            document.getElementById('foodCal').value = '';
            updateFoodList();
        }

        function updateFoodList() {
            const today = new Date().toDateString();
            const todayFood = foodRecords.filter(f => f.date === today);
            const totalCal = todayFood.reduce((sum, f) => sum + f.cal, 0);

            document.getElementById('foodTotal').textContent = totalCal;

            const listEl = document.getElementById('foodList');
            listEl.innerHTML = todayFood.slice(-10).reverse().map(f =>
                `<div class="food-item"><span>${f.time} ${f.name}</span><span>${f.cal} kcal</span></div>`
            ).join('');
        }

        // ==================== 初始化 ====================
        initMockData();      // 首次运行生成模拟数据
        connectMQTT();
        initCharts();
        updateFoodList();
    </script>
</body>
</html>
