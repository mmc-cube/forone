<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康监护仪</title>
    <script src="mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 12px;
            padding-top: 56px;
        }
        /* 顶部页面切换栏 */
        .page-switcher {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        .page-tab {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            background: #eee;
            color: var(--sub);
            border: none;
            transition: all 0.2s;
        }
        .page-tab.active {
            background: var(--primary);
            color: white;
        }
        .page-tab:active { opacity: 0.8; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.ok { background: var(--ok); }
        .status-dot.err { background: var(--alarm); }
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .data-item {
            display: flex;
            flex-direction: column;
        }
        .data-label {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-value.alarm { color: var(--alarm); }
        .data-unit {
            font-size: 13px;
            color: var(--sub);
            margin-left: 4px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-child { border-bottom: none; }
        .alarm-box {
            background: #FFF3E0;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        .alarm-box.active {
            background: #FFEBEE;
        }
        .alarm-item {
            color: var(--alarm);
            font-size: 14px;
            margin: 4px 0;
        }
        .alarm-ok {
            color: var(--ok);
            font-size: 14px;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            min-height: 48px;
            width: 100%;
        }
        .btn:active { background: #1976D2; }
        .btn-alarm { background: var(--alarm); }
        .btn-alarm:active { background: #D32F2F; }
        .btn-green { background: var(--ok); }
        .btn-green:active { background: #388E3C; }
        .threshold-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            gap: 8px;
        }
        .threshold-label {
            font-size: 14px;
            color: var(--text);
            flex: 1;
        }
        .threshold-display {
            font-size: 16px;
            color: var(--primary);
            font-weight: bold;
        }
        .threshold-input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }
        .threshold-send {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .threshold-send:active { background: #1976D2; }
        .log-card { cursor: pointer; }
        .log-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .log-content.open {
            max-height: 300px;
            overflow-y: auto;
        }
        .log-item {
            font-size: 12px;
            color: var(--sub);
            padding: 4px 0;
            border-bottom: 1px dashed #eee;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .collapse-icon {
            font-size: 12px;
            transition: transform 0.3s;
        }
        .collapse-icon.open { transform: rotate(180deg); }
        .chart-container {
            height: 180px;
            margin-top: 8px;
        }
        .food-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .food-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .food-total {
            font-size: 14px;
            color: var(--primary);
            margin-top: 8px;
        }
        .food-list {
            margin-top: 12px;
            max-height: 120px;
            overflow-y: auto;
        }
        .food-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
            font-size: 13px;
        }
        .weight-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .weight-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        .weight-display {
            font-size: 24px;
            color: var(--text);
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }
        .status-msg {
            font-size: 12px;
            color: var(--sub);
            margin-top: 8px;
            text-align: center;
        }
        @media (max-width: 420px) {
            body { padding: 8px; padding-top: 48px; }
            .card { padding: 12px; margin-bottom: 8px; }
            .data-value { font-size: 24px; }
            .chart-container { height: 150px; }
        }
    </style>
</head>
<body>
    <!-- 顶部页面切换栏 -->
    <div class="page-switcher">
        <button class="page-tab active" onclick="switchPage('monitor')">📊 监控</button>
        <button class="page-tab" onclick="switchPage('detail')">📝 详情</button>
    </div>

    <!-- ========== 监控页面 ========== -->
    <div id="page-monitor" class="page-content active">
        <!-- 状态栏 -->
        <div class="card status-bar">
            <div style="display:flex;align-items:center;">
                <span class="status-dot err" id="mqttDot"></span>
                <span id="mqttStatus">未连接</span>
            </div>
            <div style="font-size:14px;color:var(--text);">健康监护仪</div>
        </div>

        <!-- 实时数据卡 -->
        <div class="card">
            <div class="card-title">📊 实时数据</div>
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">心率</span>
                    <div><span class="data-value" id="hr">0</span><span class="data-unit">bpm</span><span id="hrAlarm" style="color:var(--alarm);display:none;">!</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">血氧</span>
                    <div><span class="data-value" id="spo2">0</span><span class="data-unit">%</span><span id="spo2Alarm" style="color:var(--alarm);display:none;">!</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">步数</span>
                    <div><span class="data-value" id="steps">0</span><span class="data-unit">步</span><span id="stepsAlarm" style="color:var(--alarm);display:none;">!</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">今日摄入</span>
                    <div><span class="data-value" id="cal">0</span><span class="data-unit">kcal</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">体重</span>
                    <div><span class="data-value" id="weight">0.0</span><span class="data-unit">kg</span><span id="weightAlarm" style="color:var(--alarm);display:none;">!</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">温度</span>
                    <div><span class="data-value" id="temp">0</span><span class="data-unit">°C</span></div>
                </div>
                <div class="data-item">
                    <span class="data-label">湿度</span>
                    <div><span class="data-value" id="humid">0</span><span class="data-unit">%</span></div>
                </div>
            </div>
        </div>

        <!-- 报警状态卡 -->
        <div class="card">
            <div class="card-title">⚠ 报警状态</div>
            <div class="alarm-box" id="alarmBox">
                <div class="alarm-ok" id="alarmOk">运行正常 ✓</div>
                <div id="alarmList"></div>
            </div>
            <button class="btn btn-alarm" id="clearAlarmBtn" style="margin-top:12px;display:none;">消警</button>
        </div>

        <!-- 阈值显示卡 -->
        <div class="card">
            <div class="card-title">📋 当前阈值</div>
            <div class="data-row">
                <span class="data-label">体重阈值</span>
                <span class="threshold-display" id="thr_wgtd_display">70.0 kg</span>
            </div>
            <div class="data-row">
                <span class="data-label">运动目标</span>
                <span class="threshold-display" id="thr_steps_display">10000 步</span>
            </div>
            <div class="data-row">
                <span class="data-label">心率上限</span>
                <span class="threshold-display" id="thr_hr_display">120 bpm</span>
            </div>
            <div class="data-row">
                <span class="data-label">血氧下限</span>
                <span class="threshold-display" id="thr_spo2_display">95 %</span>
            </div>
        </div>

        <!-- 阈值设置卡 -->
        <div class="card">
            <div class="card-title">⚙ 阈值设置</div>
            <div class="threshold-row">
                <span class="threshold-label">体重阈值</span>
                <input type="number" step="0.1" class="threshold-input" id="thr_wgtd_input" placeholder="70.0">
                <button class="threshold-send" onclick="setThreshold('wgtd', '02')">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">运动目标</span>
                <input type="number" class="threshold-input" id="thr_steps_input" placeholder="10000">
                <button class="threshold-send" onclick="setThreshold('steps', '03')">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">心率上限</span>
                <input type="number" class="threshold-input" id="thr_hr_input" placeholder="120">
                <button class="threshold-send" onclick="setThreshold('hr', '04')">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">血氧下限</span>
                <input type="number" class="threshold-input" id="thr_spo2_input" placeholder="95">
                <button class="threshold-send" onclick="setThreshold('spo2', '05')">发送</button>
            </div>
        </div>

        <!-- 日志卡 -->
        <div class="card log-card" onclick="toggleLog()">
            <div class="card-title collapsible-header">
                📝 原始数据日志
                <span class="collapse-icon" id="logIcon">▼</span>
            </div>
            <div class="log-content" id="logContent"></div>
        </div>
    </div>

    <!-- ========== 详情页面 ========== -->
    <div id="page-detail" class="page-content">
        <!-- 体重设置卡 -->
        <div class="card">
            <div class="card-title">⚖ 体重设置</div>
            <div class="weight-display">
                <span id="currentWeight">65.5</span><span style="font-size:14px;color:var(--sub);"> kg</span>
            </div>
            <div class="weight-input-row">
                <input type="number" step="0.1" class="weight-input" id="weightInput" placeholder="输入新体重 (kg)">
                <button class="btn btn-green" onclick="setWeight()" style="width:100px;">发送</button>
            </div>
            <div class="status-msg" id="weightStatus">输入体重后点击发送，将同步到设备</div>
        </div>

        <!-- 体重趋势图 -->
        <div class="card">
            <div class="card-title">📈 体重变化趋势</div>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <!-- 运动周报 -->
        <div class="card">
            <div class="card-title">🏃 本周运动</div>
            <div class="chart-container">
                <canvas id="stepsChart"></canvas>
            </div>
        </div>

        <!-- 饮食录入卡 -->
        <div class="card">
            <div class="card-title">🍎 饮食录入</div>
            <div class="food-row">
                <input type="text" class="food-input" id="foodName" placeholder="饮食名称">
                <input type="number" class="food-input" id="foodCal" placeholder="热量(kcal)">
            </div>
            <button class="btn" onclick="addFood()">记录</button>
            <div class="food-total">今日摄入：<span id="foodTotal">0</span> kcal</div>
            <div class="food-list" id="foodList"></div>
        </div>
    </div>

    <script>
        // ==================== MQTT 配置 ====================
        const UPLOAD_TOPIC = '123124/234235/jiankanghujuyi/upload';
        const CMD_TOPIC = '123124/234235/jiankanghujuyi/cmd';
        let client = null;

        // ==================== 数据状态 ====================
        let currentData = {
            hr: 0, spo2: 0, steps: 0, weight: 0,
            temp: 0, humid: 0,
            thr_wgtd: 70.0, thr_steps: 10000, thr_hr: 120, thr_spo2: 95
        };

        // ==================== 同步保护状态 ====================
        let waitingSync = { wgtd: false, steps: false, hr: false, spo2: false, weight: false };
        let pendingValue = { wgtd: null, steps: null, hr: null, spo2: null, weight: null };
        let syncTimeoutTimer = { wgtd: null, steps: null, hr: null, spo2: null, weight: null };
        let lastUserSetTime = { thr_wgtd: 0, thr_steps: 0, thr_hr: 0, thr_spo2: 0, weight: 0 };
        const DEBOUNCE_MS = 500;
        const SYNC_TIMEOUT_MS = 5000;

        // ==================== 历史数据存储 ====================
        let weightHistory = JSON.parse(localStorage.getItem('weightHistory') || '[]');
        let foodRecords = JSON.parse(localStorage.getItem('foodRecords') || '[]');
        let stepsWeek = JSON.parse(localStorage.getItem('stepsWeek') || '[]');

        // ==================== 页面切换 ====================
        function switchPage(page) {
            document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));

            if (page === 'monitor') {
                document.querySelector('.page-tab:first-child').classList.add('active');
                document.getElementById('page-monitor').classList.add('active');
            } else {
                document.querySelector('.page-tab:last-child').classList.add('active');
                document.getElementById('page-detail').classList.add('active');
                initCharts();
                updateFoodList();
            }
        }

        // ==================== 生成模拟数据（首次运行） ====================
        function initMockData() {
            const today = new Date();

            // 生成过去7天体重数据
            if (weightHistory.length === 0) {
                const baseWeight = 65 + Math.random() * 3;
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    weightHistory.push({
                        date: date.toLocaleDateString(),
                        value: parseFloat((baseWeight + (Math.random() - 0.5) * 1.5).toFixed(1))
                    });
                }
                localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
            }

            // 生成本周步数数据
            if (stepsWeek.length === 0 || stepsWeek.every(v => v === 0)) {
                stepsWeek = [];
                for (let i = 0; i < 7; i++) {
                    stepsWeek.push(Math.floor(5000 + Math.random() * 8000));
                }
                localStorage.setItem('stepsWeek', JSON.stringify(stepsWeek));
            }

            // 生成过去3天饮食记录
            if (foodRecords.length === 0) {
                const foodItems = [
                    { name: '早餐-燕麦粥', cal: 200 },
                    { name: '午餐-米饭套餐', cal: 650 },
                    { name: '晚餐-清炒时蔬', cal: 300 },
                    { name: '早餐-牛奶面包', cal: 280 },
                    { name: '午餐-面条', cal: 500 },
                    { name: '晚餐-鸡胸肉沙拉', cal: 350 },
                    { name: '零食-苹果', cal: 80 },
                    { name: '早餐-鸡蛋三明治', cal: 320 },
                    { name: '午餐-便当', cal: 600 },
                    { name: '晚餐-蒸鱼', cal: 280 }
                ];

                for (let i = 2; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toDateString();
                    const count = 3 + Math.floor(Math.random() * 2);
                    const startIndex = (3 - i) * 3;
                    for (let j = 0; j < count; j++) {
                        const item = foodItems[startIndex + j] || foodItems[Math.floor(Math.random() * foodItems.length)];
                        foodRecords.push({
                            name: item.name,
                            cal: item.cal,
                            time: `${7 + j * 5}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
                            date: dateStr
                        });
                    }
                }
                localStorage.setItem('foodRecords', JSON.stringify(foodRecords));
            }
        }

        // ==================== MQTT 连接 ====================
        function connectMQTT() {
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
                reconnectPeriod: 3000
            });

            client.on('connect', () => {
                document.getElementById('mqttDot').className = 'status-dot ok';
                document.getElementById('mqttStatus').textContent = '已连接';
                client.subscribe(UPLOAD_TOPIC);
            });

            client.on('close', () => {
                document.getElementById('mqttDot').className = 'status-dot err';
                document.getElementById('mqttStatus').textContent = '未连接';
            });

            client.on('message', (topic, payload) => {
                parseMessage(payload.toString());
            });
        }

        // ==================== 消息解析 ====================
        function parseMessage(msg) {
            const parts = msg.split(',');
            const now = Date.now();

            const newData = {
                hr: parseFloat(parts[0]) || 0,
                spo2: parseFloat(parts[1]) || 0,
                steps: parseInt(parts[2]) || 0,
                weight: parseFloat(parts[4]) || 0,
                temp: parseFloat(parts[5]) || 0,
                humid: parseFloat(parts[6]) || 0,
                thr_wgtd: parseFloat(parts[7]) || 70.0,
                thr_steps: parseInt(parts[8]) || 10000,
                thr_hr: parseInt(parts[9]) || 120,
                thr_spo2: parseInt(parts[10]) || 95
            };

            currentData.hr = newData.hr;
            currentData.spo2 = newData.spo2;
            currentData.steps = newData.steps;
            currentData.weight = newData.weight;
            currentData.temp = newData.temp;
            currentData.humid = newData.humid;

            // 体重同步确认（乐观更新）
            if (waitingSync.weight && pendingValue.weight !== null) {
                const expectedWeight = pendingValue.weight;
                const receivedWeight = newData.weight;
                // 允许小范围误差
                if (Math.abs(receivedWeight - expectedWeight) < 0.1) {
                    console.log(`Weight sync confirmed: ${receivedWeight}`);
                    if (syncTimeoutTimer.weight) {
                        clearTimeout(syncTimeoutTimer.weight);
                        syncTimeoutTimer.weight = null;
                    }
                    waitingSync.weight = false;
                    pendingValue.weight = null;
                    lastUserSetTime.weight = 0;
                    document.getElementById('weightStatus').textContent = '设备已确认';
                    document.getElementById('weightStatus').className = 'status-msg';
                }
            }

            // 更新体重显示（非同步等待期间才更新）
            const nowTime = Date.now();
            if (newData.weight > 0) {
                if (!lastUserSetTime.weight || (nowTime - lastUserSetTime.weight) >= DEBOUNCE_MS) {
                    if (!waitingSync.weight) {
                        currentData.weight = newData.weight;
                        document.getElementById('currentWeight').textContent = newData.weight.toFixed(1);
                        recordWeight(newData.weight);
                    }
                }
            }

            // 更新本周步数
            const dayIndex = new Date().getDay();
            const adjustedIndex = dayIndex === 0 ? 6 : dayIndex - 1;
            stepsWeek[adjustedIndex] = newData.steps;
            localStorage.setItem('stepsWeek', JSON.stringify(stepsWeek));

            // 阈值同步确认
            let hasPendingSync = false;
            for (const [key, isWaiting] of Object.entries(waitingSync)) {
                if (key === 'weight') continue;  // 体重单独处理
                if (isWaiting) {
                    hasPendingSync = true;
                    const expected = pendingValue[key];
                    const received = newData[`thr_${key}`];
                    if (expected !== null && Math.abs(received - expected) < 0.5) {
                        if (syncTimeoutTimer[key]) {
                            clearTimeout(syncTimeoutTimer[key]);
                            syncTimeoutTimer[key] = null;
                        }
                        waitingSync[key] = false;
                        pendingValue[key] = null;
                        lastUserSetTime[`thr_${key}`] = 0;
                    }
                }
            }

            // 阈值更新
            for (const key of ['wgtd', 'steps', 'hr', 'spo2']) {
                const threshKey = `thr_${key}`;
                if (!lastUserSetTime[threshKey] || (now - lastUserSetTime[threshKey]) >= DEBOUNCE_MS) {
                    if (!waitingSync[key]) {
                        currentData[threshKey] = newData[threshKey];
                    }
                }
            }

            updateUI();
            if (hasPendingSync) {
                checkAlarmsWithPending();
            } else {
                checkAlarms();
            }
            addLog(msg);
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            document.getElementById('hr').textContent = currentData.hr;
            document.getElementById('spo2').textContent = currentData.spo2;
            document.getElementById('steps').textContent = currentData.steps;
            document.getElementById('weight').textContent = currentData.weight.toFixed(1);
            document.getElementById('temp').textContent = currentData.temp.toFixed(1);
            document.getElementById('humid').textContent = currentData.humid.toFixed(0);

            // 今日摄入
            const today = new Date().toDateString();
            const todayFood = foodRecords.filter(f => f.date === today);
            const totalCal = todayFood.reduce((sum, f) => sum + f.cal, 0);
            document.getElementById('cal').textContent = totalCal;
            document.getElementById('foodTotal').textContent = totalCal;

            // 阈值显示
            document.getElementById('thr_wgtd_display').textContent =
                (waitingSync.wgtd ? pendingValue.wgtd : currentData.thr_wgtd).toFixed(1) + ' kg';
            document.getElementById('thr_steps_display').textContent =
                (waitingSync.steps ? pendingValue.steps : currentData.thr_steps) + ' 步';
            document.getElementById('thr_hr_display').textContent =
                (waitingSync.hr ? pendingValue.hr : currentData.thr_hr) + ' bpm';
            document.getElementById('thr_spo2_display').textContent =
                (waitingSync.spo2 ? pendingValue.spo2 : currentData.thr_spo2) + ' %';
        }

        // ==================== 报警判断 ====================
        function checkAlarms() {
            const alarms = [];

            if (currentData.hr > currentData.thr_hr && currentData.hr > 0) {
                alarms.push('心率超限报警');
                document.getElementById('hrAlarm').style.display = 'inline';
            } else {
                document.getElementById('hrAlarm').style.display = 'none';
            }

            if (currentData.spo2 < currentData.thr_spo2 && currentData.spo2 > 0) {
                alarms.push('血氧超限报警');
                document.getElementById('spo2Alarm').style.display = 'inline';
            } else {
                document.getElementById('spo2Alarm').style.display = 'none';
            }

            if (currentData.weight > currentData.thr_wgtd && currentData.weight > 0) {
                alarms.push('体重超限报警');
                document.getElementById('weightAlarm').style.display = 'inline';
            } else {
                document.getElementById('weightAlarm').style.display = 'none';
            }

            renderAlarms(alarms);
        }

        function checkAlarmsWithPending() {
            const alarms = [];
            const thrWgtd = waitingSync.wgtd ? pendingValue.wgtd : currentData.thr_wgtd;
            const thrHr = waitingSync.hr ? pendingValue.hr : currentData.thr_hr;
            const thrSpo2 = waitingSync.spo2 ? pendingValue.spo2 : currentData.thr_spo2;

            if (currentData.hr > thrHr && currentData.hr > 0) {
                alarms.push('心率超限报警');
                document.getElementById('hrAlarm').style.display = 'inline';
            } else {
                document.getElementById('hrAlarm').style.display = 'none';
            }

            if (currentData.spo2 < thrSpo2 && currentData.spo2 > 0) {
                alarms.push('血氧超限报警');
                document.getElementById('spo2Alarm').style.display = 'inline';
            } else {
                document.getElementById('spo2Alarm').style.display = 'none';
            }

            if (currentData.weight > thrWgtd && currentData.weight > 0) {
                alarms.push('体重超限报警');
                document.getElementById('weightAlarm').style.display = 'inline';
            } else {
                document.getElementById('weightAlarm').style.display = 'none';
            }

            renderAlarms(alarms);
        }

        function renderAlarms(alarms) {
            const alarmBox = document.getElementById('alarmBox');
            const alarmOk = document.getElementById('alarmOk');
            const alarmList = document.getElementById('alarmList');
            const clearBtn = document.getElementById('clearAlarmBtn');

            alarmList.innerHTML = '';

            if (alarms.length === 0) {
                alarmBox.classList.remove('active');
                alarmOk.style.display = 'block';
                clearBtn.style.display = 'none';
            } else {
                alarmBox.classList.add('active');
                alarmOk.style.display = 'none';
                clearBtn.style.display = 'block';
                alarms.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'alarm-item';
                    div.textContent = a;
                    alarmList.appendChild(div);
                });
            }
        }

        // ==================== 阈值设置 ====================
        function setThreshold(type, cmdCode) {
            const value = document.getElementById(`thr_${type}_input`).value;
            if (!value) { alert('请输入阈值'); return; }
            const numValue = parseFloat(value);
            if (isNaN(numValue)) { alert('请输入有效数字'); return; }
            if (waitingSync[type]) return;

            waitingSync[type] = true;
            pendingValue[type] = numValue;
            sendCmd(`${cmdCode},${numValue}`);
            lastUserSetTime[`thr_${type}`] = Date.now();
            currentData[`thr_${type}`] = numValue;
            updateUI();
            checkAlarmsWithPending();

            syncTimeoutTimer[type] = setTimeout(() => {
                if (waitingSync[type]) {
                    waitingSync[type] = false;
                    pendingValue[type] = null;
                    syncTimeoutTimer[type] = null;
                }
            }, SYNC_TIMEOUT_MS);

            document.getElementById(`thr_${type}_input`).blur();
        }

        // ==================== 体重设置（带乐观更新） ====================
        function setWeight() {
            const value = document.getElementById('weightInput').value;
            const statusEl = document.getElementById('weightStatus');

            if (!value) { statusEl.textContent = '请输入体重值'; statusEl.className = 'status-msg'; return; }

            const numValue = parseFloat(value);
            if (isNaN(numValue) || numValue < 20 || numValue > 200) {
                statusEl.textContent = '请输入有效体重 (20-200 kg)';
                statusEl.className = 'status-msg';
                return;
            }

            // 防止重复发送
            if (waitingSync.weight) {
                statusEl.textContent = '正在等待设备确认...';
                return;
            }

            // 1. 设置等待同步状态
            waitingSync.weight = true;
            pendingValue.weight = numValue;
            lastUserSetTime.weight = Date.now();

            // 2. 发送指令
            sendCmd(`06,${numValue.toFixed(1)}`);

            // 3. 立即更新显示（乐观更新）
            currentData.weight = numValue;
            document.getElementById('currentWeight').textContent = numValue.toFixed(1);
            document.getElementById('weight').textContent = numValue.toFixed(1);

            // 4. 记录到历史
            recordWeight(numValue);

            // 5. 立即检查报警
            checkAlarms();

            // 6. 更新状态提示
            statusEl.textContent = `已发送：${numValue.toFixed(1)} kg，等待确认...`;
            statusEl.className = 'status-msg';

            // 7. 清空输入框
            document.getElementById('weightInput').value = '';

            // 8. 设置超时保护
            syncTimeoutTimer.weight = setTimeout(() => {
                if (waitingSync.weight) {
                    console.warn('Weight sync timeout, releasing protection');
                    waitingSync.weight = false;
                    pendingValue.weight = null;
                    syncTimeoutTimer.weight = null;
                    statusEl.textContent = '设备响应超时，请重试';
                    statusEl.className = 'status-msg';
                }
            }, SYNC_TIMEOUT_MS);
        }

        function recordWeight(weight) {
            const today = new Date().toLocaleDateString();
            const existing = weightHistory.find(w => w.date === today);
            if (existing) {
                // 今天已有记录，更新值
                existing.value = weight;
            } else {
                // 今天无记录，添加新记录
                weightHistory.push({ date: today, value: weight });
                if (weightHistory.length > 30) weightHistory.shift();
            }
            localStorage.setItem('weightHistory', JSON.stringify(weightHistory));
            if (weightChart) updateWeightChart();
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            if (client && client.connected) {
                client.publish(CMD_TOPIC, cmd);
                addLog(`[发送] ${cmd}`);
            }
        }

        // ==================== 消警 ====================
        document.getElementById('clearAlarmBtn').addEventListener('click', () => sendCmd('01'));

        // ==================== 日志 ====================
        const logs = [];
        function addLog(msg) {
            logs.unshift(msg);
            if (logs.length > 20) logs.pop();
            document.getElementById('logContent').innerHTML = logs.map(l =>
                `<div class="log-item">${new Date().toLocaleTimeString()} ${l}</div>`
            ).join('');
        }

        function toggleLog() {
            document.getElementById('logContent').classList.toggle('open');
            document.getElementById('logIcon').classList.toggle('open');
        }

        // ==================== 图表 ====================
        let weightChart = null;
        let stepsChart = null;

        function initCharts() {
            if (!weightChart) {
                const ctx1 = document.getElementById('weightChart').getContext('2d');
                weightChart = new Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: weightHistory.map(w => w.date),
                        datasets: [{
                            label: '体重(kg)',
                            data: weightHistory.map(w => w.value),
                            borderColor: '#2196F3',
                            backgroundColor: 'rgba(33,150,243,0.1)',
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: false } },
                        plugins: { legend: { display: false } }
                    }
                });
            }

            if (!stepsChart) {
                const ctx2 = document.getElementById('stepsChart').getContext('2d');
                const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                stepsChart = new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: weekDays,
                        datasets: [{
                            label: '步数',
                            data: stepsWeek,
                            backgroundColor: '#4CAF50'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } },
                        plugins: { legend: { display: false } }
                    }
                });
            }
        }

        function updateWeightChart() {
            if (weightChart) {
                weightChart.data.labels = weightHistory.map(w => w.date);
                weightChart.data.datasets[0].data = weightHistory.map(w => w.value);
                weightChart.update();
            }
        }

        // ==================== 饮食录入 ====================
        function addFood() {
            const name = document.getElementById('foodName').value;
            const cal = parseInt(document.getElementById('foodCal').value);

            if (!name || !cal) { alert('请填写完整信息'); return; }

            foodRecords.push({
                name: name,
                cal: cal,
                time: new Date().toLocaleTimeString(),
                date: new Date().toDateString()
            });
            localStorage.setItem('foodRecords', JSON.stringify(foodRecords));

            document.getElementById('foodName').value = '';
            document.getElementById('foodCal').value = '';
            updateUI();
            updateFoodList();
        }

        function updateFoodList() {
            const today = new Date().toDateString();
            const todayFood = foodRecords.filter(f => f.date === today);
            document.getElementById('foodList').innerHTML = todayFood.slice(-10).reverse().map(f =>
                `<div class="food-item"><span>${f.time} ${f.name}</span><span>${f.cal} kcal</span></div>`
            ).join('');
        }

        // ==================== 初始化 ====================
        initMockData();
        connectMQTT();
        updateUI();
    </script>
</body>
</html>
