<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>婴儿车环境监测与安全看护系统</title>
  <style>
    :root {
      --bg: #F5F5F5;
      --card: #FFFFFF;
      --primary: #2196F3;
      --alarm: #F44336;
      --ok: #4CAF50;
      --text: #212121;
      --sub: #757575;
      --border: #E0E0E0;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 12px calc(24px + env(safe-area-inset-bottom));
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-main {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--alarm);
      flex: 0 0 auto;
    }

    .status-dot.connected {
      background: var(--ok);
    }

    .status-dot.scanning {
      background: #FFC107;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .status-meta {
      text-align: right;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.5;
    }

    .device-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .device-empty {
      padding: 10px 12px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--sub);
      font-size: 13px;
      text-align: center;
      background: #FAFAFA;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #FAFAFA;
    }

    .device-item.active {
      border-color: #90CAF9;
      background: #E3F2FD;
    }

    .device-info {
      min-width: 0;
      flex: 1;
    }

    .device-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .device-address {
      margin-top: 2px;
      font-size: 12px;
      color: var(--sub);
      word-break: break-all;
    }

    .device-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .device-btn {
      min-height: 40px;
      padding: 0 12px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .device-btn.secondary {
      background: #90A4AE;
    }

    .device-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(33, 150, 243, 0.12);
      color: #1565C0;
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      min-height: 48px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 2px 6px rgba(33, 150, 243, 0.25);
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.92;
    }

    .btn.secondary {
      background: #607D8B;
      box-shadow: 0 2px 6px rgba(96, 125, 139, 0.25);
    }

    .btn.alarm {
      background: var(--alarm);
      box-shadow: 0 2px 6px rgba(244, 67, 54, 0.25);
    }

    .btn.ghost {
      background: #ECEFF1;
      color: var(--text);
      box-shadow: none;
    }

    .data-list,
    .threshold-list,
    .control-list,
    .alarm-list,
    .current-threshold-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .data-row,
    .current-threshold-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .data-row:last-child,
    .current-threshold-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .data-name,
    .threshold-name {
      font-size: 13px;
      color: var(--sub);
    }

    .data-value-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .data-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      word-break: break-all;
      text-align: right;
    }

    .data-value.alarm {
      color: var(--alarm);
    }

    .data-unit,
    .current-threshold-value,
    .mode-chip,
    .fan-chip {
      font-size: 13px;
      color: var(--sub);
    }

    .mode-chip,
    .fan-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #E3F2FD;
      color: #1565C0;
      font-weight: 600;
    }

    .fan-chip {
      background: #F1F8E9;
      color: #558B2F;
    }

    .alarm-empty {
      background: rgba(76, 175, 80, 0.12);
      color: var(--ok);
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      text-align: center;
    }

    .alarm-item {
      background: rgba(244, 67, 54, 0.12);
      color: var(--alarm);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .threshold-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 88px 84px;
      gap: 8px;
      align-items: center;
    }

    .threshold-input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    .logs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .logs-body {
      display: none;
      margin-top: 12px;
    }

    .logs-body.expanded {
      display: block;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow: auto;
    }

    .log-item {
      background: #FAFAFA;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .empty-log {
      color: var(--sub);
      text-align: center;
      padding: 14px 0;
      font-size: 13px;
    }

    .bridge-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    @media (max-width: 360px) {
      .control-grid {
        grid-template-columns: 1fr;
      }

      .threshold-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="status-bar">
        <div class="status-main">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">未连接</span>
        </div>
        <div class="status-meta">
          <div id="deviceNameText">设备：未选择</div>
          <div id="lastDataText">最近数据：--</div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn secondary" type="button" onclick="requestBluetoothConnect()">连接蓝牙</button>
        <button class="btn" type="button" onclick="requestBluetoothScan()">扫描设备</button>
        <button class="btn ghost" type="button" onclick="markDisconnected('用户手动断开')">断开显示</button>
      </div>
      <div id="deviceList" class="device-list">
        <div class="device-empty">点击“扫描设备”获取可连接蓝牙设备</div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">实时数据</div>
      </div>
      <div id="dataList" class="data-list"></div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">报警状态</div>
      </div>
      <div id="alarmList" class="alarm-list"></div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">控制</div>
      </div>
      <div class="control-grid">
        <button class="btn alarm" type="button" onclick="sendCommand('ALARM_MUTE')">消警</button>
        <button class="btn" type="button" onclick="sendCommand('FAN_ON')">风扇开</button>
        <button class="btn" type="button" onclick="sendCommand('FAN_OFF')">风扇关</button>
        <button class="btn secondary" type="button" onclick="sendCommand('TOGGLE_MODE')">切换模式</button>
      </div>

    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">当前阈值</div>
      </div>
      <div id="currentThresholdList" class="current-threshold-list"></div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="card-title">阈值设置</div>
      </div>
      <div class="threshold-list">
        <div class="threshold-row">
          <div class="threshold-name">PM2.5 阈值</div>
          <input id="input-pm25h" class="threshold-input" type="number" inputmode="decimal" />
          <button class="btn" type="button" onclick="sendThreshold('pm25h', 'SET_PM25H', 'input-pm25h')">发送</button>
        </div>
        <div class="threshold-row">
          <div class="threshold-name">TVOC 阈值</div>
          <input id="input-voch" class="threshold-input" type="number" inputmode="decimal" step="0.1" />
          <button class="btn" type="button" onclick="sendThreshold('voch', 'SET_VOCH', 'input-voch')">发送</button>
        </div>
        <div class="threshold-row">
          <div class="threshold-name">UV 阈值</div>
          <input id="input-uvh" class="threshold-input" type="number" inputmode="decimal" step="0.1" />
          <button class="btn" type="button" onclick="sendThreshold('uvh', 'SET_UVH', 'input-uvh')">发送</button>
        </div>
        <div class="threshold-row">
          <div class="threshold-name">温度阈值</div>
          <input id="input-temph" class="threshold-input" type="number" inputmode="decimal" step="0.1" />
          <button class="btn" type="button" onclick="sendThreshold('temph', 'SET_TEMPH', 'input-temph')">发送</button>
        </div>
      </div>

    </section>

    <section class="card">
      <div class="logs-header" onclick="toggleLogs()">
        <div class="card-title">日志</div>
        <button id="logsToggle" class="btn ghost" type="button">展开</button>
      </div>
      <div id="logsBody" class="logs-body">
        <div id="logList" class="log-list"></div>
      </div>
    </section>
  </div>

  <script>
    const FIELD_CONFIG = [
      { key: 'pm25', label: 'PM2.5', unit: 'μg/m³', decimals: 0 },
      { key: 'tvoc', label: 'TVOC', unit: 'mg/m³', decimals: 2 },
      { key: 'uv', label: 'UV', unit: '', decimals: 1 },
      { key: 'temp', label: '温度', unit: '°C', decimals: 1 },
      { key: 'acc_x', label: 'ACC_X', unit: 'g', decimals: 2 },
      { key: 'acc_y', label: 'ACC_Y', unit: 'g', decimals: 2 },
      { key: 'acc_z', label: 'ACC_Z', unit: 'g', decimals: 2 },
      { key: 'fall', label: '异常状态', unit: '', decimals: null },
      { key: 'fan_sta', label: '风扇状态', unit: '', decimals: null },
      { key: 'system_mode', label: '系统模式', unit: '', decimals: null }
    ];

    const THRESHOLD_CONFIG = [
      { key: 'pm25h', label: 'PM2.5 阈值', unit: 'μg/m³', decimals: 0, inputId: 'input-pm25h' },
      { key: 'voch', label: 'TVOC 阈值', unit: 'mg/m³', decimals: 1, inputId: 'input-voch' },
      { key: 'uvh', label: 'UV 阈值', unit: '', decimals: 1, inputId: 'input-uvh' },
      { key: 'temph', label: '温度阈值', unit: '°C', decimals: 1, inputId: 'input-temph' }
    ];

    const state = {
      connected: false,
      connectionText: '未连接',
      lastDataAt: 0,
      scanState: 'idle',
      deviceList: [],
      selectedDeviceAddress: '',
      selectedDeviceName: '',
      connectingDeviceAddress: '',
      rxFrame: { num: 0, total: 0, parts: {} },
      currentData: {
        pm25: null,
        tvoc: null,
        uv: null,
        temp: null,
        acc_x: null,
        acc_y: null,
        acc_z: null,
        fall: 0,
        fan_sta: 0,
        system_mode: 'AUTO',
        pm25h: 2000,
        voch: 200,
        uvh: 8.0,
        temph: 30
      },
      waitingSync: {
        pm25h: false,
        voch: false,
        uvh: false,
        temph: false
      },
      predictedAlarms: null,
      bluetoothAlarm: false,
      logsExpanded: false,
      logs: []
    };

    function formatNumber(value, decimals) {
      if (value === null || value === undefined || Number.isNaN(value)) return '--';
      if (decimals === null) return String(value);
      return Number(value).toFixed(decimals);
    }

    function getDisplayValue(key) {
      const value = state.currentData[key];
      if (key === 'fall') return value === 1 ? '异常' : '正常';
      if (key === 'fan_sta') return value === 1 ? 'ON' : 'OFF';
      if (key === 'system_mode') return value || '--';
      return value;
    }

    function isFieldAlarmed(key) {
      if (key === 'pm25') return Number(state.currentData.pm25) > Number(state.currentData.pm25h);
      if (key === 'tvoc') return Number(state.currentData.tvoc) > Number(state.currentData.voch);
      if (key === 'uv') return Number(state.currentData.uv) > Number(state.currentData.uvh);
      if (key === 'temp') return Number(state.currentData.temp) > Number(state.currentData.temph);
      if (key === 'fall') return Number(state.currentData.fall) === 1;
      return false;
    }

    function renderData() {
      const container = document.getElementById('dataList');
      container.innerHTML = FIELD_CONFIG.map((field) => {
        const rawValue = getDisplayValue(field.key);
        const value = typeof rawValue === 'number' ? formatNumber(rawValue, field.decimals) : rawValue;
        const alarmClass = isFieldAlarmed(field.key) ? 'alarm' : '';
        const trailing = field.unit ? `<span class="data-unit">${field.unit}</span>` : '';
        return `
          <div class="data-row">
            <div class="data-name">${field.label}</div>
            <div class="data-value-wrap">
              <div class="data-value ${alarmClass}">${value}</div>
              ${trailing}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCurrentThresholds() {
      const container = document.getElementById('currentThresholdList');
      container.innerHTML = THRESHOLD_CONFIG.map((field) => {
        const value = formatNumber(state.currentData[field.key], field.decimals);
        const unit = field.unit ? ` ${field.unit}` : '';
        const syncing = state.waitingSync[field.key] ? '（同步中）' : '';
        return `
          <div class="current-threshold-row">
            <div class="threshold-name">${field.label}</div>
            <div class="current-threshold-value">${value}${unit}${syncing}</div>
          </div>
        `;
      }).join('');

      THRESHOLD_CONFIG.forEach((field) => {
        const input = document.getElementById(field.inputId);
        if (document.activeElement !== input) {
          input.value = state.currentData[field.key] ?? '';
        }
      });
    }

    function computeAlarms() {
      const alarms = [];
      if (Number(state.currentData.pm25) > Number(state.currentData.pm25h)) alarms.push({ which: 'pm25', mag: state.currentData.pm25, thr: state.currentData.pm25h, text: 'PM2.5超标' });
      if (Number(state.currentData.tvoc) > Number(state.currentData.voch)) alarms.push({ which: 'tvoc', mag: state.currentData.tvoc, thr: state.currentData.voch, text: 'TVOC超标' });
      if (Number(state.currentData.uv) > Number(state.currentData.uvh)) alarms.push({ which: 'uv', mag: state.currentData.uv, thr: state.currentData.uvh, text: 'UV超标（注意防晒）' });
      if (Number(state.currentData.temp) > Number(state.currentData.temph)) alarms.push({ which: 'temp', mag: state.currentData.temp, thr: state.currentData.temph, text: '温度过高' });
      if (Number(state.currentData.fall) === 1) alarms.push({ which: 'fall', mag: null, thr: null, text: '异常' });
      if (state.bluetoothAlarm) alarms.push({ which: 'bt_disconnect', mag: null, thr: null, text: '蓝牙连接已断开' });
      return alarms;
    }

    // 目标蓝牙设备名称（仅显示此设备，其余过滤）
    const TARGET_DEVICE_NAME = 'YINGERCHE_BT';

    function normalizeDevice(device) {
      if (!device) return null;
      if (typeof device === 'string') {
        return { name: device, address: device };
      }
      const name = String(device.name || device.deviceName || '未知设备').trim();
      const address = String(device.address || device.mac || device.id || '').trim();
      if (!address && !name) return null;
      return {
        name: name || '未知设备',
        address: address || name,
        bonded: Boolean(device.bonded),
        rssi: device.rssi ?? null
      };
    }

    function renderDeviceList() {
      const container = document.getElementById('deviceList');
      if (state.scanState === 'scanning') {
        container.innerHTML = '<div class="device-empty">正在扫描或获取已配对设备...</div>';
        return;
      }

      if (!state.deviceList.length) {
        const text = state.scanState === 'done'
          ? `未找到设备 “${TARGET_DEVICE_NAME}”，请先在系统蓝牙中完成配对`
          : `点击”扫描设备”查找 “${TARGET_DEVICE_NAME}”`;
        container.innerHTML = `<div class="device-empty">${text}</div>`;
        return;
      }

      container.innerHTML = state.deviceList.map((device) => {
        const active = state.selectedDeviceAddress === device.address || (state.connected && state.selectedDeviceAddress === device.address);
        const connecting = state.connectingDeviceAddress === device.address;
        const badge = state.selectedDeviceAddress === device.address
          ? '<div class="device-badge">已选择</div>'
          : '';
        const selectCall = `selectDevice(${JSON.stringify(device.address)}, ${JSON.stringify(device.name)})`;
        const connectCall = `connectToScannedDevice(${JSON.stringify(device.address)}, ${JSON.stringify(device.name)})`;
        return `
          <div class="device-item ${active ? 'active' : ''}">
            <div class="device-info" onclick='${selectCall}'>
              <div class="device-name">${device.name || '未知设备'}</div>
              <div class="device-address">${device.address || '--'}</div>
              ${badge}
            </div>
            <div class="device-actions">
              <button class="device-btn secondary" type="button" onclick='${selectCall}'>选择</button>
              <button class="device-btn" type="button" onclick='${connectCall}'>${connecting ? '连接中' : '连接'}</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function getDeviceDisplayText() {
      if (state.selectedDeviceName || state.selectedDeviceAddress) {
        return `设备：${state.selectedDeviceName || state.selectedDeviceAddress}`;
      }
      return '设备：未选择';
    }

    function setScanState(nextState) {
      state.scanState = nextState;
      updateStatusUi();
      renderDeviceList();
    }

    function handleDeviceList(devices) {
      state.deviceList = (Array.isArray(devices) ? devices : [])
        .map(normalizeDevice)
        .filter(d => d && d.name === TARGET_DEVICE_NAME);
      addLog(`收到设备列表：${state.deviceList.length} 个`);
      state.deviceList.forEach(d => addLog(`  → ${d.name} (${d.address})`));
      if (!state.selectedDeviceAddress && state.deviceList.length === 1) {
        state.selectedDeviceAddress = state.deviceList[0].address;
        state.selectedDeviceName = state.deviceList[0].name;
        addLog(`自动选择唯一设备：${state.selectedDeviceName}`);
      }
      state.connectingDeviceAddress = '';
      setScanState('done');
      renderAll();
    }

    function selectDevice(address, name) {
      addLog(`[DEBUG selectDevice] address=${JSON.stringify(address)}, name=${JSON.stringify(name)}`);
      state.selectedDeviceAddress = address || '';
      state.selectedDeviceName = name || address || '';
      addLog(`已选择设备：${state.selectedDeviceName || state.selectedDeviceAddress}`);
      renderAll();
    }

    function renderAlarms() {
      const container = document.getElementById('alarmList');
      const alarms = state.predictedAlarms || computeAlarms();
      if (!alarms.length) {
        container.innerHTML = '<div class="alarm-empty">运行正常 ✓</div>';
        return;
      }
      container.innerHTML = alarms.map((a) => `<div class="alarm-item">${a.text}</div>`).join('');
    }

    function updateStatusUi() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const lastData = document.getElementById('lastDataText');
      const deviceName = document.getElementById('deviceNameText');
      dot.classList.toggle('connected', state.connected);
      dot.classList.toggle('scanning', state.scanState === 'scanning' || Boolean(state.connectingDeviceAddress));
      text.textContent = state.connectionText;
      deviceName.textContent = getDeviceDisplayText();
      lastData.textContent = `最近数据：${state.lastDataAt ? new Date(state.lastDataAt).toLocaleTimeString('zh-CN', { hour12: false }) : '--'}`;
    }

    function renderLogs() {
      const container = document.getElementById('logList');
      if (!state.logs.length) {
        container.innerHTML = '<div class="empty-log">暂无日志</div>';
        return;
      }
      container.innerHTML = state.logs.map((item) => `<div class="log-item">${item}</div>`).join('');
    }

    function addLog(message) {
      const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      state.logs.unshift(`[${timestamp}] ${message}`);
      state.logs = state.logs.slice(0, 20);
      renderLogs();
    }

    function renderAll() {
      renderData();
      renderCurrentThresholds();
      renderDeviceList();
      renderAlarms();
      updateStatusUi();
      renderLogs();
    }

    function allSyncSettled() {
      return Object.values(state.waitingSync).every((flag) => !flag);
    }

    function maybeResolveThresholdSync(key, incomingValue) {
      if (!state.waitingSync[key]) return;
      const currentValue = Number(state.currentData[key]);
      if (Number.isNaN(incomingValue)) return;
      if (Math.abs(incomingValue - currentValue) < 0.0001) {
        state.waitingSync[key] = false;
      }
    }

    function normalizeNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function parseFrame(payload) {
      const parts = String(payload).trim().split(',');
      if (parts.length < 14) {
        addLog(`RX 无效帧: ${payload}`);
        return;
      }

      // 整数化编码解码：恢复乘数
      const parsed = {
        pm25: normalizeNumber(parts[0]) / 1,
        tvoc: normalizeNumber(parts[1]) / 100,
        uv: normalizeNumber(parts[2]) / 1,
        temp: normalizeNumber(parts[3]) / 10,
        acc_x: normalizeNumber(parts[4]) / 100,
        acc_y: normalizeNumber(parts[5]) / 100,
        acc_z: normalizeNumber(parts[6]) / 100,
        fall: normalizeNumber(parts[7]),
        fan_sta: normalizeNumber(parts[8]),
        system_mode: (normalizeNumber(parts[9]) === 0) ? 'AUTO' : 'MANUAL',
        pm25h: normalizeNumber(parts[10]) / 1,
        voch: normalizeNumber(parts[11]) / 10,
        uvh: normalizeNumber(parts[12]) / 10,
        temph: normalizeNumber(parts[13]) / 1
      };

      state.currentData.pm25 = parsed.pm25;
      state.currentData.tvoc = parsed.tvoc;
      state.currentData.uv = parsed.uv;
      state.currentData.temp = parsed.temp;
      state.currentData.acc_x = parsed.acc_x;
      state.currentData.acc_y = parsed.acc_y;
      state.currentData.acc_z = parsed.acc_z;
      state.currentData.fall = parsed.fall ?? 0;
      state.currentData.fan_sta = parsed.fan_sta ?? 0;
      state.currentData.system_mode = parsed.system_mode;

      maybeResolveThresholdSync('pm25h', parsed.pm25h);
      maybeResolveThresholdSync('voch', parsed.voch);
      maybeResolveThresholdSync('uvh', parsed.uvh);
      maybeResolveThresholdSync('temph', parsed.temph);

      if (!state.waitingSync.pm25h && parsed.pm25h !== null) state.currentData.pm25h = parsed.pm25h;
      if (!state.waitingSync.voch && parsed.voch !== null) state.currentData.voch = parsed.voch;
      if (!state.waitingSync.uvh && parsed.uvh !== null) state.currentData.uvh = parsed.uvh;
      if (!state.waitingSync.temph && parsed.temph !== null) state.currentData.temph = parsed.temph;

      state.connected = true;
      state.connectionText = '已连接';
      state.bluetoothAlarm = false;
      state.lastDataAt = Date.now();
      addLog(`RX ${String(payload).trim()}`);

      if (allSyncSettled()) {
        state.predictedAlarms = null;
      }

      renderAll();
    }

    function updatePredictedAlarms() {
      const alarms = computeAlarms();
      state.predictedAlarms = alarms;
      renderAlarms();
    }

    function sendRaw(text) {
      const payload = `${text}\n`;
      const bridge = window.BluetoothBridge;
      let sent = false;

      if (bridge && typeof bridge.send === 'function') {
        bridge.send(payload);
        sent = true;
      }

      addLog(`TX ${text}`);
      if (!sent) {
        addLog('未检测到蓝牙桥接对象，已保留发送日志');
      }
      return sent;
    }

    function sendCommand(command) {
      sendRaw(command);
    }

    function sendThreshold(key, code, inputId) {
      const input = document.getElementById(inputId);
      const raw = input.value.trim();
      if (!raw) {
        addLog(`阈值发送失败: ${code} 值为空`);
        return;
      }

      const value = Number(raw);
      if (!Number.isFinite(value)) {
        addLog(`阈值发送失败: ${code} 值非法`);
        return;
      }

      state.currentData[key] = value;
      state.waitingSync[key] = true;
      sendRaw(`${code},${raw}`);
      updatePredictedAlarms();
      renderCurrentThresholds();
      renderData();
    }

    function requestBluetoothConnect() {
      const bridge = window.BluetoothBridge;

      if (state.selectedDeviceAddress && bridge && typeof bridge.connect === 'function') {
        bridge.connect(state.selectedDeviceAddress);
        state.connectionText = '连接中...';
        state.connectingDeviceAddress = state.selectedDeviceAddress;
        addLog(`正在连接设备：${state.selectedDeviceAddress}`);
      } else {
        addLog('未选择设备或未检测到蓝牙桥接接口');
      }
      renderAll();
    }

    function requestBluetoothScan() {
      const bridge = window.BluetoothBridge;
      state.connectingDeviceAddress = '';

      if (bridge && typeof bridge.getPairedDevices === 'function') {
        bridge.getPairedDevices();
        state.connectionText = '扫描中...';
        setScanState('scanning');
        addLog('已请求扫描配对蓝牙设备');
      } else {
        addLog('未检测到蓝牙桥接接口');
      }
      renderAll();
    }

    function connectToScannedDevice(address, name) {
      const bridge = window.BluetoothBridge;
      const deviceAddress = address || state.selectedDeviceAddress;
      const deviceName = name || state.selectedDeviceName || deviceAddress;

      addLog(`[DEBUG connectToScannedDevice] address=${JSON.stringify(address)}, name=${JSON.stringify(name)}`);
      addLog(`[DEBUG] 解析后 address=${JSON.stringify(deviceAddress)}`);
      addLog(`[DEBUG] BluetoothBridge=${typeof bridge}`);
      addLog(`[DEBUG] bridge.connect=${typeof bridge?.connect}`);

      if (!deviceAddress) {
        addLog('连接失败：未选择设备');
        return;
      }

      state.selectedDeviceAddress = deviceAddress;
      state.selectedDeviceName = deviceName || deviceAddress;
      state.connectingDeviceAddress = deviceAddress;

      if (bridge && typeof bridge.connect === 'function') {
        addLog(`[DEBUG] 调用 bridge.connect(${JSON.stringify(deviceAddress)})`);
        bridge.connect(deviceAddress);
        state.connectionText = '连接中...';
        addLog(`正在连接设备：${deviceName}`);
        addLog(`[DEBUG] bridge.connect 调用完毕，等待 onBtConnected 回调...`);
      } else {
        state.connectingDeviceAddress = '';
        addLog('未检测到蓝牙桥接接口或 connect 方法不存在');
      }
      renderAll();
    }

    function markDisconnected(reason) {
      const bridge = window.BluetoothBridge;
      clearDisconnectAlarmTimer();
      if (bridge && typeof bridge.disconnect === 'function') {
        bridge.disconnect();
      }
      state.connected = false;
      state.connectionText = '未连接';
      state.bluetoothAlarm = false;
      state.connectingDeviceAddress = '';
      addLog(reason || '蓝牙连接断开');
      renderAll();
    }

    function setBluetoothAlarm(active) {
      state.bluetoothAlarm = Boolean(active);
      state.connectingDeviceAddress = '';
      if (active) {
        state.connected = false;
        state.connectionText = '断链报警';
        addLog('蓝牙断开持续超过 3 秒');
      }
      if (!allSyncSettled()) {
        updatePredictedAlarms();
      } else {
        renderAlarms();
      }
      updateStatusUi();
    }

    function toggleLogs() {
      state.logsExpanded = !state.logsExpanded;
      document.getElementById('logsBody').classList.toggle('expanded', state.logsExpanded);
      document.getElementById('logsToggle').textContent = state.logsExpanded ? '收起' : '展开';
    }

    // ==================== 初始化 ====================

    // ESP32-S3 使用 BLE 模式，页面加载后立即设置
    (function initBtMode() {
      const bridge = window.BluetoothBridge;
      if (bridge && typeof bridge.setMode === 'function') {
        bridge.setMode('ble');
        addLog('已设置蓝牙模式: BLE (NUS)');
      } else {
        addLog('未检测到蓝牙桥接接口，等待 Android WebView 注入');
      }
    })();

    // 蓝牙断链报警定时器：断开超过 3 秒触发断链报警
    let btDisconnectTimer = null;

    function startDisconnectAlarmTimer() {
      if (btDisconnectTimer) return;
      btDisconnectTimer = setTimeout(function() {
        setBluetoothAlarm(true);
        btDisconnectTimer = null;
      }, 3000);
    }

    function clearDisconnectAlarmTimer() {
      if (btDisconnectTimer) {
        clearTimeout(btDisconnectTimer);
        btDisconnectTimer = null;
      }
    }

    // ==================== Android WebView 回调（仅文档中定义的 5 个） ====================

    window.onBtDeviceList = function(deviceArray) {
      addLog(`[DEBUG onBtDeviceList] 原始参数类型: ${typeof deviceArray}, 长度: ${deviceArray?.length}`);
      if (Array.isArray(deviceArray) && deviceArray.length > 0) {
        deviceArray.forEach((d, i) => {
          addLog(`[DEBUG] 设备[${i}] 原始数据: ${JSON.stringify(d)}`);
          const norm = normalizeDevice(d);
          addLog(`[DEBUG] 设备[${i}] 标准化后: name="${norm?.name}" address="${norm?.address}"`);
        });
      }
      handleDeviceList(deviceArray);
    };

    window.onBtConnected = function(address) {
      addLog(`[DEBUG onBtConnected] 原始参数: ${JSON.stringify(address)}, 类型: ${typeof address}`);
      clearDisconnectAlarmTimer();
      state.connected = true;
      state.connectingDeviceAddress = '';
      state.connectionText = '已连接';
      state.bluetoothAlarm = false;
      state.selectedDeviceAddress = address;
      state.selectedDeviceName = state.selectedDeviceName || String(address);
      addLog(`蓝牙已连接：${address}`);
      renderAll();
    };

    window.onBtDisconnected = function() {
      addLog('[DEBUG onBtDisconnected] 收到断开连接回调');
      startDisconnectAlarmTimer();
    };

    window.onBtError = function(errMsg) {
      addLog(`[DEBUG onBtError] 错误信息: ${JSON.stringify(errMsg)}`);
      state.connectingDeviceAddress = '';
      state.connectionText = '未连接';
      setScanState('done');
      addLog(`蓝牙错误：${errMsg}`);
      renderAll();
    };

    window.onBtData = function(line) {
      addLog(`[RX RAW] ${String(line).substring(0, 120)} (len=${line.length})`);
      // Check for frame header "#N/M:"
      var match = line.match(/^(\d+)\/(\d+):(.+)$/);
      if (match) {
        var num = parseInt(match[1]);
        var total = parseInt(match[2]);
        var data = match[3];
        state.rxFrame.parts[num] = data;
        if (num === total && Object.keys(state.rxFrame.parts).length === total) {
          // All chunks received, reassemble
          var full = '';
          for (var i = 1; i <= total; i++) full += state.rxFrame.parts[i];
          addLog(`[RX] 重组帧: ${full}`);
          state.rxFrame = { num: 0, total: 0, parts: {} };
          parseFrame(full.trim());
        }
        return;
      }
      // No frame header, parse directly (backward compatible)
      parseFrame(line.trim());
    };

    renderAll();
  </script>
</body>
</html>
