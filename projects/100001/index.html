<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老人健康监护系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            padding: 44px 12px 20px;
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--sub);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-dot.connected { background: var(--ok); }
        .status-dot.disconnected { background: var(--alarm); }
        .status-dot.bluetooth { background: #9C27B0; }

        /* ===== 实时数据 ===== */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .data-number {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-unit {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value.alarm .data-number {
            color: var(--alarm);
        }

        /* ===== 报警状态 ===== */
        .alarm-status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        .alarm-status.normal {
            background: #E8F5E9;
            color: var(--ok);
        }
        .alarm-status.warning {
            background: #FFEBEE;
            color: var(--alarm);
        }
        .alarm-item {
            display: inline-block;
            padding: 4px 12px;
            background: var(--alarm);
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px;
        }

        /* ===== 蓝牙 RSSI ===== */
        .rssi-bar-wrap {
            padding: 8px 0;
        }
        .rssi-bar-bg {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .rssi-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A, #FFC107, #F44336);
            transition: width 0.3s;
        }
        .rssi-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
            color: var(--sub);
        }
        .rssi-distance {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        /* ===== 按钮 ===== */
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 120px;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-danger {
            background: var(--alarm);
            color: #fff;
        }
        .btn-secondary {
            background: #9E9E9E;
            color: #fff;
        }

        /* ===== 阈值设置 ===== */
        .threshold-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .threshold-input {
            width: 80px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .threshold-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-small {
            width: 60px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        /* ===== 日志 ===== */
        .log-wrap {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: var(--sub);
        }
        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .log-wrap.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        /* ===== 蓝牙连接按钮 ===== */
        .bluetooth-btn-wrap {
            margin-top: 12px;
        }
        .bluetooth-status {
            font-size: 12px;
            color: var(--sub);
            margin-top: 8px;
        }

        /* ===== 隐藏类 ===== */
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- 状态栏 -->
    <div class="card status-bar">
        <div class="status-item">
            <span class="status-dot" id="mqttDot"></span>
            <span>MQTT: <span id="mqttStatus">未连接</span></span>
        </div>
        <div class="status-item">
            <span class="status-dot" id="btDot"></span>
            <span>蓝牙：<span id="btStatus">未连接</span></span>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">实时数据</div>
        <div class="data-row">
            <span class="data-label">心率</span>
            <div class="data-value" id="hrValue">
                <span class="data-number" id="heartRate">--</span>
                <span class="data-unit">BPM</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">血氧</span>
            <div class="data-value" id="spo2Value">
                <span class="data-number" id="spo2">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">体温</span>
            <div class="data-value" id="tempValue">
                <span class="data-number" id="bodyTemp">--</span>
                <span class="data-unit">°C</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">GPS</span>
            <div class="data-value">
                <span class="data-number" style="font-size:16px" id="gpsCoord">--</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">跌倒状态</span>
            <div class="data-value">
                <span class="data-number" style="font-size:18px" id="fallStatus">正常</span>
            </div>
        </div>
    </div>

    <!-- 报警状态卡 -->
    <div class="card" id="alarmCard">
        <div class="card-title">报警状态</div>
        <div class="alarm-status normal" id="alarmStatus">
            运行正常 ✓
        </div>
    </div>

    <!-- 蓝牙 RSSI 卡 -->
    <div class="card">
        <div class="card-title">蓝牙定位 (JDY-31)</div>
        <div class="rssi-bar-wrap">
            <div class="rssi-bar-bg">
                <div class="rssi-bar-fill" id="rssiBar" style="width: 0%"></div>
            </div>
            <div class="rssi-info">
                <span>RSSI: <span id="rssiValue">--</span> dBm</span>
                <span class="rssi-distance" id="rssiDistance">--</span>
            </div>
        </div>
        <div class="bluetooth-btn-wrap">
            <button class="btn btn-primary" onclick="connectBluetooth()" style="width:100%">
                🔗 连接蓝牙
            </button>
            <div class="bluetooth-status" id="btDebug">等待连接...</div>
        </div>
    </div>

    <!-- 控制卡 -->
    <div class="card">
        <div class="card-title">控制</div>
        <div class="btn-row">
            <button class="btn btn-danger" onclick="sendClearAlarm()">🔕 消警</button>
            <button class="btn btn-secondary" onclick="disconnectMQTT()">断开连接</button>
        </div>
    </div>

    <!-- 阈值设置卡 -->
    <div class="card">
        <div class="card-title">阈值设置</div>
        <div class="threshold-row">
            <span class="data-label">心率上限</span>
            <div>
                <input type="number" class="threshold-input" id="hrThresholdMaxInput" value="90" min="85" max="120">
                <button class="btn-small" onclick="setHrThresholdMax()">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="data-label">心率下限</span>
            <div>
                <input type="number" class="threshold-input" id="hrThresholdMinInput" value="60" min="50" max="80">
                <button class="btn-small" onclick="setHrThresholdMin()">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="data-label">血氧下限</span>
            <div>
                <input type="number" class="threshold-input" id="spo2ThresholdInput" value="95" min="90" max="99">
                <button class="btn-small" onclick="setSpo2Threshold()">发送</button>
            </div>
        </div>
    </div>

    <!-- 阈值显示卡（只读） -->
    <div class="card">
        <div class="card-title">当前阈值（下位机上报）</div>
        <div class="data-row">
            <span class="data-label">心率上限</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="hrThresholdMaxDisplay">--</span>
                <span class="data-unit">BPM</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">心率下限</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="hrThresholdMinDisplay">--</span>
                <span class="data-unit">BPM</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">血氧下限</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="spo2ThresholdDisplay">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
    </div>

    <!-- 日志卡 -->
    <div class="card">
        <div class="log-header" onclick="toggleLog()">
            <div class="card-title" style="margin:0">系统日志</div>
            <span style="font-size:12px;color:var(--sub)">▼ 点击展开</span>
        </div>
        <div class="log-wrap collapsed" id="logWrap"></div>
    </div>

    <script>
        // ==================== MQTT 配置 ====================
        const MQTT_CONFIG = {
            host: 'broker.emqx.io',
            port: 8083,
            path: '/mqtt',
            clientId: 'laoren_' + Math.random().toString(36).substr(2, 6)
        };
        const TOPIC_UPLOAD = '401/657/laorenjianhu/upload';
        const TOPIC_CMD = '401/657/laorenjianhu/cmd';

        // ==================== 全局状态 ====================
        let mqttClient = null;
        let isConnected = false;
        let logs = [];
        let currentData = {
            heartRate: null,
            spo2: null,
            bodyTemp: null,
            gpsLat: null,
            gpsLng: null,
            fall: 0,
            manualAlarm: 0,  // 新增手动报警字段
            sos: 0,
            hrThresholdMax: null,  // 心率上限
            hrThresholdMin: null,  // 心率下限
            spo2Threshold: null
        };

        // 防抖保护
        let lastUserSetTime = { hrMax: 0, hrMin: 0, spo2: 0 };
        const DEBOUNCE_MS = 500;

        // 蓝牙状态
        let bluetoothSocket = null;
        let isBluetoothConnected = false;
        let rssiValues = [];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            connectMQTT();
            addLog('系统初始化完成');
        });

        // ==================== MQTT 连接 ====================
        function connectMQTT() {
            addLog('正在连接 MQTT...');
            try {
                mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                    clientId: MQTT_CONFIG.clientId,
                    reconnectPeriod: 3000,
                    connectTimeout: 10000
                });
                    connectTimeout: 10000
                });

                mqttClient.on('connect', () => {
                    isConnected = true;
                    updateMqttStatus(true);
                    mqttClient.subscribe(TOPIC_UPLOAD, () => {
                        addLog(`已订阅：${TOPIC_UPLOAD}`);
                    });
                    addLog('MQTT 连接成功');
                });

                mqttClient.on('message', (topic, payload) => {
                    if (topic === TOPIC_UPLOAD) {
                        parseMessage(payload.toString());
                    }
                });

                mqttClient.on('error', (err) => {
                    addLog('MQTT 错误：' + err.message);
                });

                mqttClient.on('close', () => {
                    isConnected = false;
                    updateMqttStatus(false);
                    addLog('MQTT 连接已关闭');
                });

                mqttClient.on('reconnect', () => {
                    addLog('MQTT 重连中...');
                });
            } catch (err) {
                addLog('MQTT 连接失败：' + err.message);
            }
        }

        function disconnectMQTT() {
            if (mqttClient) {
                mqttClient.end();
                mqttClient = null;
                isConnected = false;
                updateMqttStatus(false);
                addLog('已手动断开 MQTT');
            }
        }

        function updateMqttStatus(connected) {
            const dot = document.getElementById('mqttDot');
            const text = document.getElementById('mqttStatus');
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '未连接';
            }
        }

        // ==================== 解析上行数据 ====================
        // 格式：心率，血氧，体温，跌倒，手动报警，纬度，经度，SOS，心率上限，心率下限，血氧下限
        function parseMessage(message) {
            const parts = message.split(',');
            if (parts.length < 11) {
                addLog('数据格式错误：' + message);
                return;
            }

            const now = Date.now();
            const newData = {
                heartRate: parseInt(parts[0]) || 0,
                spo2: parseInt(parts[1]) || 0,
                bodyTemp: parseFloat(parts[2]) || 0,
                fall: parseInt(parts[3]) || 0,
                manualAlarm: parseInt(parts[4]) || 0,  // 新增手动报警字段
                gpsLat: parseFloat(parts[5]) || 0,
                gpsLng: parseFloat(parts[6]) || 0,
                sos: parseInt(parts[7]) || 0,
                hrThresholdMax: parseInt(parts[8]) || 90,    // 心率上限
                hrThresholdMin: parseInt(parts[9]) || 60,    // 心率下限
                spo2Threshold: parseInt(parts[10]) || 95
            };

            // 更新数据（防抖保护）- 0 值也更新，表示数据无效
            currentData.heartRate = newData.heartRate;
            currentData.spo2 = newData.spo2;
            currentData.bodyTemp = newData.bodyTemp;
            if (newData.gpsLat !== 0 || newData.gpsLng !== 0) {
                currentData.gpsLat = newData.gpsLat;
                currentData.gpsLng = newData.gpsLng;
            }
            currentData.fall = newData.fall;
            currentData.manualAlarm = newData.manualAlarm;  // 更新手动报警
            currentData.sos = newData.sos;

            // 阈值更新（带防抖）
            if (!lastUserSetTime.hrMax || (now - lastUserSetTime.hrMax) >= DEBOUNCE_MS) {
                currentData.hrThresholdMax = newData.hrThresholdMax;
            }
            if (!lastUserSetTime.hrMin || (now - lastUserSetTime.hrMin) >= DEBOUNCE_MS) {
                currentData.hrThresholdMin = newData.hrThresholdMin;
            }
            if (!lastUserSetTime.spo2 || (now - lastUserSetTime.spo2) >= DEBOUNCE_MS) {
                currentData.spo2Threshold = newData.spo2Threshold;
            }

            updateUI();
            checkAlarms();
            addLog(`收到：${message}`);
        }

        // ==================== 更新 UI ====================
        function updateUI() {
            // 心率 - 0 值显示"--"
            const hrEl = document.getElementById('heartRate');
            if (currentData.heartRate === null || currentData.heartRate === 0) {
                hrEl.textContent = '--';
            } else {
                hrEl.textContent = currentData.heartRate;
            }

            // 血氧 - 0 值显示"--"
            const spo2El = document.getElementById('spo2');
            if (currentData.spo2 === null || currentData.spo2 === 0) {
                spo2El.textContent = '--';
            } else {
                spo2El.textContent = currentData.spo2;
            }
            // 体温（从血氧估算或传感器）
            if (currentData.bodyTemp !== null) {
                document.getElementById('bodyTemp').textContent = currentData.bodyTemp.toFixed(1);
            }
            // GPS
            if (currentData.gpsLat !== null && currentData.gpsLat !== 0) {
                const latStr = currentData.gpsLat > 0 ? 'N' : 'S';
                const lngStr = currentData.gpsLng > 0 ? 'E' : 'W';
                document.getElementById('gpsCoord').textContent =
                    `${latStr}${Math.abs(currentData.gpsLat).toFixed(4)} ${lngStr}${Math.abs(currentData.gpsLng).toFixed(4)}`;
            } else {
                document.getElementById('gpsCoord').textContent = '定位中...';
            }
            // 跌倒状态
            const fallEl = document.getElementById('fallStatus');
            fallEl.textContent = currentData.fall === 1 ? '跌倒！' : '正常';
            if (currentData.fall === 1) {
                fallEl.style.color = 'var(--alarm)';
            } else {
                fallEl.style.color = 'var(--text)';
            }

            // 阈值显示
            if (currentData.hrThresholdMax !== null) {
                document.getElementById('hrThresholdMaxDisplay').textContent = currentData.hrThresholdMax;
            }
            if (currentData.hrThresholdMin !== null) {
                document.getElementById('hrThresholdMinDisplay').textContent = currentData.hrThresholdMin;
            }
            if (currentData.spo2Threshold !== null) {
                document.getElementById('spo2ThresholdDisplay').textContent = currentData.spo2Threshold;
            }
        }

        // ==================== 报警判断 ====================
        function checkAlarms() {
            const alarms = [];
            const alarmStatus = document.getElementById('alarmStatus');

            // 跌倒检测
            if (currentData.fall === 1) {
                alarms.push('跌倒检测');
            }

            // 手动报警
            if (currentData.manualAlarm === 1) {
                alarms.push('手动报警');
            }

            // 心率超限（使用动态阈值）- 0 值不报警
            if (currentData.heartRate !== null && currentData.heartRate > 0 && currentData.hrThresholdMax !== null) {
                if (currentData.heartRate > currentData.hrThresholdMax) {
                    alarms.push('心率超限');
                }
            }
            // 心率过低 - 0 值不报警
            if (currentData.heartRate !== null && currentData.heartRate > 0 && currentData.hrThresholdMin !== null) {
                if (currentData.heartRate < currentData.hrThresholdMin) {
                    alarms.push('心率过低');
                }
            }

            // 血氧过低（使用动态阈值）- 0 值不报警
            if (currentData.spo2 !== null && currentData.spo2 > 0 && currentData.spo2Threshold !== null) {
                if (currentData.spo2 < currentData.spo2Threshold) {
                    alarms.push('血氧过低');
                }
            }

            // SOS
            if (currentData.sos === 1) {
                alarms.push('SOS');
            }

            if (alarms.length === 0) {
                alarmStatus.className = 'alarm-status normal';
                alarmStatus.innerHTML = '运行正常 ✓';
            } else {
                alarmStatus.className = 'alarm-status warning';
                alarmStatus.innerHTML = alarms.map(a => `<span class="alarm-item">${a}</span>`).join('');
            }

            // 高亮数据 - 0 值不高亮
            const hrHighAlarm = (currentData.heartRate !== null && currentData.heartRate > 0 &&
                                currentData.hrThresholdMax !== null &&
                                currentData.heartRate > currentData.hrThresholdMax);
            const hrLowAlarm = (currentData.heartRate !== null && currentData.heartRate > 0 &&
                               currentData.hrThresholdMin !== null &&
                               currentData.heartRate < currentData.hrThresholdMin);
            const spo2Alarm = (currentData.spo2 !== null && currentData.spo2 > 0 &&
                              currentData.spo2Threshold !== null &&
                              currentData.spo2 < currentData.spo2Threshold);

            document.getElementById('hrValue').classList.toggle('alarm', hrHighAlarm || hrLowAlarm);
            document.getElementById('spo2Value').classList.toggle('alarm', spo2Alarm);
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            if (mqttClient && isConnected) {
                mqttClient.publish(TOPIC_CMD, cmd);
                addLog(`发送指令：${cmd}`);
            } else {
                addLog('MQTT 未连接，无法发送指令');
            }
        }

        function sendClearAlarm() {
            sendCmd('01');
        }

        function setHrThresholdMax() {
            const val = document.getElementById('hrThresholdMaxInput').value;
            if (!val || val < 85 || val > 120) {
                alert('请输入有效的心率上限 (85-120)');
                return;
            }
            lastUserSetTime.hrMax = Date.now();
            sendCmd(`02,${val}`);
            // 乐观更新
            currentData.hrThresholdMax = parseInt(val);
            updateUI();
        }

        function setHrThresholdMin() {
            const val = document.getElementById('hrThresholdMinInput').value;
            if (!val || val < 50 || val > 80) {
                alert('请输入有效的心率下限 (50-80)');
                return;
            }
            lastUserSetTime.hrMin = Date.now();
            sendCmd(`03,${val}`);
            // 乐观更新
            currentData.hrThresholdMin = parseInt(val);
            updateUI();
        }

        function setSpo2Threshold() {
            const val = document.getElementById('spo2ThresholdInput').value;
            if (!val || val < 90 || val > 99) {
                alert('请输入有效的血氧下限 (90-99)');
                return;
            }
            lastUserSetTime.spo2 = Date.now();
            sendCmd(`04,${val}`);
            // 乐观更新
            currentData.spo2Threshold = parseInt(val);
            updateUI();
        }

        // ==================== 日志 ====================
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            logs.unshift(`[${timestamp}] ${message}`);
            if (logs.length > 50) logs.pop();
            renderLogs();
        }

        function renderLogs() {
            const wrap = document.getElementById('logWrap');
            wrap.innerHTML = logs.map(log => `<div class="log-item">${escapeHtml(log)}</div>`).join('');
        }

        function toggleLog() {
            const wrap = document.getElementById('logWrap');
            wrap.classList.toggle('collapsed');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== 蓝牙功能（Android BluetoothBridge 对接） ====================
        function connectBluetooth() {
            if (isBluetoothConnected) {
                disconnectBluetooth();
                return;
            }

            addLog('正在扫描蓝牙设备...');
            document.getElementById('btDebug').textContent = '正在扫描设备...';

            // 调用 Android 原生蓝牙扫描
            if (window.BluetoothBridge) {
                window.BluetoothBridge.getPairedDevices();
            } else {
                // 降级：非 Android 环境使用模拟数据
                addLog('未检测到 Android 环境，使用模拟数据');
                simulateRssi();
            }
        }

        function disconnectBluetooth() {
            if (window.BluetoothBridge) {
                window.BluetoothBridge.disconnect();
            }
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
            document.getElementById('btDebug').textContent = '已断开连接';
            document.getElementById('rssiBar').style.width = '0%';
            document.getElementById('rssiValue').textContent = '--';
            document.getElementById('rssiDistance').textContent = '--';
            addLog('蓝牙已断开');
        }

        function updateBluetoothStatus(connected) {
            const dot = document.getElementById('btDot');
            const text = document.getElementById('btStatus');
            if (connected) {
                dot.className = 'status-dot bluetooth';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '未连接';
            }
        }

        function simulateRssi() {
            if (!isBluetoothConnected) return;

            // 模拟 RSSI 变化 (-30 到 -90 dBm)
            const rssi = Math.floor(-30 - Math.random() * 60);
            updateRssiDisplay(rssi);
            rssiValues.push(rssi);
            if (rssiValues.length > 10) rssiValues.shift();

            setTimeout(simulateRssi, 2000);
        }

        function updateRssiDisplay(rssi) {
            document.getElementById('rssiValue').textContent = rssi;

            // 计算信号强度条 (0-100%)
            // RSSI 范围：-30 (很强) 到 -90 (很弱)
            const percentage = Math.max(0, Math.min(100, ((rssi + 90) / 60) * 100));
            document.getElementById('rssiBar').style.width = percentage + '%';

            // 距离估算
            let distance = '';
            if (rssi > -50) {
                distance = '很近 (<1m)';
            } else if (rssi > -65) {
                distance = '近 (1-3m)';
            } else if (rssi > -75) {
                distance = '中等 (3-5m)';
            } else {
                distance = '远 (>5m)';
            }
            document.getElementById('rssiDistance').textContent = distance;
        }

        // ==================== Android 回调函数（BluetoothBridge 调用） ====================
        // 扫描到设备列表
        window.onBtDeviceList = function(deviceArray) {
            addLog('扫描到 ' + deviceArray.length + ' 个设备');
            // 如果有设备，自动连接第一个 HC-05 或 JDY 开头的
            const target = deviceArray.find(d =>
                d.name && (d.name.includes('HC-05') || d.name.includes('JDY'))
            );
            if (target) {
                addLog('发现目标设备：' + target.name);
                if (window.BluetoothBridge) {
                    window.BluetoothBridge.connect(target.address);
                }
            } else if (deviceArray.length > 0) {
                // 没有 HC-05/JDY，连接第一个
                if (window.BluetoothBridge) {
                    window.BluetoothBridge.connect(deviceArray[0].address);
                }
            }
        };

        // 连接成功
        window.onBtConnected = function(address) {
            isBluetoothConnected = true;
            updateBluetoothStatus(true);
            document.getElementById('btDebug').textContent = '已连接：' + address;
            addLog('蓝牙连接成功：' + address);
        };

        // 断开连接
        window.onBtDisconnected = function() {
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
            document.getElementById('btDebug').textContent = '已断开连接';
            addLog('蓝牙已断开');
        };

        // 错误通知
        window.onBtError = function(errMsg) {
            addLog('蓝牙错误：' + errMsg);
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
        };

        // 接收数据（透传）
        window.onBtData = function(line) {
            // 蓝牙透传数据到达，可以在这里处理 RSSI 或其他数据
            addLog('蓝牙数据：' + line);
            try {
                const parsed = JSON.parse(line);
                if (parsed.rssi !== undefined) {
                    updateRssiDisplay(parsed.rssi);
                    rssiValues.push(parsed.rssi);
                    if (rssiValues.length > 10) rssiValues.shift();
                }
            } catch (e) {
                // 非 JSON 数据，可能是 RSSI 原始值
                const rssi = parseInt(line);
                if (!isNaN(rssi)) {
                    updateRssiDisplay(rssi);
                }
            }
        };

        // ==================== 报警通知（Android WebView 接口） ====================
        function sendAlarmToNative(data) {
            if (window.Android) {
                window.Android.onAlarm(JSON.stringify(data));
            } else if (window.Notification && Notification.permission === 'granted') {
                new Notification('告警', { body: JSON.stringify(data) });
            }
        }
    </script>
</body>
</html>
