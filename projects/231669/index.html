<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>种植监测系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #333;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            padding: 8px 14px;
            border-bottom: 1px solid #e8eef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f0f7ff 0%, #f5fffb 100%);
            flex-shrink: 0;
        }
        .header h1 { font-size: 15px; font-weight: 600; color: #2c5a4a; }
        .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #999; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ddd; }
        .status-dot.connected { background: #51cf66; }

        /* 警告 */
        .alert-bar {
            display: none;
            padding: 5px 14px;
            background: #fff3cd;
            border-bottom: 1px solid #ffeaa7;
            font-size: 11px;
            color: #856404;
            flex-shrink: 0;
        }
        .alert-bar.show { display: flex; gap: 10px; flex-wrap: wrap; }

        /* 主体滚动区 */
        .body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 8px 10px;
            gap: 7px;
        }

        /* 水位 + 传感器 合并一行 */
        .top-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            flex-shrink: 0;
        }
        .sensor-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            flex-shrink: 0;
        }

        .card {
            background: #f8fafb;
            border: 1px solid #e8eef5;
            border-radius: 7px;
            padding: 7px 4px;
            text-align: center;
        }
        .card.blue  { border-top: 2px solid #42a5f5; }
        .card.green { border-top: 2px solid #66bb6a; }
        .card.orange{ border-top: 2px solid #ffa726; }
        .card.teal  { border-top: 2px solid #26c6da; }

        .card-icon  { font-size: 14px; line-height: 1; }
        .card-label { font-size: 9px; color: #999; margin: 2px 0; }
        .card-value { font-size: 18px; font-weight: 700; line-height: 1; }
        .card-unit  { font-size: 9px; color: #bbb; }
        .card.blue  .card-value { color: #1976d2; }
        .card.green .card-value { color: #2c7f3a; }
        .card.orange .card-value{ color: #f57c00; }
        .card.teal  .card-value { color: #00838f; }

        /* 分隔标题 */
        .row-title {
            font-size: 10px;
            font-weight: 600;
            color: #2c5a4a;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .row-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8eef5;
        }

        /* 模式徽章 */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        .mode-badge.auto { background: #d3f9d8; color: #2c7f3a; }
        .mode-badge.manual { background: #fff3cd; color: #856404; }
        .mode-btn {
            padding: 2px 8px;
            border: 1px solid #ccc;
            background: #fff;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .mode-btn:active { background: #eee; }

        /* 设备控制：一行3个 */
        .device-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            flex-shrink: 0;
        }
        .device-card {
            background: #f8fafb;
            border: 1px solid #e8eef5;
            border-radius: 7px;
            padding: 7px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .device-name {
            font-size: 11px;
            font-weight: 500;
            color: #444;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .device-btns { display: flex; gap: 5px; }
        .btn-on, .btn-off {
            width: 36px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-on  { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
        .btn-off { background: #fce4ec; color: #c62828; border-color: #ef9a9a; }
        .btn-on.active  { background: #51cf66; color: white; border-color: #51cf66; }
        .btn-off.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }
        .btn-on:active  { opacity: 0.75; }
        .btn-off:active { opacity: 0.75; }
        .btn-on:disabled, .btn-off:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(1); }

        /* 参数设置：3行，每行一个阈值 */
        .param-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }
        .param-card {
            background: #f8fafb;
            border: 1px solid #e8eef5;
            border-radius: 7px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .param-name {
            font-size: 11px;
            color: #555;
            width: 72px;
            flex-shrink: 0;
        }
        .param-cur-wrap {
            display: flex;
            align-items: baseline;
            gap: 2px;
            flex: 1;
        }
        .param-cur  { font-size: 14px; font-weight: 700; color: #1976d2; }
        .param-cur-unit { font-size: 9px; color: #bbb; }
        .param-input {
            width: 64px;
            padding: 4px 6px;
            border: 1px solid #dde;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            flex-shrink: 0;
        }
        .param-send {
            padding: 5px 10px;
            background: #51cf66;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .param-send:active { background: #40c057; }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🌱 种植监测系统</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">连接中</span>
        </div>
    </div>

    <!-- 警告条 -->
    <div class="alert-bar" id="alertBar"></div>

    <div class="body">
        <!-- 水位行 -->
        <div class="row-title">💧 水箱</div>
        <div class="top-row">
            <div class="card teal" style="grid-column: span 2;">
                <div class="card-icon">📏</div>
                <div class="card-label">水位</div>
                <div class="card-value" id="waterHeight">--</div>
                <div class="card-unit">cm</div>
            </div>
            <div class="card blue" style="grid-column: span 2;">
                <div class="card-icon">🪣</div>
                <div class="card-label">储量</div>
                <div class="card-value" id="waterVolume">--</div>
                <div class="card-unit">升</div>
            </div>
        </div>

        <!-- 传感器行 -->
        <div class="row-title">📊 传感器</div>
        <div class="sensor-row">
            <div class="card blue">
                <div class="card-icon">🌡️</div>
                <div class="card-label">温度</div>
                <div class="card-value" id="temperature">--</div>
                <div class="card-unit">°C</div>
            </div>
            <div class="card blue">
                <div class="card-icon">💧</div>
                <div class="card-label">湿度</div>
                <div class="card-value" id="humidity">--</div>
                <div class="card-unit">%</div>
            </div>
            <div class="card orange">
                <div class="card-icon">☀️</div>
                <div class="card-label">光照</div>
                <div class="card-value" id="light">--</div>
                <div class="card-unit">lux</div>
            </div>
            <div class="card green">
                <div class="card-icon">🌿</div>
                <div class="card-label">土壤</div>
                <div class="card-value" id="soil">--</div>
                <div class="card-unit">%</div>
            </div>
            <div class="card orange">
                <div class="card-icon">💨</div>
                <div class="card-label">CO₂</div>
                <div class="card-value" id="co2">--</div>
                <div class="card-unit">ppm</div>
            </div>
        </div>

        <!-- 设备控制 -->
        <div class="row-title">⚙️ 控制</div>
        <!-- 模式切换 -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;flex-shrink:0;">
            <span style="font-size:10px;color:#666;">🔄 模式</span>
            <span class="mode-badge auto" id="modeBadge">AUTO</span>
            <button class="mode-btn" onclick="toggleMode()">切换</button>
        </div>
        <div class="device-row">
            <div class="device-card">
                <div class="device-name">🚰 雨水泵</div>
                <div class="device-btns">
                    <button class="btn-on"  id="btn-rain-on"  onclick="control('rain','on')">开</button>
                    <button class="btn-off" id="btn-rain-off" onclick="control('rain','off')">关</button>
                </div>
            </div>
            <div class="device-card">
                <div class="device-name">💦 自来水</div>
                <div class="device-btns">
                    <button class="btn-on"  id="btn-tap-on"  onclick="control('tap','on')">开</button>
                    <button class="btn-off" id="btn-tap-off" onclick="control('tap','off')">关</button>
                </div>
            </div>
            <div class="device-card">
                <div class="device-name">🌀 补光</div>
                <div class="device-btns">
                    <button class="btn-on"  id="btn-fan-on"  onclick="control('fan','on')">开</button>
                    <button class="btn-off" id="btn-fan-off" onclick="control('fan','off')">关</button>
                </div>
            </div>
        </div>

        <!-- 参数设置 -->
        <div class="row-title">🎚️ 阈值设置</div>
        <div class="param-row">
            <div class="param-card">
                <div class="param-name">💧 雨水</div>
                <div class="param-cur-wrap">
                    <span class="param-cur" id="cur_t1">--</span>
                    <span class="param-cur-unit">cm</span>
                </div>
                <input type="number" class="param-input" id="threshold1" placeholder="50">
                <button class="param-send" onclick="sendThreshold(1)">发送</button>
            </div>
            <div class="param-card">
                <div class="param-name">🌿 土壤</div>
                <div class="param-cur-wrap">
                    <span class="param-cur" id="cur_t2">--</span>
                    <span class="param-cur-unit">%</span>
                </div>
                <input type="number" class="param-input" id="threshold2" placeholder="35">
                <button class="param-send" onclick="sendThreshold(2)">发送</button>
            </div>
            <div class="param-card">
                <div class="param-name">☀️ 光照</div>
                <div class="param-cur-wrap">
                    <span class="param-cur" id="cur_t3">--</span>
                    <span class="param-cur-unit">lux</span>
                </div>
                <input type="number" class="param-input" id="threshold3" placeholder="300">
                <button class="param-send" onclick="sendThreshold(3)">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    const MQTT_BROKER  = 'wss://broker.emqx.io:8084/mqtt';
    const TOPIC_UPLOAD = '123124/234235/zhihuiyushui/upload';
    const TOPIC_CMD    = '123124/234235/zhihuiyushui/cmd';

    let client = null, lastData = {};
    let currentMode = 1; // 1=AUTO, 0=MANUAL
    let canSend = true;
    let sendCooldown = 300; // 冷却 ms
    let deviceProtected = { rain: false, tap: false, fan: false, mode: false };
    let pendingValue = { rain: null, tap: null, fan: null, mode: null, t1: null, t2: null, t3: null };
    let userIntent = { rain: null, tap: null, fan: null }; // 用户最后设置的值，永不自动覆盖

    function randomId() {
        return 'web_' + Math.random().toString(16).slice(2) + '_' + Date.now().toString(16);
    }

    function initMQTT() {
        client = mqtt.connect(MQTT_BROKER, {
            clientId: randomId(), clean: true, keepalive: 30,
            connectTimeout: 10000, reconnectPeriod: 2000
        });
        client.on('connect',    () => { setStatus(true);  client.subscribe(TOPIC_UPLOAD, {qos:0}); });
        client.on('message',    (t, m) => { if (t === TOPIC_UPLOAD) handleData(m.toString()); });
        client.on('reconnect',  () => setStatus(false));
        client.on('disconnect', () => setStatus(false));
        client.on('close',      () => setStatus(false));
        client.on('offline',    () => setStatus(false));
        client.on('error',      () => setStatus(false));
    }

    function setStatus(ok) {
        document.getElementById('statusDot').classList.toggle('connected', ok);
        document.getElementById('statusText').textContent = ok ? '已连接' : '连接中';
    }

    function handleData(data) {
        try {
            const p = data.split(',');
            if (p.length < 11) return;
            console.log('[MQTT recv]', data);
            // 传感器数据始终更新
            lastData.waterHeight = parseInt(p[0]);
            lastData.waterVolume = parseInt(p[1]);
            lastData.temperature = parseInt(p[2]);
            lastData.humidity    = parseInt(p[3]);
            lastData.light       = parseInt(p[4]);
            lastData.soil        = parseInt(p[5]);
            lastData.co2         = parseInt(p[6]);
            const now = Date.now();
            // 设备状态：用户设置过就用用户的意图值，否则用ESP32上报值
            const rainReported = parseInt(p[7]);
            console.log('[rain] reported:', rainReported, 'userIntent:', userIntent.rain, 'protected:', deviceProtected.rain);
            if (deviceProtected.rain && rainReported === pendingValue.rain) {
                console.log('[rain] CONFIRMED');
                deviceProtected.rain = false; pendingValue.rain = null;
            }
            lastData.rainPump = userIntent.rain !== null ? userIntent.rain : rainReported;

            const tapReported = parseInt(p[8]);
            console.log('[tap] reported:', tapReported, 'userIntent:', userIntent.tap, 'protected:', deviceProtected.tap);
            if (deviceProtected.tap && tapReported === pendingValue.tap) {
                console.log('[tap] CONFIRMED');
                deviceProtected.tap = false; pendingValue.tap = null;
            }
            lastData.tapPump = userIntent.tap !== null ? userIntent.tap : tapReported;

            const fanReported = parseInt(p[9]);
            console.log('[fan] reported:', fanReported, 'userIntent:', userIntent.fan, 'protected:', deviceProtected.fan);
            if (deviceProtected.fan && fanReported === pendingValue.fan) {
                console.log('[fan] CONFIRMED');
                deviceProtected.fan = false; pendingValue.fan = null;
            }
            lastData.fanLed = userIntent.fan !== null ? userIntent.fan : fanReported;

            // 模式
            if (p.length >= 12) {
                const modeReported = parseInt(p[11]);
                console.log('[mode] reported:', modeReported, 'protected:', deviceProtected.mode, 'pending:', pendingValue.mode);
                if (deviceProtected.mode && modeReported === pendingValue.mode) {
                    console.log('[mode] CONFIRMED');
                    deviceProtected.mode = false; pendingValue.mode = null;
                }
                if (!deviceProtected.mode) lastData.systemMode = modeReported;
            }

            // 阈值
            const thrs = p[10].split('|').map(x => parseInt(x));
            console.log('[thr] reported:', thrs, 'protected:', { t1: deviceProtected.t1, t2: deviceProtected.t2, t3: deviceProtected.t3 }, 'pending:', { t1: pendingValue.t1, t2: pendingValue.t2, t3: pendingValue.t3 });
            if (deviceProtected.t1 && thrs[0] === pendingValue.t1) { console.log('[thr1] CONFIRMED'); deviceProtected.t1 = false; pendingValue.t1 = null; }
            if (deviceProtected.t2 && thrs[1] === pendingValue.t2) { console.log('[thr2] CONFIRMED'); deviceProtected.t2 = false; pendingValue.t2 = null; }
            if (deviceProtected.t3 && thrs[2] === pendingValue.t3) { console.log('[thr3] CONFIRMED'); deviceProtected.t3 = false; pendingValue.t3 = null; }
            if (!deviceProtected.t1) lastData.thr1 = thrs[0];
            if (!deviceProtected.t2) lastData.thr2 = thrs[1];
            if (!deviceProtected.t3) lastData.thr3 = thrs[2];
            lastData.thresholds = thrs;
            // mode 保护期间保持乐观值
            if (!deviceProtected.mode && lastData.systemMode !== undefined) currentMode = lastData.systemMode;
            updateUI();
        } catch(e) { console.error(e); }
    }

    function updateUI() {
        const d = lastData;
        setText('waterHeight', d.waterHeight);
        setText('waterVolume', d.waterVolume);
        setText('temperature', d.temperature);
        setText('humidity',    d.humidity);
        setText('light',       d.light);
        setText('soil',        d.soil);
        setText('co2',         d.co2);

        // 设备状态高亮
        setActive('btn-rain-on',  'btn-rain-off',  d.rainPump);
        setActive('btn-tap-on',   'btn-tap-off',   d.tapPump);
        setActive('btn-fan-on',   'btn-fan-off',   d.fanLed);

        // 阈值当前值（保护期显示期望值）
        if (d.thresholds) {
            setText('cur_t1', pendingValue.t1 !== null && deviceProtected.t1 ? pendingValue.t1 : (d.thr1 ?? d.thresholds[0]));
            setText('cur_t2', pendingValue.t2 !== null && deviceProtected.t2 ? pendingValue.t2 : (d.thr2 ?? d.thresholds[1]));
            setText('cur_t3', pendingValue.t3 !== null && deviceProtected.t3 ? pendingValue.t3 : (d.thr3 ?? d.thresholds[2]));
        }

        // 警告
        const alerts = [];
        if (d.thresholds) {
            if (d.waterHeight >= d.thresholds[0]) alerts.push('⚠️ 水位超限');
            if (d.soil > 0 && d.soil <= d.thresholds[1]) alerts.push('⚠️ 土壤缺水');
            if (d.light <= d.thresholds[2]) alerts.push('⚠️ 光照不足');
        }
        const bar = document.getElementById('alertBar');
        bar.innerHTML = alerts.join('&emsp;');
        bar.classList.toggle('show', alerts.length > 0);

        // 模式 & 按钮
        updateModeBadge();
        updateDeviceButtons();
    }

    function setText(id, val) {
        document.getElementById(id).textContent = (val === undefined || val === null) ? '--' : val;
    }

    function setActive(onId, offId, state) {
        document.getElementById(onId).classList.toggle('active',  !!state);
        document.getElementById(offId).classList.toggle('active', !state);
    }

    function control(type, action) {
        if (!canSend) return;
        canSend = false;
        setTimeout(() => { canSend = true; }, sendCooldown);
        const map = { rain:{on:'05',off:'06'}, tap:{on:'07',off:'08'}, fan:{on:'09',off:'10'} };
        const cmd = map[type]?.[action];
        const state = action === 'on' ? 1 : 0;
        console.log('[send]', type, action, 'cmd:', cmd, 'state:', state);
        // 记录用户意图 + 乐观刷新 + 等待确认
        if (type === 'rain') { userIntent.rain = state; setActive('btn-rain-on', 'btn-rain-off', !!state); deviceProtected.rain = true; pendingValue.rain = state; }
        else if (type === 'tap') { userIntent.tap = state; setActive('btn-tap-on', 'btn-tap-off', !!state); deviceProtected.tap = true; pendingValue.tap = state; }
        else if (type === 'fan') { userIntent.fan = state; setActive('btn-fan-on', 'btn-fan-off', !!state); deviceProtected.fan = true; pendingValue.fan = state; }
        if (cmd && client?.connected) client.publish(TOPIC_CMD, cmd);
    }

    function sendThreshold(idx) {
        if (!canSend) return;
        canSend = false;
        setTimeout(() => { canSend = true; }, sendCooldown);
        const input = document.getElementById('threshold' + idx);
        let val = parseInt(input.value);
        if (isNaN(val)) return;
        const limits = [
            { min: 1,  max: 200 },  // 水位 cm
            { min: 1,  max: 100 },  // 土壤 %
            { min: 1,  max: 60000 } // 光照 lux
        ];
        val = Math.max(limits[idx-1].min, Math.min(limits[idx-1].max, val));
        // 乐观更新：立即显示新值 + 等待下位机确认
        setText('cur_t' + idx, val);
        const key = 't' + idx;
        deviceProtected[key] = true;
        pendingValue[key] = val;
        const cmd = '0' + (idx + 1) + ',' + val;
        input.value = '';
        if (client?.connected) client.publish(TOPIC_CMD, cmd);
    }

    function toggleMode() {
        if (!canSend) return;
        canSend = false;
        setTimeout(() => { canSend = true; }, sendCooldown);
        // 乐观刷新：立即更新UI + 等待确认
        currentMode = currentMode === 1 ? 0 : 1;
        // 切换到自动模式时清空用户意图，让ESP32接管
        if (currentMode === 1) { userIntent.rain = null; userIntent.tap = null; userIntent.fan = null; }
        deviceProtected.mode = true;
        pendingValue.mode = currentMode;
        updateModeBadge();
        updateDeviceButtons();
        const cmd = currentMode === 0 ? '12' : '11';
        if (client?.connected) client.publish(TOPIC_CMD, cmd);
    }

    function updateModeBadge() {
        const badge = document.getElementById('modeBadge');
        badge.textContent = currentMode === 1 ? 'AUTO' : 'MANUAL';
        badge.className = 'mode-badge ' + (currentMode === 1 ? 'auto' : 'manual');
    }

    function updateDeviceButtons() {
        const disabled = (currentMode === 1);
        document.querySelectorAll('.btn-on, .btn-off').forEach(b => b.disabled = disabled);
    }

    window.addEventListener('DOMContentLoaded', () => {
        updateModeBadge();
