<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水质检测与智能控制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 420px;
            margin: 0 auto;
            padding: 0 12px 20px;
        }

        .topbar {
            padding: 44px 16px 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--sub);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--sub);
        }

        .status-dot.connected {
            background: var(--ok);
        }

        .status-dot.disconnected {
            background: var(--alarm);
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-top: 12px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-label {
            font-size: 13px;
            color: var(--sub);
        }

        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }

        .data-value.alarm {
            color: var(--alarm);
        }

        .data-unit {
            font-size: 13px;
            color: var(--sub);
            font-weight: normal;
        }

        .alarm-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .alarm-item {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: var(--alarm);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .alarm-normal {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: var(--ok);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .control-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .control-label {
            font-size: 14px;
            color: var(--text);
            flex: 1;
        }

        .control-btn {
            height: 48px;
            min-width: 80px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn.primary {
            background: var(--primary);
            color: white;
        }

        .control-btn.primary:active {
            background: #1976D2;
        }

        .control-btn.alarm {
            background: var(--alarm);
            color: white;
        }

        .control-btn.alarm:active {
            background: #D32F2F;
        }

        .control-btn.mode {
            background: var(--ok);
            color: white;
        }

        .control-btn.mode:active {
            background: #388E3C;
        }

        .threshold-display-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .threshold-display-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .threshold-display-item:last-child {
            border-bottom: none;
        }

        .threshold-display-label {
            font-size: 14px;
            color: var(--text);
        }

        .threshold-display-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }

        .threshold-setting-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .threshold-setting-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .threshold-setting-label {
            font-size: 14px;
            color: var(--text);
            min-width: 70px;
        }

        .threshold-setting-input {
            width: 80px;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .threshold-setting-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .threshold-setting-btn {
            height: 44px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: var(--primary);
            color: white;
            transition: all 0.2s;
        }

        .threshold-setting-btn:active {
            background: #1976D2;
        }

        .log-card {
            cursor: pointer;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-toggle {
            font-size: 18px;
            color: var(--sub);
            transition: transform 0.3s;
        }

        .log-toggle.expanded {
            transform: rotate(180deg);
        }

        .log-list {
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .log-list.expanded {
            display: block;
        }

        .log-item {
            font-family: monospace;
            font-size: 12px;
            color: var(--sub);
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .mode-display {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .mode-display.auto {
            background: #E3F2FD;
            color: #1976D2;
        }

        .mode-display.manual {
            background: #FFF3E0;
            color: #F57C00;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">未连接</span>
            </div>
            <div class="status-item">
                <span class="mode-display auto" id="modeDisplay">AUTO</span>
            </div>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">📊 实时数据</div>
        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">PH 值</span>
                <span class="data-value" id="ph">--<span class="data-unit"></span></span>
            </div>
            <div class="data-item">
                <span class="data-label">浊度</span>
                <span class="data-value" id="turb">--<span class="data-unit"></span></span>
            </div>
            <div class="data-item">
                <span class="data-label">温度</span>
                <span class="data-value" id="temp">--<span class="data-unit">℃</span></span>
            </div>
            <div class="data-item">
                <span class="data-label">湿度</span>
                <span class="data-value" id="humi">--<span class="data-unit">%</span></span>
            </div>
        </div>
    </div>

    <!-- 报警状态卡 -->
    <div class="card" id="alarmCard">
        <div class="card-title">🚨 报警状态</div>
        <div class="alarm-list" id="alarmList">
            <div class="alarm-normal">运行正常 ✓</div>
        </div>
        <button class="control-btn alarm" id="silenceBtn" style="width:100%;margin-top:12px;display:none;" onclick="sendSilence()">🔇 消警</button>
    </div>

    <!-- 控制卡 -->
    <div class="card">
        <div class="card-title">🎮 设备控制</div>
        <div class="control-grid">
            <div class="control-row">
                <span class="control-label">模式切换</span>
                <button class="control-btn mode" onclick="sendModeToggle()">🔄 切换</button>
            </div>
            <div class="control-row">
                <span class="control-label">加热器</span>
                <button class="control-btn primary" id="relay1Btn" onclick="sendRelay(1)">开启</button>
            </div>
            <div class="control-row">
                <span class="control-label">消毒装置</span>
                <button class="control-btn primary" id="relay2Btn" onclick="sendRelay(2)">开启</button>
            </div>
            <div class="control-row">
                <span class="control-label">通风设备</span>
                <button class="control-btn primary" id="relay3Btn" onclick="sendRelay(3)">开启</button>
            </div>
        </div>
    </div>

    <!-- 阈值显示卡 -->
    <div class="card">
        <div class="card-title">📋 当前阈值</div>
        <div class="threshold-display-list">
            <div class="threshold-display-item">
                <span class="threshold-display-label">PH 上限</span>
                <span class="threshold-display-value" id="phh_display">--</span>
            </div>
            <div class="threshold-display-item">
                <span class="threshold-display-label">浊度上限</span>
                <span class="threshold-display-value" id="turbh_display">--</span>
            </div>
            <div class="threshold-display-item">
                <span class="threshold-display-label">温度上限</span>
                <span class="threshold-display-value" id="temph_display">--</span>
            </div>
            <div class="threshold-display-item">
                <span class="threshold-display-label">温度下限</span>
                <span class="threshold-display-value" id="templ_display">--</span>
            </div>
            <div class="threshold-display-item">
                <span class="threshold-display-label">湿度上限</span>
                <span class="threshold-display-value" id="humih_display">--</span>
            </div>
        </div>
    </div>

    <!-- 阈值设置卡 -->
    <div class="card">
        <div class="card-title">⚙ 阈值设置</div>
        <div class="threshold-setting-list">
            <div class="threshold-setting-row">
                <span class="threshold-setting-label">PH 上限</span>
                <input type="number" class="threshold-setting-input" id="phh_input" placeholder="0.0-14.0" step="0.1">
                <button class="threshold-setting-btn" onclick="setThreshold('phh', '02')">发送</button>
            </div>
            <div class="threshold-setting-row">
                <span class="threshold-setting-label">浊度上限</span>
                <input type="number" class="threshold-setting-input" id="turbh_input" placeholder="0-4095" step="1">
                <button class="threshold-setting-btn" onclick="setThreshold('turbh', '03')">发送</button>
            </div>
            <div class="threshold-setting-row">
                <span class="threshold-setting-label">温度上限</span>
                <input type="number" class="threshold-setting-input" id="temph_input" placeholder="0-100" step="1">
                <button class="threshold-setting-btn" onclick="setThreshold('temph', '04')">发送</button>
            </div>
            <div class="threshold-setting-row">
                <span class="threshold-setting-label">温度下限</span>
                <input type="number" class="threshold-setting-input" id="templ_input" placeholder="0-100" step="1">
                <button class="threshold-setting-btn" onclick="setThreshold('templ', '05')">发送</button>
            </div>
            <div class="threshold-setting-row">
                <span class="threshold-setting-label">湿度上限</span>
                <input type="number" class="threshold-setting-input" id="humih_input" placeholder="0-100" step="1">
                <button class="threshold-setting-btn" onclick="setThreshold('humih', '06')">发送</button>
            </div>
        </div>
    </div>

    <!-- 日志卡 -->
    <div class="card log-card" onclick="toggleLog()">
        <div class="log-header">
            <div class="card-title" style="margin-bottom:0;">📝 数据日志</div>
            <span class="log-toggle" id="logToggle">▼</span>
        </div>
        <div class="log-list" id="logList"></div>
    </div>

    <script src="mqtt.min.js"></script>
    <script>
        // ==================== MQTT 配置 ====================
        const UPLOAD_TOPIC = '753284/401657/shuizhijiance/upload';
        const CMD_TOPIC = '753284/401657/shuizhijiance/cmd';

        // ==================== 同步保护状态（核心改进） ====================
        let waitingSync = {
            phh: false,
            turbh: false,
            temph: false,
            templ: false,
            humih: false
        };
        let pendingValue = {
            phh: null,
            turbh: null,
            temph: null,
            templ: null,
            humih: null
        };
        let syncTimeoutTimer = {
            phh: null,
            turbh: null,
            temph: null,
            templ: null,
            humih: null
        };

        // 防抖动保护
        let lastUserSetTime = {
            phh: 0,
            turbh: 0,
            temph: 0,
            templ: 0,
            humih: 0
        };

        const DEBOUNCE_MS = 500;
        const SYNC_TIMEOUT_MS = 5000;

        // ==================== 当前数据状态 ====================
        let currentData = {
            ph: null,
            turb: null,
            temp: null,
            humi: null,
            relay1: null,
            relay2: null,
            relay3: null,
            mode: 'AUTO',
            phh: null,
            turbh: null,
            temph: null,
            templ: null,
            humih: null
        };

        let isConnected = false;
        let logEntries = [];
        let logExpanded = false;

        // ==================== MQTT 客户端初始化 ====================
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
            reconnectPeriod: 3000,
            clean: true
        });

        client.on('connect', () => {
            console.log('MQTT Connected');
            isConnected = true;
            updateConnectionStatus();
            client.subscribe(UPLOAD_TOPIC);
        });

        client.on('disconnect', () => {
            console.log('MQTT Disconnected');
            isConnected = false;
            updateConnectionStatus();
        });

        client.on('reconnect', () => {
            console.log('MQTT Reconnecting...');
            isConnected = false;
            updateConnectionStatus();
        });

        client.on('message', (topic, payload) => {
            console.log('Received message on topic:', topic);
            console.log('Expected topic:', UPLOAD_TOPIC);
            console.log('Topic match:', topic === UPLOAD_TOPIC);
            if (topic === UPLOAD_TOPIC) {
                const message = payload.toString();
                console.log('Message content:', message);
                parseMessage(message);
            }
        });

        // ==================== 连接状态更新 ====================
        function updateConnectionStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (isConnected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '未连接';
            }
        }

        // ==================== 解析消息并更新 UI ====================
        function parseMessage(message) {
            const parts = message.split(',');
            if (parts.length < 13) return;

            const now = Date.now();

            const newData = {
                ph: parseFloat(parts[0]),
                turb: parseInt(parts[1]),
                temp: parseFloat(parts[2]),
                humi: parseInt(parts[3]),
                relay1: parseInt(parts[4]),
                relay2: parseInt(parts[5]),
                relay3: parseInt(parts[6]),
                mode: parts[7],
                phh: parseFloat(parts[8]),
                turbh: parseInt(parts[9]),
                temph: parseInt(parts[10]),
                templ: parseInt(parts[11]),
                humih: parseInt(parts[12])
            };

            // 传感器值始终更新
            currentData.ph = newData.ph;
            currentData.turb = newData.turb;
            currentData.temp = newData.temp;
            currentData.humi = newData.humi;
            currentData.relay1 = newData.relay1;
            currentData.relay2 = newData.relay2;
            currentData.relay3 = newData.relay3;
            currentData.mode = newData.mode;

            // 检查是否有正在等待同步的阈值
            let hasPendingSync = false;
            for (const [key, isWaiting] of Object.entries(waitingSync)) {
                if (isWaiting) {
                    hasPendingSync = true;
                    const expectedValue = pendingValue[key];
                    const receivedValue = newData[key];

                    // 检查下位机是否确认了新值（允许小范围误差）
                    if (expectedValue !== null && Math.abs(receivedValue - expectedValue) < 0.5) {
                        console.log(`Sync confirmed for ${key}: ${receivedValue}`);

                        // 同步成功，清除定时器
                        if (syncTimeoutTimer[key]) {
                            clearTimeout(syncTimeoutTimer[key]);
                            syncTimeoutTimer[key] = null;
                        }

                        // 释放保护状态
                        waitingSync[key] = false;
                        pendingValue[key] = null;
                        lastUserSetTime[key] = 0;
                    }
                }
            }

            // 阈值更新逻辑（三重保护）
            for (const key of ['phh', 'turbh', 'temph', 'templ', 'humih']) {
                if (!lastUserSetTime[key] || (now - lastUserSetTime[key]) >= DEBOUNCE_MS) {
                    if (!waitingSync[key]) {
                        currentData[key] = newData[key];
                    }
                }
            }

            updateUI();

            // 等待确认期间使用预测值进行报警判断
            if (hasPendingSync) {
                checkAlarmsWithPending();
            } else {
                checkAlarms();
            }

            addLog(message);
        }

        // ==================== UI 更新函数 ====================
        function updateUI() {
            // 传感器数值
            if (currentData.ph !== null) {
                document.getElementById('ph').textContent = currentData.ph.toFixed(1);
            }
            if (currentData.turb !== null) {
                document.getElementById('turb').textContent = currentData.turb;
            }
            if (currentData.temp !== null) {
                document.getElementById('temp').textContent = currentData.temp.toFixed(1);
            }
            if (currentData.humi !== null) {
                document.getElementById('humi').textContent = currentData.humi;
            }

            // 继电器按钮状态
            updateRelayButton(1, currentData.relay1);
            updateRelayButton(2, currentData.relay2);
            updateRelayButton(3, currentData.relay3);

            // 模式显示
            const modeDisplay = document.getElementById('modeDisplay');
            modeDisplay.textContent = currentData.mode;
            modeDisplay.className = 'mode-display ' + currentData.mode.toLowerCase();

            // 阈值显示（关键：等待期间显示预测值，否则显示下位机上报值）
            if (currentData.phh !== null) {
                document.getElementById('phh_display').textContent = waitingSync.phh ? pendingValue.phh : currentData.phh.toFixed(1);
            }
            if (currentData.turbh !== null) {
                document.getElementById('turbh_display').textContent = waitingSync.turbh ? pendingValue.turbh : currentData.turbh;
            }
            if (currentData.temph !== null) {
                document.getElementById('temph_display').textContent = waitingSync.temph ? pendingValue.temph : currentData.temph.toFixed(1);
            }
            if (currentData.templ !== null) {
                document.getElementById('templ_display').textContent = waitingSync.templ ? pendingValue.templ : currentData.templ.toFixed(1);
            }
            if (currentData.humih !== null) {
                document.getElementById('humih_display').textContent = waitingSync.humih ? pendingValue.humih : currentData.humih;
            }
        }

        function updateRelayButton(ch, state) {
            const btn = document.getElementById(`relay${ch}Btn`);
            if (state === 1) {
                btn.textContent = '关闭';
                btn.classList.add('alarm');
            } else {
                btn.textContent = '开启';
                btn.classList.remove('alarm');
            }
        }

        // ==================== 报警判断函数 ====================
        function checkAlarms() {
            const alarms = [];

            if (currentData.ph !== null && currentData.phh !== null && currentData.ph > currentData.phh) {
                alarms.push('PH 超限报警');
            }
            if (currentData.turb !== null && currentData.turbh !== null && currentData.turb > currentData.turbh) {
                alarms.push('浊度超限报警');
            }
            if (currentData.humi !== null && currentData.humih !== null && currentData.humi > currentData.humih) {
                alarms.push('湿度超限报警');
            }
            // 温度上限报警（上传数据已是×10 后的值，无需再乘）
            if (currentData.temp !== null && currentData.temph !== null && currentData.temp > currentData.temph) {
                alarms.push('温度上限报警');
            }
            // 温度下限报警
            if (currentData.temp !== null && currentData.templ !== null && currentData.temp < currentData.templ) {
                alarms.push('温度下限报警');
            }

            renderAlarms(alarms);

            if (alarms.length > 0) {
                sendAlarmToNative({
                    which: 'water_quality',
                    ph: currentData.ph,
                    phh: currentData.phh,
                    turb: currentData.turb,
                    turbh: currentData.turbh,
                    humi: currentData.humi,
                    humih: currentData.humih,
                    temp: currentData.temp,
                    temph: currentData.temph,
                    templ: currentData.templ
                });
            }
        }

        function checkAlarmsWithPending() {
            const alarms = [];

            // 使用预测值（如果正在等待同步）或当前值
            const phh = waitingSync.phh ? pendingValue.phh : currentData.phh;
            const turbh = waitingSync.turbh ? pendingValue.turbh : currentData.turbh;
            const temph = waitingSync.temph ? pendingValue.temph : currentData.temph;
            const templ = waitingSync.templ ? pendingValue.templ : currentData.templ;
            const humih = waitingSync.humih ? pendingValue.humih : currentData.humih;

            if (currentData.ph !== null && phh !== null && currentData.ph > phh) {
                alarms.push('PH 超限报警');
            }
            if (currentData.turb !== null && turbh !== null && currentData.turb > turbh) {
                alarms.push('浊度超限报警');
            }
            if (currentData.humi !== null && humih !== null && currentData.humi > humih) {
                alarms.push('湿度超限报警');
            }
            // 温度上限报警（上传数据已是×10 后的值，无需再乘）
            if (currentData.temp !== null && temph !== null && currentData.temp > temph) {
                alarms.push('温度上限报警');
            }
            // 温度下限报警
            if (currentData.temp !== null && templ !== null && currentData.temp < templ) {
                alarms.push('温度下限报警');
            }

            renderAlarms(alarms);

            if (alarms.length > 0) {
                sendAlarmToNative({
                    which: 'water_quality',
                    ph: currentData.ph,
                    phh: phh,
                    turb: currentData.turb,
                    turbh: turbh,
                    humi: currentData.humi,
                    humih: humih,
                    temp: currentData.temp,
                    temph: temph,
                    templ: templ
                });
            }
        }

        function renderAlarms(alarms) {
            const alarmList = document.getElementById('alarmList');
            const silenceBtn = document.getElementById('silenceBtn');

            if (alarms.length === 0) {
                alarmList.innerHTML = '<div class="alarm-normal">运行正常 ✓</div>';
                silenceBtn.style.display = 'none';
            } else {
                alarmList.innerHTML = alarms.map(a => `<div class="alarm-item">${a}</div>`).join('');
                silenceBtn.style.display = 'block';
            }

            // 数据报警高亮
            updateDataAlarm();
        }

        function updateDataAlarm() {
            const phEl = document.getElementById('ph');
            const turbEl = document.getElementById('turb');
            const humiEl = document.getElementById('humi');

            if (currentData.ph !== null && currentData.phh !== null && currentData.ph > currentData.phh) {
                phEl.classList.add('alarm');
            } else {
                phEl.classList.remove('alarm');
            }

            if (currentData.turb !== null && currentData.turbh !== null && currentData.turb > currentData.turbh) {
                turbEl.classList.add('alarm');
            } else {
                turbEl.classList.remove('alarm');
            }

            if (currentData.humi !== null && currentData.humih !== null && currentData.humi > currentData.humih) {
                humiEl.classList.add('alarm');
            } else {
                humiEl.classList.remove('alarm');
            }
        }

        // ==================== 发送指令函数 ====================
        function sendCmd(cmd) {
            if (!isConnected) {
                alert('MQTT 未连接');
                return;
            }
            client.publish(CMD_TOPIC, cmd);
            console.log('Sending cmd:', cmd);
        }

        function sendSilence() {
            sendCmd('01');
        }

        function sendModeToggle() {
            sendCmd('20');
        }

        function sendRelay(ch) {
            const cmdCode = 9 + ch;
            const currentState = currentData[`relay${ch}`];
            const newState = currentState === 1 ? 0 : 1;
            sendCmd(`${cmdCode},${newState}`);
        }

        function setThreshold(type, cmdCode) {
            const inputId = `${type}_input`;
            const value = document.getElementById(inputId).value;

            if (!value || value === '') {
                alert('请输入阈值');
                return;
            }

            const numValue = parseFloat(value);
            if (isNaN(numValue)) {
                alert('请输入有效数字');
                return;
            }

            // 检查是否正在等待同步（防止重复发送）
            if (waitingSync[type]) {
                console.log(`Already waiting sync for ${type}`);
                return;
            }

            // 1. 设置等待同步状态
            waitingSync[type] = true;
            pendingValue[type] = numValue;

            // 2. 发送指令
            sendCmd(`${cmdCode},${numValue}`);

            // 3. 记录用户操作时间（防抖）
            lastUserSetTime[type] = Date.now();

            // 4. 立即更新显示（预测状态）
            document.getElementById(`${type}_display`).textContent = numValue.toFixed(type === 'phh' || type === 'temph' || type === 'templ' ? 1 : 0);

            // 5. 立即检查报警（即时反馈）
            checkAlarmsWithPending();

            // 6. 设置超时保护（如果下位机 5 秒内未确认，自动释放保护状态）
            syncTimeoutTimer[type] = setTimeout(() => {
                if (waitingSync[type]) {
                    console.warn(`Sync timeout for ${type}, releasing protection`);
                    waitingSync[type] = false;
                    pendingValue[type] = null;
                    syncTimeoutTimer[type] = null;
                }
            }, SYNC_TIMEOUT_MS);

            // 关闭输入框焦点
            document.getElementById(inputId).blur();
        }

        // ==================== 日志函数 ====================
        function addLog(message) {
            logEntries.unshift(message);
            if (logEntries.length > 20) {
                logEntries = logEntries.slice(0, 20);
            }
            if (logExpanded) {
                renderLog();
            }
        }

        function toggleLog() {
            logExpanded = !logExpanded;
            const logList = document.getElementById('logList');
            const logToggle = document.getElementById('logToggle');
            if (logExpanded) {
                logList.classList.add('expanded');
                logToggle.classList.add('expanded');
                renderLog();
            } else {
                logList.classList.remove('expanded');
                logToggle.classList.remove('expanded');
            }
        }

        function renderLog() {
            const logList = document.getElementById('logList');
            logList.innerHTML = logEntries.map(entry => `<div class="log-item">${entry}</div>`).join('');
        }

        // ==================== JS Bridge 通知接口 ====================
        function sendAlarmToNative(data) {
            if (window.Android) {
                window.Android.onAlarm(JSON.stringify(data));
            } else if (window.Notification && Notification.permission === 'granted') {
                new Notification('告警', { body: JSON.stringify(data) });
            }
        }

        // 初始化连接状态
        updateConnectionStatus();
    </script>
</body>
</html>
