<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙自动售货机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 420px;
            margin: 0 auto;
            padding: 10px 12px;
        }

        /* 顶栏 */
        .topbar {
            background: var(--primary);
            color: #fff;
            padding: 44px 16px 12px;
            margin: -10px -12px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .topbar h1 { font-size: 17px; font-weight: 600; }
        .bt-status { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
        .dot.connected { background: #69F0AE; }
        .dot.scanning { background: #FFD740; animation: blink 0.8s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* 卡片 */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 11px;
            color: var(--sub);
            font-weight: 700;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* 设备列表 */
        .device-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .device-item {
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s;
        }
        .device-item:active { background: #E3F2FD; }
        .device-name { font-size: 14px; font-weight: 600; color: var(--text); }
        .device-addr { font-size: 11px; color: var(--sub); }
        .device-connect-btn {
            height: 32px; padding: 0 12px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-scan {
            width: 100%; height: 48px; border-radius: 10px; border: none;
            background: var(--primary); color: #fff;
            font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .btn-disconnect {
            width: 100%; height: 40px; border-radius: 8px;
            border: 1px solid #E0E0E0; background: #fff; color: var(--sub);
            font-size: 14px; cursor: pointer; margin-top: 10px;
        }

        /* 商品列表 */
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .product-item:last-child { border-bottom: none; }
        .product-name { font-size: 16px; font-weight: bold; }
        .product-price { font-size: 13px; color: var(--sub); margin-top: 2px; }
        .product-stock { font-size: 13px; color: var(--text); margin-top: 2px; }
        .product-stock.empty { color: var(--alarm); }
        .sell-btn {
            width: 72px; height: 36px;
            border: none; border-radius: 8px;
            background: var(--primary); color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .sell-btn:disabled { background: #BDBDBD; cursor: not-allowed; }

        /* 日志 */
        .log-toggle {
            width: 100%; background: none; border: none;
            text-align: left; font-size: 11px; color: var(--sub);
            font-weight: 700; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .log-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
        .log-toggle.open .arrow { transform: rotate(180deg); }
        .log-box {
            display: none; margin-top: 10px;
            background: #FAFAFA; border-radius: 8px; padding: 8px 10px;
            max-height: 200px; overflow-y: auto;
            font-size: 11px; font-family: monospace; color: #555;
            line-height: 1.65; white-space: pre-wrap;
        }
        .log-box.open { display: block; }

        /* Toast */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 12px 24px; border-radius: 8px;
            font-size: 14px; z-index: 1000;
            display: none;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
    <h1>自动售货机</h1>
    <div class="bt-status">
        <div class="dot" id="dot"></div>
        <span id="bt-label">未连接</span>
    </div>
</div>

<!-- 蓝牙连接卡 -->
<div class="card">
    <div class="card-title">蓝牙设备</div>
    <div class="device-list" id="device-list">
        <div style="color:#BDBDBD;font-size:13px;text-align:center;padding:8px 0;">
            点击"扫描配对设备"获取列表
        </div>
    </div>
    <button class="btn-scan" id="btn-scan" onclick="scanDevices()">扫描配对设备</button>
    <button class="btn-disconnect" id="btn-disconnect" style="display:none" onclick="doDisconnect()">断开连接</button>
</div>

<!-- 商品列表卡 -->
<div class="card">
    <div class="card-title">商品列表</div>
    <div id="product-list"></div>
</div>

<!-- 库存复位卡 -->
<div class="card">
    <div class="card-title">库存管理</div>
    <button class="btn-scan" onclick="resetStock()" style="background:#9C27B0;">库存复位</button>
</div>

<!-- 日志卡 -->
<div class="card">
    <button class="log-toggle" id="log-toggle" onclick="toggleLog()">
        通信日志 <span class="arrow">▼</span>
    </button>
    <div class="log-box" id="log-box"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== 商品数据 ====================
const PRODUCTS = [
    { id: 1, name: '可乐', price: 3, stock: 5 },
    { id: 2, name: '矿泉水', price: 2, stock: 5 },
    { id: 3, name: '雪碧', price: 3, stock: 5 },
    { id: 4, name: '橙汁', price: 4, stock: 5 },
    { id: 5, name: '绿茶', price: 3, stock: 5 }
];

let connected = false;
let deviceState = 'MAIN';

// ==================== 日志 ====================
const MAX_LOG = 100;
let logLines = [];

function log(msg) {
    const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    logLines.push(`[${ts}] ${msg}`);
    if (logLines.length > MAX_LOG) logLines.shift();
    const box = document.getElementById('log-box');
    if (box.classList.contains('open')) {
        box.textContent = logLines.join('\n');
        box.scrollTop = box.scrollHeight;
    }
}

function toggleLog() {
    const btn = document.getElementById('log-toggle');
    const box = document.getElementById('log-box');
    btn.classList.toggle('open');
    box.classList.toggle('open');
    if (box.classList.contains('open')) {
        box.textContent = logLines.join('\n');
        box.scrollTop = box.scrollHeight;
    }
}

// ==================== 状态显示 ====================
function setStatus(s) {
    const dot = document.getElementById('dot');
    const label = document.getElementById('bt-label');
    dot.className = 'dot';
    if (s === 'connected') {
        dot.classList.add('connected');
        label.textContent = '已连接';
        connected = true;
    } else if (s === 'scanning') {
        dot.classList.add('scanning');
        label.textContent = '连接中...';
    } else {
        label.textContent = '未连接';
        connected = false;
    }
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

// ==================== 蓝牙回调（Android 调用） ====================
window.onBtDeviceList = function(devices) {
    const list = document.getElementById('device-list');
    if (!devices || devices.length === 0) {
        list.innerHTML = '<div style="color:#BDBDBD;font-size:13px;text-align:center;padding:8px 0;">未找到已配对设备，请先在系统蓝牙设置中配对</div>';
        return;
    }
    list.innerHTML = devices.map(d => `
        <div class="device-item" onclick="doConnect('${d.address}')">
            <div>
                <div class="device-name">${d.name || '未知设备'}</div>
                <div class="device-addr">${d.address}</div>
            </div>
            <button class="device-connect-btn">连接</button>
        </div>
    `).join('');
    log(`找到 ${devices.length} 个已配对设备`);
};

window.onBtConnected = function(address) {
    setStatus('connected');
    log('已连接：' + address);
    document.getElementById('btn-scan').style.display = 'none';
    document.getElementById('btn-disconnect').style.display = 'block';
    document.getElementById('device-list').innerHTML = '<div style="color:var(--ok);font-size:14px;text-align:center;padding:12px 0;">✓ 已连接</div>';
};

window.onBtDisconnected = function() {
    setStatus('disconnected');
    log('蓝牙已断开');
    document.getElementById('btn-scan').style.display = 'block';
    document.getElementById('btn-disconnect').style.display = 'none';
    document.getElementById('device-list').innerHTML = '<div style="color:#BDBDBD;font-size:13px;text-align:center;padding:8px 0;">点击"扫描配对设备"获取列表</div>';
};

window.onBtError = function(msg) {
    log('[错误] ' + msg);
    showToast('蓝牙错误：' + msg);
    setStatus('disconnected');
};

window.onBtData = function(line) {
    parseData(line.trim());
};

// ==================== 蓝牙操作 ====================
function scanDevices() {
    if (window.BluetoothBridge) {
        log('正在获取配对设备...');
        setStatus('scanning');
        window.BluetoothBridge.getPairedDevices();
    } else {
        log('[调试模式] BluetoothBridge 不可用');
        // 模拟设备列表
        window.onBtDeviceList([
            { name: 'BKM06A', address: '98:5D:AD:01:2E:8A' }
        ]);
    }
}

function doConnect(address) {
    if (window.BluetoothBridge) {
        log('正在连接 ' + address + ' ...');
        setStatus('scanning');
        window.BluetoothBridge.connect(address);
    } else {
        log('[调试] 模拟连接成功');
        window.onBtConnected(address);
    }
}

function doDisconnect() {
    if (window.BluetoothBridge) {
        window.BluetoothBridge.disconnect();
    }
}

function sendCmd(cmd) {
    if (!connected) {
        showToast('请先连接蓝牙设备');
        return;
    }
    if (window.BluetoothBridge) {
        window.BluetoothBridge.send(cmd + '\n');
        log('[TX] ' + cmd);
    }
}

// ==================== 数据解析 ====================
function parseData(msg) {
    log('[RX] ' + msg);

    if (msg.startsWith('STOCK:')) {
        // STOCK:可乐,3,矿泉水,5,...
        const parts = msg.substring(6).split(',');
        for (let i = 0; i < parts.length; i += 2) {
            const name = parts[i];
            const stock = parseInt(parts[i + 1]);
            const p = PRODUCTS.find(x => x.name === name);
            if (p) p.stock = stock;
        }
        renderProducts();
    }
    else if (msg.startsWith('SOLD:')) {
        // SOLD:可乐,1,2
        const parts = msg.substring(5).split(',');
        log(`出货成功：${parts[0]} x${parts[1]}，剩余：${parts[2]}`);
        showToast(`${parts[0]} 出货成功`);
    }
    else if (msg.startsWith('EMPTY:')) {
        const name = msg.substring(6);
        showToast(`${name} 已售罄`);
        const p = PRODUCTS.find(x => x.name === name);
        if (p) p.stock = 0;
        renderProducts();
    }
    else if (msg.startsWith('STATUS:')) {
        deviceState = msg.substring(7);
        renderProducts();
    }
    else if (msg.startsWith('BUSY:')) {
        showToast('设备忙碌，请稍后再试');
    }
    else if (msg === 'PONG') {
        log('心跳回复');
    }
}

// ==================== 商品渲染 ====================
function renderProducts() {
    const container = document.getElementById('product-list');
    const isBusy = deviceState !== 'MAIN';

    container.innerHTML = PRODUCTS.map(p => `
        <div class="product-item">
            <div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price} CNY</div>
                <div class="product-stock ${p.stock === 0 ? 'empty' : ''}">${p.stock === 0 ? '售罄' : '库存：' + p.stock}</div>
            </div>
            <button class="sell-btn" ${isBusy || p.stock === 0 ? 'disabled' : ''} onclick="sellProduct(${p.id})">
                ${p.stock === 0 ? '售罄' : '出货'}
            </button>
        </div>
    `).join('');
}

// ==================== 控制函数 ====================
function sellProduct(id) {
    sendCmd('SELL:' + id);
}

function resetStock() {
    sendCmd('RESET');
    showToast('已发送库存复位命令');
}

// ==================== 初始化 ====================
renderProducts();
log('页面已加载');
</script>
</body>
</html>
