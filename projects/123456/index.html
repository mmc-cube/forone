<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家居物联网监控系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            padding: 12px;
            max-width: 420px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--sub);
        }

        .status-dot.connected { background: var(--ok); }
        .status-dot.disconnected { background: var(--alarm); }

        /* 实时数据 */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .data-row:last-child { border-bottom: none; }

        .data-label {
            font-size: 13px;
            color: var(--sub);
        }

        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }

        .data-unit {
            font-size: 13px;
            color: var(--sub);
            margin-left: 4px;
        }

        .data-value.alarm {
            color: var(--alarm);
        }

        /* 报警状态 */
        .alarm-item {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: var(--alarm);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .alarm-item:last-child { margin-bottom: 0; }

        .status-ok {
            color: var(--ok);
            font-size: 14px;
            padding: 12px;
            text-align: center;
        }

        /* 控制按钮 */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn {
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--alarm);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-group .btn { flex: 1; }

        /* 阈值设置 */
        .threshold-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .threshold-row:last-child { margin-bottom: 0; }

        .threshold-label {
            font-size: 14px;
            color: var(--text);
            min-width: 80px;
        }

        .threshold-input {
            flex: 1;
            height: 44px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 16px;
            text-align: center;
        }

        .threshold-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .threshold-btn {
            width: 70px;
            height: 44px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .threshold-btn:active { transform: scale(0.95); }

        /* 日志 */
        .log-card {
            cursor: pointer;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .log-content.expanded {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            font-family: monospace;
            font-size: 12px;
            color: var(--sub);
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .log-item:first-child { color: var(--text); }

        .fold-icon {
            transition: transform 0.3s;
        }

        .fold-icon.expanded {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <!-- 1. 状态栏 -->
    <div class="card">
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
    </div>

    <!-- 2. 实时数据卡 -->
    <div class="card">
        <div class="card-title">📊 实时数据</div>
        <div class="data-row">
            <span class="data-label">温度</span>
            <div>
                <span class="data-value" id="tempValue">--</span>
                <span class="data-unit">℃</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">湿度</span>
            <div>
                <span class="data-value" id="humiValue">--</span>
                <span class="data-unit">%RH</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">光照值</span>
            <div>
                <span class="data-value" id="lightValue">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">人体感应</span>
            <div>
                <span class="data-value" id="pirValue">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">灯状态</span>
            <div>
                <span class="data-value" id="lightState">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">空调状态</span>
            <div>
                <span class="data-value" id="acState">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">窗帘状态</span>
            <div>
                <span class="data-value" id="curtainState">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
    </div>

    <!-- 3. 报警状态卡 -->
    <div class="card" id="alarmCard">
        <div class="card-title">⚠️ 报警状态</div>
        <div id="alarmContent">
            <div class="status-ok">运行正常 ✓</div>
        </div>
    </div>

    <!-- 4. 控制卡 -->
    <div class="card">
        <div class="card-title">🎮 控制面板</div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="sendCmd('02')">开灯</button>
            <button class="btn btn-outline" onclick="sendCmd('03')">关灯</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="sendCmd('04')">开空调</button>
            <button class="btn btn-outline" onclick="sendCmd('05')">关空调</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="sendCmd('06')">开窗帘</button>
            <button class="btn btn-outline" onclick="sendCmd('07')">关窗帘</button>
        </div>

        <button class="btn btn-danger" style="width: 100%;" onclick="sendCmd('01')">🔕 消警</button>
    </div>

    <!-- 5. 阈值设置卡 -->
    <div class="card">
        <div class="card-title">⚙️ 阈值设置</div>

        <div class="threshold-row">
            <span class="threshold-label">光照阈值</span>
            <input type="number" class="threshold-input" id="lightThrInput" min="0" max="4095" placeholder="0-4095">
            <button class="threshold-btn" onclick="sendThreshold('08', 'lightThrInput', 0, 4095)">发送</button>
        </div>

        <div class="threshold-row">
            <span class="threshold-label">温度阈值</span>
            <input type="number" class="threshold-input" id="tempThrInput" min="0" max="50" placeholder="0-50">
            <button class="threshold-btn" onclick="sendThreshold('09', 'tempThrInput', 0, 50)">发送</button>
        </div>
    </div>

    <!-- 6. 日志卡 -->
    <div class="card log-card" onclick="toggleLog()">
        <div class="log-header">
            <div class="card-title" style="margin: 0;">📋 数据日志</div>
            <span class="fold-icon" id="foldIcon">▼</span>
        </div>
    </div>
    <div class="card log-content" id="logContent">
        <div id="logList"></div>
    </div>

    <script>
        // ==================== MQTT 配置 ====================
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const UPLOAD_TOPIC = '123456/654321/jiajuwulian/upload';
        const CMD_TOPIC = '123456/654321/jiajuwulian/cmd';

        // ==================== 全局状态 ====================
        let client = null;
        let isConnected = false;
        let logData = [];
        let pirZeroStartTime = null;

        // 当前数据
        let currentData = {
            temp: 0,
            humi: 0,
            light: 0,
            pir: 0,
            lightState: 0,
            acState: 0,
            curtainState: 0,
            lightThreshold: 2000,
            tempThreshold: 30
        };

        // 等待同步标志（预测 - 同步 - 接管机制）
        let waitingSync = { lightThreshold: false, tempThreshold: false };

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            connectMQTT();
        });

        // ==================== MQTT 连接 ====================
        function connectMQTT() {
            updateStatus('connecting');

            client = mqtt.connect(MQTT_BROKER, {
                clientId: 'web_' + Math.random().toString(36).substr(2, 8),
                reconnectPeriod: 3000,
                connectTimeout: 10000
            });

            client.on('connect', () => {
                console.log('[MQTT] Connected');
                isConnected = true;
                updateStatus('connected');
                client.subscribe(UPLOAD_TOPIC, { qos: 0 }, (err) => {
                    if (err) console.error('[MQTT] Subscribe error:', err);
                    else console.log('[MQTT] Subscribed to', UPLOAD_TOPIC);
                });
            });

            client.on('error', (err) => {
                console.error('[MQTT] Error:', err);
                updateStatus('disconnected');
            });

            client.on('close', () => {
                console.log('[MQTT] Connection closed');
                isConnected = false;
                updateStatus('disconnected');
            });

            client.on('message', (topic, payload) => {
                const message = payload.toString();
                parseAndUpdate(message);
            });
        }

        // ==================== 数据解析与更新 ====================
        function parseAndUpdate(message) {
            const parts = message.split(',');
            if (parts.length < 9) return;

            // 记录日志
            addLog(message);

            // 解析上行数据（按 PRD 字段顺序，0-based）
            const newData = {
                temp: parseFloat(parts[0]) || 0,
                humi: parseFloat(parts[1]) || 0,
                light: parseInt(parts[2]) || 0,
                pir: parseInt(parts[3]) || 0,
                lightState: parseInt(parts[4]) || 0,
                acState: parseInt(parts[5]) || 0,
                curtainState: parseInt(parts[6]) || 0,
                lightThreshold: parseInt(parts[7]) || 2000,
                tempThreshold: parseInt(parts[8]) || 30
            };

            // 传感器值始终更新
            currentData.temp = newData.temp;
            currentData.humi = newData.humi;
            currentData.light = newData.light;
            currentData.pir = newData.pir;

            // 设备状态更新
            currentData.lightState = newData.lightState;
            currentData.acState = newData.acState;
            currentData.curtainState = newData.curtainState;

            // 阈值：等待同步期间保持预测值，否则更新
            if (!waitingSync.lightThreshold) {
                currentData.lightThreshold = newData.lightThreshold;
            }
            if (!waitingSync.tempThreshold) {
                currentData.tempThreshold = newData.tempThreshold;
            }

            // 更新 UI
            updateUI();

            // 检查同步完成
            if (waitingSync.lightThreshold && Math.abs(newData.lightThreshold - currentData.lightThreshold) < 1) {
                waitingSync.lightThreshold = false;
            }
            if (waitingSync.tempThreshold && Math.abs(newData.tempThreshold - currentData.tempThreshold) < 1) {
                waitingSync.tempThreshold = false;
            }

            // 等待期间不调用 checkAlarms，保持预测状态
            if (!waitingSync.lightThreshold && !waitingSync.tempThreshold) {
                checkAlarms();
            }
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            // 实时数据
            document.getElementById('tempValue').textContent = currentData.temp.toFixed(1);
            document.getElementById('humiValue').textContent = currentData.humi.toFixed(0);
            document.getElementById('lightValue').textContent = currentData.light;
            document.getElementById('pirValue').textContent = currentData.pir === 1 ? '有人' : '无人';
            document.getElementById('lightState').textContent = currentData.lightState === 1 ? '开' : '关';
            document.getElementById('acState').textContent = currentData.acState === 1 ? '开' : '关';
            document.getElementById('curtainState').textContent = currentData.curtainState === 1 ? '开' : '关';

            // 阈值输入框（仅在非等待同步时更新）
            if (!waitingSync.lightThreshold) {
                document.getElementById('lightThrInput').value = currentData.lightThreshold;
            }
            if (!waitingSync.tempThreshold) {
                document.getElementById('tempThrInput').value = currentData.tempThreshold;
            }

            // 报警值标红
            const tempEl = document.getElementById('tempValue');
            if (currentData.temp > currentData.tempThreshold) {
                tempEl.classList.add('alarm');
            } else {
                tempEl.classList.remove('alarm');
            }
        }

        // ==================== 报警判断（APP 端） ====================
        function checkAlarms() {
            const alarms = [];

            // 无人报警：PIR=0 持续超过 30 秒
            if (currentData.pir === 0) {
                if (pirZeroStartTime === null) {
                    pirZeroStartTime = Date.now();
                } else if (Date.now() - pirZeroStartTime >= 30000) {
                    alarms.push('🔔 无人提醒');
                }
            } else {
                pirZeroStartTime = null;
            }

            // 光照不足有人未开灯
            // 字段 3（光照值）> 字段 8（光照阈值）且 字段 4=1 且 字段 5=0
            if (currentData.light > currentData.lightThreshold &&
                currentData.pir === 1 &&
                currentData.lightState === 0) {
                alarms.push('💡 光照不足，灯未开');
            }

            // 温度过高未开空调
            // 字段 1（温度）> 字段 9（温度阈值）且 字段 6=0
            if (currentData.temp > currentData.tempThreshold &&
                currentData.acState === 0) {
                alarms.push('🌡️ 温度过高，空调未开');
            }

            renderAlarms(alarms);
        }

        // ==================== 渲染报警 ====================
        function renderAlarms(alarms) {
            const container = document.getElementById('alarmContent');

            if (alarms.length === 0) {
                container.innerHTML = '<div class="status-ok">运行正常 ✓</div>';
            } else {
                container.innerHTML = alarms.map(alarm =>
                    `<div class="alarm-item">${alarm}</div>`
                ).join('');
            }
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            if (!isConnected) {
                alert('MQTT 未连接，请检查网络');
                return;
            }

            console.log('[TX]', cmd);
            client.publish(CMD_TOPIC, cmd);

            // 消警指令重置报警计时
            if (cmd === '01') {
                pirZeroStartTime = null;
            }
        }

        // ==================== 发送阈值（预测 - 同步机制） ====================
        function sendThreshold(code, inputId, min, max) {
            if (!isConnected) {
                alert('MQTT 未连接，请检查网络');
                return;
            }

            const input = document.getElementById(inputId);
            const value = parseInt(input.value);

            if (isNaN(value) || value < min || value > max) {
                alert(`请输入 ${min}-${max} 之间的值`);
                return;
            }

            const cmd = `${code},${value}`;
            console.log('[TX]', cmd);
            client.publish(CMD_TOPIC, cmd);

            // 立即预测更新（乐观更新）
            if (code === '08') {
                currentData.lightThreshold = value;
                waitingSync.lightThreshold = true;
            } else if (code === '09') {
                currentData.tempThreshold = value;
                waitingSync.tempThreshold = true;
            }

            // 立即刷新 UI
            updateUI();

            // 立即检查报警（即时反馈）
            checkAlarms();
        }

        // ==================== 状态更新 ====================
        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (status === 'connected') {
                dot.classList.add('connected');
                dot.classList.remove('disconnected');
                text.textContent = '已连接';
            } else if (status === 'disconnected') {
                dot.classList.add('disconnected');
                dot.classList.remove('connected');
                text.textContent = '未连接';
            } else if (status === 'connecting') {
                dot.classList.remove('connected', 'disconnected');
                text.textContent = '连接中...';
            }
        }

        // ==================== 日志管理 ====================
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            logData.unshift(`[${timestamp}] ${message}`);

            // 保留最近 20 条
            if (logData.length > 20) {
                logData.pop();
            }

            renderLog();
        }

        function renderLog() {
            const container = document.getElementById('logList');
            container.innerHTML = logData.map(log =>
                `<div class="log-item">${log}</div>`
            ).join('');
        }

        function toggleLog() {
            const content = document.getElementById('logContent');
            const icon = document.getElementById('foldIcon');

            content.classList.toggle('expanded');
            icon.classList.toggle('expanded');
        }
    </script>
</body>
</html>
