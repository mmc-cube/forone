<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能药箱管理系统</title>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            max-width: 420px;
            margin: 0 auto;
            padding: 12px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--sub);
        }

        .status-dot.connected {
            background: var(--ok);
        }

        .status-dot.disconnected {
            background: var(--alarm);
        }

        .status-text {
            font-size: 13px;
            color: var(--sub);
        }

        /* 实时数据 */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-label {
            font-size: 13px;
            color: var(--sub) !important;
            font-weight: 500;
        }

        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text) !important;
        }

        .data-unit {
            font-size: 13px;
            color: var(--sub) !important;
            margin-left: 4px;
            font-weight: 500;
        }

        .data-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .data-value.alarm {
            color: var(--alarm);
        }

        /* 吃药状态 */
        .medicine-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .medicine-row:last-child {
            border-bottom: none;
        }

        .medicine-name {
            font-size: 14px;
            color: var(--text);
        }

        .medicine-status {
            font-size: 14px;
            font-weight: 500;
        }

        .medicine-status.taken {
            color: var(--ok);
        }

        .medicine-status.not-taken {
            color: var(--sub);
        }

        /* 报警状态 */
        .alarm-box {
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .alarm-box.normal {
            background: #E8F5E9;
            color: var(--ok);
        }

        .alarm-box.warning {
            background: #FFF3E0;
            color: #FF9800;
        }

        .alarm-box.danger {
            background: #FFEBEE;
            color: var(--alarm);
        }

        .alarm-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .alarm-item:first-child {
            margin-top: 0;
        }

        /* 控制按钮 */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--alarm);
            color: white;
        }

        .btn-ok {
            background: var(--ok);
            color: white;
        }

        .btn-full {
            grid-column: span 2;
        }

        /* 阈值设置 */
        .threshold-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .threshold-row:last-child {
            border-bottom: none;
        }

        .threshold-label {
            font-size: 14px;
            color: var(--text);
        }

        .threshold-input {
            width: 80px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0 8px;
            font-size: 14px;
            text-align: center;
        }

        .threshold-btn {
            width: 60px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            cursor: pointer;
        }

        /* 日志 */
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .log-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .log-content.expanded {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            font-size: 12px;
            color: var(--sub);
            padding: 4px 0;
            border-bottom: 1px solid #eee;
            font-family: monospace;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
            color: var(--alarm);
        }

        .modal-message {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 24px;
        }

        .modal-btn {
            height: 44px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        .modal-btn-primary {
            background: var(--primary);
            color: white;
        }

        /* 时间显示 */
        .time-display {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            padding: 16px 0;
        }

        .date-display {
            font-size: 14px;
            color: var(--sub);
            text-align: center;
            margin-top: -8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="card">
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">未连接</span>
        </div>
    </div>

    <!-- 时间卡片 -->
    <div class="card">
        <div class="time-display" id="timeDisplay">--:--:--</div>
        <div class="date-display" id="dateDisplay">----</div>
    </div>

    <!-- 实时数据 -->
    <div class="card">
        <div class="card-title">📊 实时数据</div>
        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">温度</span>
                <div class="data-row"><span class="data-value" id="tempValue">--</span><span class="data-unit">℃</span></div>
            </div>
            <div class="data-item">
                <span class="data-label">湿度</span>
                <div class="data-row"><span class="data-value" id="humiValue">--</span><span class="data-unit">%</span></div>
            </div>
            <div class="data-item">
                <span class="data-label">光敏</span>
                <div class="data-row"><span class="data-value" id="ldrValue">--</span></div>
            </div>
            <div class="data-item">
                <span class="data-label">锁状态</span>
                <div class="data-row"><span class="data-value" id="lockValue">--</span></div>
            </div>
        </div>
    </div>

    <!-- 吃药状态 -->
    <div class="card">
        <div class="card-title">💊 吃药状态</div>
        <div class="medicine-row">
            <span class="medicine-name">组 1 (08:00)</span>
            <span class="medicine-status not-taken" id="med1Status">未吃</span>
        </div>
        <div class="medicine-row">
            <span class="medicine-name">组 2 (12:00)</span>
            <span class="medicine-status not-taken" id="med2Status">未吃</span>
        </div>
        <div class="medicine-row">
            <span class="medicine-name">组 3 (18:00)</span>
            <span class="medicine-status not-taken" id="med3Status">未吃</span>
        </div>
        <div class="medicine-row">
            <span class="medicine-name">组 4 (20:00)</span>
            <span class="medicine-status not-taken" id="med4Status">未吃</span>
        </div>
    </div>

    <!-- 继电器状态 -->
    <div class="card">
        <div class="card-title">🔧 设备状态</div>
        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">降温</span>
                <div class="data-row"><span class="data-value" id="coolValue">关</span></div>
            </div>
            <div class="data-item">
                <span class="data-label">除湿</span>
                <div class="data-row"><span class="data-value" id="dryValue">关</span></div>
            </div>
        </div>
    </div>

    <!-- 报警状态 -->
    <div class="card">
        <div class="card-title">⚠️ 报警状态</div>
        <div class="alarm-box normal" id="alarmBox">
            ✓ 运行正常
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="card">
        <div class="card-title">🎮 远程控制</div>
        <div class="btn-grid">
            <button class="btn btn-danger" onclick="sendCmd('01')">🔔 消警</button>
            <button class="btn btn-primary" onclick="toggleLock()" id="lockBtn">🔓 解锁</button>
            <button class="btn btn-primary" onclick="sendCmd('13,1')">💨 风机开</button>
            <button class="btn btn-primary" onclick="sendCmd('13,0')">💨 风机关</button>
            <button class="btn btn-primary" onclick="sendCmd('14,1')">🌡️ 加热开</button>
            <button class="btn btn-primary" onclick="sendCmd('14,0')">🌡️ 加热关</button>
        </div>
    </div>

    <!-- 阈值设置 -->
    <div class="card">
        <div class="card-title">⚙️ 阈值设置</div>
        <div class="threshold-row">
            <span class="threshold-label">温度上限 (℃)</span>
            <div>
                <input type="number" class="threshold-input" id="tempMaxInput" value="28">
                <button class="threshold-btn" onclick="sendThreshold('06', 'tempMaxInput')">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="threshold-label">温度下限 (℃)</span>
            <div>
                <input type="number" class="threshold-input" id="tempMinInput" value="25">
                <button class="threshold-btn" onclick="sendThreshold('07', 'tempMinInput')">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="threshold-label">湿度上限 (%)</span>
            <div>
                <input type="number" class="threshold-input" id="humiMaxInput" value="60">
                <button class="threshold-btn" onclick="sendThreshold('08', 'humiMaxInput')">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="threshold-label">湿度下限 (%)</span>
            <div>
                <input type="number" class="threshold-input" id="humiMinInput" value="55">
                <button class="threshold-btn" onclick="sendThreshold('09', 'humiMinInput')">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="threshold-label">光敏阈值</span>
            <div>
                <input type="number" class="threshold-input" id="ldrThresholdInput" value="2000">
                <button class="threshold-btn" onclick="sendThreshold('10', 'ldrThresholdInput')">发送</button>
            </div>
        </div>
    </div>

    <!-- 日志 -->
    <div class="card">
        <div class="log-header" onclick="toggleLog()">
            <span class="card-title" style="margin:0">📋 数据日志</span>
            <span id="logArrow">▼</span>
        </div>
        <div class="log-content" id="logContent">
            <div id="logList"></div>
        </div>
    </div>

    <!-- 吃药提醒弹窗 -->
    <div class="modal-overlay" id="medicineModal">
        <div class="modal">
            <div class="modal-title">⏰ 吃药提醒</div>
            <div class="modal-message">是时候吃药了！<br>请及时服用药物</div>
            <button class="modal-btn modal-btn-primary" onclick="confirmMedicine()">确认吃药</button>
        </div>
    </div>

    <script src="mqtt.min.js"></script>
    <script>
        // MQTT 配置
        const UPLOAD_TOPIC = '12345/67890/znyx/upload';
        const CMD_TOPIC = '12345/67890/znyx/cmd';

        // 全局变量
        let client = null;
        let isConnected = false;
        let lastDataTime = 0;
        let logData = [];
        let prevMedicineState = [0, 0, 0, 0];
        let isLocked = true;

        // 阈值（乐观更新）
        let tempMax = 28, tempMin = 25;
        let humiMax = 60, humiMin = 55;
        let ldrThreshold = 2000;

        // 连接 MQTT
        function connectMQTT() {
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
                reconnectPeriod: 3000,
                connectTimeout: 10000
            });

            client.on('connect', () => {
                console.log('MQTT 已连接');
                client.subscribe(UPLOAD_TOPIC, (err) => {
                    if (!err) {
                        console.log('订阅成功：' + UPLOAD_TOPIC);
                    }
                });
                updateStatus(true);
            });

            client.on('disconnect', () => {
                console.log('MQTT 已断开');
                updateStatus(false);
            });

            client.on('message', (topic, message) => {
                if (topic === UPLOAD_TOPIC) {
                    handleUploadMessage(message.toString());
                }
            });

            client.on('error', (err) => {
                console.error('MQTT 错误：', err);
            });
        }

        // 处理上行数据
        function handleUploadMessage(payload) {
            const parts = payload.split(',');
            if (parts.length < 12) return;

            lastDataTime = Date.now();

            const data = {
                temp: parseFloat(parts[0]),
                humi: parseFloat(parts[1]),
                ldr: parseInt(parts[2]),
                lock: parseInt(parts[3]),
                med1: parseInt(parts[4]),
                med2: parseInt(parts[5]),
                med3: parseInt(parts[6]),
                med4: parseInt(parts[7]),
                cool: parseInt(parts[8]),
                dry: parseInt(parts[9]),
                relay1: parseInt(parts[10]),
                relay2: parseInt(parts[11])
            };

            // 更新 UI
            updateUI(data);

            // 检查报警
            checkAlarms(data);

            // 检查吃药状态变化
            checkMedicineChange(data);

            // 添加日志
            addLog(payload);
        }

        // 更新 UI
        function updateUI(data) {
            // 温度
            document.getElementById('tempValue').textContent = data.temp.toFixed(1);
            if (data.temp > tempMax || data.temp < tempMin) {
                document.getElementById('tempValue').classList.add('alarm');
            } else {
                document.getElementById('tempValue').classList.remove('alarm');
            }

            // 湿度
            document.getElementById('humiValue').textContent = data.humi.toFixed(1);
            if (data.humi > humiMax || data.humi < humiMin) {
                document.getElementById('humiValue').classList.add('alarm');
            } else {
                document.getElementById('humiValue').classList.remove('alarm');
            }

            // 光敏
            document.getElementById('ldrValue').textContent = data.ldr;

            // 锁状态
            document.getElementById('lockValue').textContent = data.lock === 0 ? '已上锁' : '已解锁';
            isLocked = (data.lock === 0);
            updateLockBtn();

            // 吃药状态
            updateMedicineStatus('med1Status', data.med1);
            updateMedicineStatus('med2Status', data.med2);
            updateMedicineStatus('med3Status', data.med3);
            updateMedicineStatus('med4Status', data.med4);

            // 继电器状态
            document.getElementById('coolValue').textContent = data.cool === 1 ? '开' : '关';
            document.getElementById('dryValue').textContent = data.dry === 1 ? '开' : '关';
        }

        function updateMedicineStatus(elementId, status) {
            const el = document.getElementById(elementId);
            if (status === 1) {
                el.textContent = '已吃 ✓';
                el.className = 'medicine-status taken';
            } else {
                el.textContent = '未吃';
                el.className = 'medicine-status not-taken';
            }
        }

        // 检查报警
        function checkAlarms(data) {
            const alarmBox = document.getElementById('alarmBox');
            const alarms = [];

            // 检查离线
            if (Date.now() - lastDataTime > 10000) {
                alarmBox.className = 'alarm-box warning';
                alarmBox.innerHTML = '⚠️ 硬件离线';
                return;
            }

            // 检查温度
            if (data.temp > tempMax || data.temp < tempMin) {
                alarms.push('🌡️ 温度超出范围 (' + data.temp.toFixed(1) + '℃)');
            }

            // 检查湿度
            if (data.humi > humiMax || data.humi < humiMin) {
                alarms.push('💧 湿度超出范围 (' + data.humi.toFixed(1) + '%)');
            }

            if (alarms.length === 0) {
                alarmBox.className = 'alarm-box normal';
                alarmBox.innerHTML = '✓ 运行正常';
            } else {
                alarmBox.className = 'alarm-box danger';
                alarmBox.innerHTML = alarms.map(a => '<div class="alarm-item">' + a + '</div>').join('');
            }
        }

        // 检查吃药状态变化（弹窗提醒）
        function checkMedicineChange(data) {
            const currentMedState = [data.med1, data.med2, data.med3, data.med4];

            for (let i = 0; i < 4; i++) {
                // 从未吃变为已吃（硬件触发报警）
                if (prevMedicineState[i] === 0 && currentMedState[i] === 1) {
                    showMedicineModal();
                    break;
                }
            }

            prevMedicineState = currentMedState;
        }

        // 显示吃药弹窗
        function showMedicineModal() {
            document.getElementById('medicineModal').classList.add('active');
        }

        // 确认吃药
        function confirmMedicine() {
            document.getElementById('medicineModal').classList.remove('active');
            sendCmd('01'); // 消警
        }

        // 切换锁状态
        function toggleLock() {
            if (isLocked) {
                sendCmd('11'); // 解锁
            } else {
                sendCmd('12'); // 上锁
            }
        }

        function updateLockBtn() {
            const btn = document.getElementById('lockBtn');
            if (isLocked) {
                btn.textContent = '🔓 解锁';
            } else {
                btn.textContent = '🔒 上锁';
            }
        }

        // 发送指令
        function sendCmd(cmd) {
            if (client && isConnected) {
                client.publish(CMD_TOPIC, cmd);
                console.log('发送指令：' + cmd);
            } else {
                alert('MQTT 未连接');
            }
        }

        // 发送阈值
        function sendThreshold(cmd, inputId) {
            const value = document.getElementById(inputId).value;
            if (value) {
                sendCmd(cmd + ',' + value);
                // 乐观更新
                if (inputId === 'tempMaxInput') tempMax = parseInt(value);
                if (inputId === 'tempMinInput') tempMin = parseInt(value);
                if (inputId === 'humiMaxInput') humiMax = parseInt(value);
                if (inputId === 'humiMinInput') humiMin = parseInt(value);
                if (inputId === 'ldrThresholdInput') ldrThreshold = parseInt(value);
            }
        }

        // 更新状态
        function updateStatus(connected) {
            isConnected = connected;
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = '已连接';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '未连接';
            }
        }

        // 添加日志
        function addLog(payload) {
            logData.unshift({
                time: new Date().toLocaleTimeString(),
                data: payload
            });

            if (logData.length > 20) {
                logData.pop();
            }

            updateLogDisplay();
        }

        // 更新日志显示
        function updateLogDisplay() {
            const logList = document.getElementById('logList');
            logList.innerHTML = logData.map(item =>
                '<div class="log-item">[' + item.time + '] ' + item.data + '</div>'
            ).join('');
        }

        // 切换日志展开/收起
        function toggleLog() {
            const content = document.getElementById('logContent');
            const arrow = document.getElementById('logArrow');

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                arrow.textContent = '▼';
            } else {
                content.classList.add('expanded');
                arrow.textContent = '▲';
            }
        }

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
        }

        // 初始化
        window.onload = function() {
            connectMQTT();
            updateTime();
            setInterval(updateTime, 1000);
        };
    </script>
</body>
</html>
