<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能调光照明系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #4CAF50;
            --alarm: #FF5252;
            --ok: #4CAF50;
            --text: #333333;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 12px;
            color: var(--text);
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            font-weight: 500;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.connected { background: var(--ok); }
        .status-dot.disconnected { background: var(--alarm); }
        .status-text { font-size: 14px; display: flex; align-items: center; }
        .mode-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
        }
        .mode-badge.manual { background: #FF9800; }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { font-size: 13px; color: var(--sub); }
        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-unit { font-size: 13px; color: var(--sub); margin-left: 4px; }
        .data-value.alarm { color: var(--alarm); }

        .control-row {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { background: #388E3C; }
        .btn-alarm { background: var(--alarm); color: white; }

        .slider-container { margin: 12px 0; }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            -webkit-appearance: none;
            background: #E0E0E0;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .log-card { cursor: pointer; }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-toggle { font-size: 12px; color: var(--sub); }
        .log-content {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
            display: none;
        }
        .log-content.show { display: block; }
        .log-item {
            font-size: 12px;
            color: var(--sub);
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
        .log-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="card">
        <div class="status-bar">
            <div class="status-text">
                <span class="status-dot disconnected" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <span class="mode-badge" id="modeBadge">自动</span>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">实时数据</div>
        <div class="data-row">
            <span class="data-label">当前光照</span>
            <div>
                <span class="data-value" id="lightValue">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">LED亮度</span>
            <div>
                <span class="data-value" id="ledValue">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
    </div>

    <!-- 控制卡 -->
    <div class="card">
        <div class="card-title">控制面板</div>
        <div class="slider-container">
            <div class="slider-label">
                <span id="sliderLabel">目标光照</span>
                <span id="sliderValue">80%</span>
            </div>
            <input type="range" class="slider" id="brightnessSlider" min="0" max="100" value="80"
                oninput="onSliderInput(this.value)"
                onmousedown="isSliderDragging=true"
                ontouchstart="isSliderDragging=true"
                onmouseup="isSliderDragging=false"
                ontouchend="isSliderDragging=false">
        </div>
        <div class="control-row">
            <button class="btn btn-primary" id="modeBtn" onclick="toggleMode()">切换为手动</button>
            <button class="btn btn-alarm" onclick="clearAlarm()">消警</button>
        </div>
    </div>

    <!-- 日志卡 -->
    <div class="card log-card" onclick="toggleLog()">
        <div class="log-header">
            <span class="card-title" style="margin-bottom: 0;">操作日志</span>
            <span class="log-toggle" id="logToggle">展开 ▼</span>
        </div>
        <div class="log-content" id="logContent"></div>
    </div>

    <script>
        // Topic
        const UPLOAD_TOPIC = '123124/234235/zhiliangdiao/upload';
        const CMD_TOPIC = '123124/234235/zhiliangdiao/cmd';

        // 数据状态
        let currentData = {
            light: 0,
            led_brightness: 0,
            work_mode: 1,
            target_light: 80
        };

        // 冻结状态（下发后保护一段时间，防止回传旧值覆盖）
        let freezeState = {
            target_light: null,     // 冻结的目标值 { value, frozenAt, confirmed }
            led_brightness: null,   // 冻结的LED亮度值 { value, frozenAt, confirmed }
            protectDuration: 3000,  // 保护时长(ms)，确认后也继续保持保护
            maxWait: 8000           // 最大等待时间(ms)，防止永久冻结
        };

        let logs = [];
        let client = null;
        let sliderTimeout = null;
        let isSliderDragging = false;  // 滑块正在被拖动

        // 初始化 MQTT
        function initMQTT() {
            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
                reconnectPeriod: 3000
            });

            client.on('connect', () => {
                client.subscribe(UPLOAD_TOPIC);
                updateStatus(true);
                addLog('已连接');
            });

            client.on('message', (topic, payload) => {
                const parts = payload.toString().split(',');
                if (parts.length >= 3) {
                    // 光照始终更新
                    currentData.light = parseFloat(parts[0]);

                    // LED亮度：检查保护状态
                    const ledReceived = parseFloat(parts[1]);
                    const ledCheck = checkFrozen('led_brightness', ledReceived);
                    currentData.led_brightness = ledCheck.useLocal ? ledCheck.localValue : ledReceived;

                    currentData.work_mode = parseInt(parts[2]);

                    // 目标光照：检查保护状态
                    if (parts.length >= 4) {
                        const targetReceived = parseFloat(parts[3]);
                        const targetCheck = checkFrozen('target_light', targetReceived);
                        currentData.target_light = targetCheck.useLocal ? targetCheck.localValue : targetReceived;
                    }
                    updateUI();
                }
            });

            client.on('close', () => updateStatus(false));
            client.on('error', (err) => addLog('错误: ' + err.message));
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = connected ? 'status-dot connected' : 'status-dot disconnected';
            text.textContent = connected ? '已连接' : '未连接';
        }

        function updateUI() {
            document.getElementById('lightValue').textContent = currentData.light.toFixed(1);
            document.getElementById('ledValue').textContent = currentData.led_brightness;

            const modeBadge = document.getElementById('modeBadge');
            const modeBtn = document.getElementById('modeBtn');
            const sliderLabel = document.getElementById('sliderLabel');
            const slider = document.getElementById('brightnessSlider');
            const sliderValue = document.getElementById('sliderValue');

            if (currentData.work_mode === 1) {
                modeBadge.textContent = '自动';
                modeBadge.className = 'mode-badge';
                modeBtn.textContent = '切换为手动';
                sliderLabel.textContent = '目标光照';
                // 拖动期间不更新滑块位置
                if (!isSliderDragging) {
                    slider.value = currentData.target_light;
                    sliderValue.textContent = currentData.target_light.toFixed(0) + '%';
                }
            } else {
                modeBadge.textContent = '手动';
                modeBadge.className = 'mode-badge manual';
                modeBtn.textContent = '切换为自动';
                sliderLabel.textContent = 'LED亮度';
                // 拖动期间不更新滑块位置
                if (!isSliderDragging) {
                    slider.value = currentData.led_brightness;
                    sliderValue.textContent = currentData.led_brightness + '%';
                }
            }
        }

        function sendCmd(cmd) {
            if (client && client.connected) {
                client.publish(CMD_TOPIC, cmd);
                addLog('发送: ' + cmd);
            }
        }

        // 设置冻结（下发后保护一段时间）
        function setFreeze(field, value) {
            freezeState[field] = {
                value: value,
                frozenAt: Date.now(),
                confirmed: false  // 是否已收到确认
            };
            addLog('下发 ' + field + ' = ' + value);
        }

        // 检查字段是否在保护期内
        // 返回 { useLocal: true/false, localValue }
        function checkFrozen(field, receivedValue) {
            const frozen = freezeState[field];
            if (!frozen) {
                return { useLocal: false };
            }

            const elapsed = Date.now() - frozen.frozenAt;

            // 超时保护：超过maxWait，强制解除
            if (elapsed > freezeState.maxWait) {
                freezeState[field] = null;
                addLog(field + ' 保护超时解除');
                return { useLocal: false };
            }

            // 检查是否收到确认值
            if (!frozen.confirmed && Math.abs(receivedValue - frozen.value) < 0.5) {
                frozen.confirmed = true;
                addLog(field + ' 已确认');
            }

            // 保护期内始终使用本地值（确认后也继续保护，防止后续旧值覆盖）
            if (elapsed < freezeState.protectDuration) {
                return { useLocal: true, localValue: frozen.value };
            }

            // 保护期结束，解除冻结
            freezeState[field] = null;
            return { useLocal: false };
        }

        function onSliderInput(value) {
            document.getElementById('sliderValue').textContent = value + '%';
            if (sliderTimeout) clearTimeout(sliderTimeout);
            sliderTimeout = setTimeout(() => {
                if (currentData.work_mode === 1) {
                    // 自动模式：设置目标光照
                    sendCmd('08,' + value);
                    currentData.target_light = parseFloat(value);
                    setFreeze('target_light', parseFloat(value));
                } else {
                    // 手动模式：设置LED亮度
                    sendCmd('06,' + value);
                    currentData.led_brightness = parseFloat(value);
                    setFreeze('led_brightness', parseFloat(value));
                }
            }, 300);
        }

        function toggleMode() {
            const newMode = currentData.work_mode === 1 ? 0 : 1;
            sendCmd('07,' + newMode);
            // 切换模式时清除所有冻结（不再需要保护旧值）
            freezeState.target_light = null;
            freezeState.led_brightness = null;
        }

        function clearAlarm() {
            sendCmd('01');
            addLog('消警');
        }

        function addLog(msg) {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour12: false });
            logs.unshift({ time, msg });
            if (logs.length > 20) logs.pop();
            renderLogs();
        }

        function renderLogs() {
            document.getElementById('logContent').innerHTML =
                logs.map(l => `<div class="log-item">${l.time} - ${l.msg}</div>`).join('');
        }

        function toggleLog() {
            const content = document.getElementById('logContent');
            const toggle = document.getElementById('logToggle');
            content.classList.toggle('show');
            toggle.textContent = content.classList.contains('show') ? '收起 ▲' : '展开 ▼';
        }

        initMQTT();
    </script>
</body>
</html>
