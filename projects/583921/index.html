<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>实验室安全监测</title>
<script src="mqtt.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #F2F2F7;
  color: #1C1C1E;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── 顶部 ── */
.header {
  background: #fff;
  padding: 52px 20px 16px;
  border-bottom: 1px solid rgba(0,0,0,.08);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title { font-size: 17px; font-weight: 700; color: #1C1C1E; }
.header-right { display: flex; align-items: center; gap: 6px; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #C7C7CC; transition: background .4s; }
.conn-dot.on { background: #34C759; }
.conn-label { font-size: 12px; color: #8E8E93; }

/* ── 报警横幅 ── */
.alarm-banner {
  display: none;
  background: #FF3B30;
  color: #fff;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .3px;
  text-align: center;
}
.alarm-banner.show { display: block; }

/* ── 分区标题 ── */
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: #6D6D72;
  letter-spacing: .5px;
  text-transform: uppercase;
  padding: 20px 20px 8px;
}

/* ── 传感器网格 ── */
.sensor-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 16px;
}
.sensor-card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  transition: background .25s;
}
.sensor-card.alarm {
  background: #FFF2F1;
}
.sensor-label {
  font-size: 12px;
  font-weight: 600;
  color: #8E8E93;
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.sensor-card.alarm .sensor-label { color: #FF3B30; }
.sensor-value {
  font-size: 38px;
  font-weight: 300;
  color: #1C1C1E;
  line-height: 1;
  letter-spacing: -1px;
}
.sensor-card.alarm .sensor-value { color: #FF3B30; }
.sensor-unit {
  font-size: 14px;
  font-weight: 400;
  color: #AEAEB2;
  margin-left: 3px;
  letter-spacing: 0;
}

/* ── 人体感应 ── */
.pir-card {
  background: #fff;
  border-radius: 12px;
  margin: 12px 16px 0;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .25s;
}
.pir-card.active { background: #FFF8EE; }
.pir-left {}
.pir-label {
  font-size: 12px;
  font-weight: 600;
  color: #8E8E93;
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.pir-value { font-size: 17px; font-weight: 600; color: #1C1C1E; }
.pir-card.active .pir-value { color: #FF9500; }
.pir-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pir-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #34C759;
  transition: background .3s;
}
.pir-dot.warn { background: #FF9500; animation: blink .7s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.pir-status-text { font-size: 13px; font-weight: 500; color: #AEAEB2; }
.pir-card.active .pir-status-text { color: #FF9500; }

/* ── 报警标签 ── */
.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 16px 0;
}
.tag {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 100px;
  background: #E5E5EA;
  color: #6D6D72;
  transition: all .25s;
}
.tag.alarm {
  background: #FFDEDD;
  color: #FF3B30;
  animation: tagblink 1s infinite;
}
@keyframes tagblink { 0%,100%{opacity:1} 50%{opacity:.55} }

/* ── 控制按钮区 ── */
.control-card {
  background: #fff;
  border-radius: 12px;
  margin: 0 16px;
  overflow: hidden;
}
.mute-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: #FF3B30;
  color: #fff;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  border-radius: 12px;
  margin: 0 16px;
  width: calc(100% - 32px);
}
.mute-btn:active { opacity: .75; }

/* ── 继电器 ── */
.relay-card {
  background: #fff;
  border-radius: 12px;
  margin: 0 16px;
  overflow: hidden;
}
.relay-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #F2F2F7;
}
.relay-item:last-child { border-bottom: none; }
.relay-name { font-size: 15px; font-weight: 500; color: #1C1C1E; margin-bottom: 2px; }
.relay-desc { font-size: 12px; color: #AEAEB2; }
.relay-btns { display: flex; gap: 8px; }
.rbtn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.rbtn:active { opacity: .7; }
.rbtn-on  { background: #1C1C1E; color: #fff; }
.rbtn-off { background: #E5E5EA; color: #6D6D72; }

/* ── 阈值设置 ── */
.thr-card {
  background: #fff;
  border-radius: 12px;
  margin: 0 16px;
  overflow: hidden;
}
.thr-item {
  padding: 14px 16px;
  border-bottom: 1px solid #F2F2F7;
}
.thr-item:last-child { border-bottom: none; }
.thr-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}
.thr-name { font-size: 15px; font-weight: 500; color: #1C1C1E; }
.thr-cur { font-size: 13px; color: #AEAEB2; }
.thr-cur b { color: #3A3A3C; font-weight: 600; }
.thr-row { display: flex; gap: 8px; }
.thr-input {
  flex: 1;
  padding: 10px 12px;
  border: 1.5px solid #E5E5EA;
  border-radius: 8px;
  font-size: 15px;
  color: #1C1C1E;
  background: #fafafa;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.thr-input:focus { border-color: #007AFF; background: #fff; }
.thr-btn {
  padding: 10px 18px;
  background: #007AFF;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s;
}
.thr-btn:active { opacity: .75; }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="header-row">
    <div class="header-title">实验室安全监测</div>
    <div class="header-right">
      <div class="conn-dot" id="dot"></div>
      <div class="conn-label" id="connLabel">连接中</div>
    </div>
  </div>
</div>

<!-- 报警横幅 -->
<div class="alarm-banner" id="alarmBanner">⚠️ 检测到异常，请立即处理</div>

<!-- 传感器数据 -->
<div class="section-title">传感器数据</div>
<div class="sensor-grid">
  <div class="sensor-card" id="m-temp">
    <div class="sensor-label">温度</div>
    <div class="sensor-value"><span id="v-temp">--</span><span class="sensor-unit">℃</span></div>
  </div>
  <div class="sensor-card" id="m-humi">
    <div class="sensor-label">湿度</div>
    <div class="sensor-value"><span id="v-humi">--</span><span class="sensor-unit">%</span></div>
  </div>
  <div class="sensor-card" id="m-smoke">
    <div class="sensor-label">烟雾</div>
    <div class="sensor-value"><span id="v-smoke">--</span><span class="sensor-unit">adc</span></div>
  </div>
  <div class="sensor-card" id="m-current">
    <div class="sensor-label">电流</div>
    <div class="sensor-value"><span id="v-current">--</span><span class="sensor-unit">A</span></div>
  </div>
</div>

<!-- 人体感应 -->
<div class="pir-card" id="pirCard">
  <div class="pir-left">
    <div class="pir-label">人体感应</div>
    <div class="pir-value" id="v-pir">等待数据...</div>
  </div>
  <div class="pir-indicator">
    <div class="pir-dot" id="pirDot"></div>
    <div class="pir-status-text" id="pirText">--</div>
  </div>
</div>

<!-- 报警标签 -->
<div class="tag-row">
  <div class="tag" id="tag-smoke">烟雾正常</div>
  <div class="tag" id="tag-temp">温度正常</div>
  <div class="tag" id="tag-current">电流正常</div>
  <div class="tag" id="tag-pir">无人入侵</div>
</div>

<!-- 消警 -->
<div class="section-title">控制</div>
<button class="mute-btn" onclick="send('01')">消警 / 静音</button>

<!-- 继电器 -->
<div class="section-title">继电器控制</div>
<div class="relay-card">
  <div class="relay-item">
    <div>
      <div class="relay-name">继电器 1</div>
      <div class="relay-desc">通风控制</div>
    </div>
    <div class="relay-btns">
      <button class="rbtn rbtn-on"  onclick="send('05,1')">吸合</button>
      <button class="rbtn rbtn-off" onclick="send('05,0')">断开</button>
    </div>
  </div>
  <div class="relay-item">
    <div>
      <div class="relay-name">继电器 2</div>
      <div class="relay-desc">过温断电</div>
    </div>
    <div class="relay-btns">
      <button class="rbtn rbtn-on"  onclick="send('06,1')">吸合</button>
      <button class="rbtn rbtn-off" onclick="send('06,0')">断开</button>
    </div>
  </div>
  <div class="relay-item">
    <div>
      <div class="relay-name">继电器 3</div>
      <div class="relay-desc">过流断电</div>
    </div>
    <div class="relay-btns">
      <button class="rbtn rbtn-on"  onclick="send('07,1')">吸合</button>
      <button class="rbtn rbtn-off" onclick="send('07,0')">断开</button>
    </div>
  </div>
</div>

<!-- 阈值设置 -->
<div class="section-title">阈值设置</div>
<div class="thr-card">
  <div class="thr-item">
    <div class="thr-head">
      <div class="thr-name">烟雾阈值</div>
      <div class="thr-cur">当前 <b id="d-smoke">--</b> ADC</div>
    </div>
    <div class="thr-row">
      <input class="thr-input" type="number" id="i-smoke" placeholder="0 ~ 4095" min="0" max="4095">
      <button class="thr-btn" onclick="setThr('smoke','02')">设置</button>
    </div>
  </div>
  <div class="thr-item">
    <div class="thr-head">
      <div class="thr-name">温度阈值</div>
      <div class="thr-cur">当前 <b id="d-temp">--</b> ℃</div>
    </div>
    <div class="thr-row">
      <input class="thr-input" type="number" id="i-temp" placeholder="0 ~ 99 ℃" min="0" max="99">
      <button class="thr-btn" onclick="setThr('temp','03')">设置</button>
    </div>
  </div>
  <div class="thr-item">
    <div class="thr-head">
      <div class="thr-name">电流阈值</div>
      <div class="thr-cur">当前 <b id="d-current">--</b> A</div>
    </div>
    <div class="thr-row">
      <input class="thr-input" type="number" id="i-current" placeholder="0 ~ 30 A" min="0" max="30" step="0.1">
      <button class="thr-btn" onclick="setThr('current','04')">设置</button>
    </div>
  </div>
</div>

<script>
const UPLOAD  = '001/001/jisuanjishiyanshi/upload';
const CMD     = '001/001/jisuanjishiyanshi/cmd';
const BROKER  = 'wss://broker.emqx.io:8084/mqtt';
const DEBOUNCE = 800;
const lastSet = { thr_smoke:0, thr_temp:0, thr_current:0 };

let d = { temp:null,humi:null,smoke:null,current:null,pir:null,
          thr_smoke:null,thr_temp:null,thr_current:null };
let prevAlarm = { smoke:false,temp:false,current:false,pir:false };

const client = mqtt.connect(BROKER, {
  clientId: 'w_' + Math.random().toString(36).substr(2,8),
  reconnectPeriod: 3000, connectTimeout: 10000
});

function setConn(ok) {
  document.getElementById('dot').className = 'conn-dot' + (ok?' on':'');
  document.getElementById('connLabel').textContent = ok ? '实时' : '连接中';
}
client.on('connect',   ()=>{ setConn(true);  client.subscribe(UPLOAD); });
client.on('reconnect', ()=>setConn(false));
client.on('offline',   ()=>setConn(false));
client.on('error',     ()=>setConn(false));
client.on('message',   (t,p)=>{ if(t===UPLOAD) parse(p.toString()); });

function parse(raw) {
  const p = raw.split(',');
  if (p.length < 8) return;
  const now = Date.now();
  const nd = {
    temp:parseFloat(p[0]), humi:parseFloat(p[1]),
    smoke:parseFloat(p[2]), current:parseFloat(p[3]), pir:parseInt(p[4]),
    thr_smoke:parseFloat(p[5]), thr_temp:parseFloat(p[6]), thr_current:parseFloat(p[7])
  };
  ['thr_smoke','thr_temp','thr_current'].forEach(k=>{
    if(now-lastSet[k]<DEBOUNCE) nd[k]=d[k];
  });
  d = {...d,...nd};
  ui();
}

function ui() {
  setText('v-temp',    d.temp    !=null ? d.temp    : '--');
  setText('v-humi',    d.humi    !=null ? d.humi    : '--');
  setText('v-smoke',   d.smoke   !=null ? Math.round(d.smoke) : '--');
  setText('v-current', d.current !=null ? d.current.toFixed(2) : '--');
  setText('d-smoke',   d.thr_smoke   !=null ? Math.round(d.thr_smoke)   : '--');
  setText('d-temp',    d.thr_temp    !=null ? Math.round(d.thr_temp)    : '--');
  setText('d-current', d.thr_current !=null ? d.thr_current.toFixed(1)  : '--');

  const aSmoke   = d.smoke  !=null && d.thr_smoke  !=null && d.smoke   > d.thr_smoke;
  const aTemp    = d.temp   !=null && d.thr_temp   !=null && d.temp    > d.thr_temp;
  const aCurrent = d.current!=null && d.thr_current!=null && d.current > d.thr_current;
  const aPir     = d.pir === 1;
  const any      = aSmoke||aTemp||aCurrent||aPir;

  toggleClass('m-smoke',   'alarm', aSmoke);
  toggleClass('m-temp',    'alarm', aTemp);
  toggleClass('m-current', 'alarm', aCurrent);

  const pc = document.getElementById('pirCard');
  pc.className = 'pir-card' + (aPir ? ' active' : '');
  document.getElementById('pirDot').className  = 'pir-dot' + (aPir ? ' warn' : '');
  document.getElementById('pirText').textContent = aPir ? '有人' : '无人';
  setText('v-pir', d.pir==null ? '等待数据...' : aPir ? '检测到有人' : '区域无人');

  setTag('tag-smoke',   aSmoke,   '烟雾报警', '烟雾正常');
  setTag('tag-temp',    aTemp,    '过温报警', '温度正常');
  setTag('tag-current', aCurrent, '过流报警', '电流正常');
  setTag('tag-pir',     aPir,     '人体入侵', '无人入侵');

  document.getElementById('alarmBanner').className = 'alarm-banner' + (any?' show':'');

  if(aSmoke  &&!prevAlarm.smoke)   notify('烟雾报警',`ADC ${Math.round(d.smoke)} > ${d.thr_smoke}`);
  if(aTemp   &&!prevAlarm.temp)    notify('过温报警',`${d.temp}℃ > ${d.thr_temp}℃`);
  if(aCurrent&&!prevAlarm.current) notify('过流报警',`${d.current&&d.current.toFixed(2)}A > ${d.thr_current}A`);
  if(aPir    &&!prevAlarm.pir)     notify('人体入侵','检测到有人进入实验室');
  prevAlarm = {smoke:aSmoke,temp:aTemp,current:aCurrent,pir:aPir};
}

function setText(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }
function toggleClass(id,c,on){ const e=document.getElementById(id); if(!e)return; on?e.classList.add(c):e.classList.remove(c); }
function setTag(id,on,a,b){ const e=document.getElementById(id); if(!e)return; e.className='tag'+(on?' alarm':''); e.textContent=on?a:b; }

function send(cmd) {
  if(client.connected) client.publish(CMD, cmd);
  else alert('未连接，请稍候');
}

function setThr(field, code) {
  const inp = document.getElementById('i-'+field);
  const val = inp.value.trim();
  if(!val||isNaN(parseFloat(val))){ alert('请输入有效数值'); return; }
  const key = 'thr_'+field;
  lastSet[key] = Date.now();
  d[key] = parseFloat(val);
  send(code+','+val);
  inp.value = '';
  ui();
}

function notify(title, body) {
  if(window.Android) window.Android.onAlarm(JSON.stringify({title,body}));
  else if(typeof Notification!=='undefined'&&Notification.permission==='granted')
    new Notification('实验室告警：'+title,{body});
}
if(typeof Notification!=='undefined'&&Notification.permission==='default')
  Notification.requestPermission();
</script>
</body>
</html>
