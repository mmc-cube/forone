<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>养殖水质监测与预警系统</title>
    <script src="mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F5;
            color: #212121;
            min-height: 100vh;
            padding: 12px;
            max-width: 420px;
            margin: 0 auto;
        }
        .card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card-title {
            font-size: 14px;
            color: #757575;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #F44336;
        }
        .status-dot.connected { background: #4CAF50; }
        .mode-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #E3F2FD;
            color: #1976D2;
        }
        .mode-badge.manual { background: #FFF3E0; color: #F57C00; }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { font-size: 13px; color: #757575; }
        .data-value {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .data-num {
            font-size: 28px;
            font-weight: bold;
            color: #212121;
        }
        .data-unit { font-size: 13px; color: #757575; }
        .alarm-value { color: #F44336; }
        .alarm-status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .alarm-ok { background: #E8F5E9; color: #4CAF50; }
        .alarm-warn { background: #FFEBEE; color: #F44336; }
        .alarm-item {
            background: #FFCDD2;
            color: #C62828;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .alarm-item:last-child { margin-bottom: 0; }
        .btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            height: 48px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #2196F3; color: white; }
        .btn-secondary { background: #E0E0E0; color: #757575; }
        .btn-danger { background: #F44336; color: white; }
        .btn-success { background: #4CAF50; color: white; }
        .btn-warning { background: #FF9800; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .toggle-label { font-size: 14px; }
        .toggle-btns { display: flex; gap: 8px; }
        .toggle-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid #E0E0E0;
            background: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .toggle-btn.active {
            border-color: #2196F3;
            background: #E3F2FD;
            color: #1976D2;
        }
        .threshold-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .threshold-row:last-child { border-bottom: none; }
        .threshold-label { font-size: 14px; color: #757575; }
        .threshold-display {
            font-size: 18px;
            font-weight: 600;
            color: #212121;
        }
        .threshold-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .threshold-input-row:last-child { margin-bottom: 0; }
        .threshold-input-label { font-size: 13px; color: #757575; width: 70px; }
        .threshold-input {
            width: 80px;
            height: 36px;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            padding: 0 8px;
            font-size: 14px;
        }
        .threshold-send {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: #2196F3;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .log-card { cursor: pointer; }
        .log-content {
            display: none;
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
            background: #F5F5F5;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            font-family: monospace;
        }
        .log-content.show { display: block; }
        .log-item { padding: 4px 0; color: #757575; }
        .pump-control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .pump-control-row:last-child { border-bottom: none; }
        .pump-name { font-size: 14px; }
        .pump-btns { display: flex; gap: 6px; }
        .pump-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            cursor: pointer;
        }
        .pump-btn.on { background: #4CAF50; color: white; }
        .pump-btn.off { background: #E0E0E0; color: #757575; }
        .pump-btn.active { box-shadow: 0 0 0 2px #1976D2; font-weight: 600; }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="card">
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connDot"></div>
                <span id="connStatus">未连接</span>
            </div>
            <div class="mode-badge" id="modeBadge">AUTO</div>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">实时数据</div>
        <div class="data-row">
            <span class="data-label">TDS</span>
            <div class="data-value">
                <span class="data-num" id="tds">--</span>
                <span class="data-unit">ppm</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">pH</span>
            <div class="data-value">
                <span class="data-num" id="ph">--</span>
                <span class="data-unit"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">水温</span>
            <div class="data-value">
                <span class="data-num" id="temp">--</span>
                <span class="data-unit">℃</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">浊度</span>
            <div class="data-value">
                <span class="data-num" id="turb">--</span>
                <span class="data-unit">NTU</span>
            </div>
        </div>
    </div>

    <!-- 报警状态卡 -->
    <div class="card">
        <div class="card-title">报警状态</div>
        <div id="alarmContainer">
            <div class="alarm-status alarm-ok">运行正常 ✓</div>
        </div>
    </div>

    <!-- 模式切换卡 -->
    <div class="card">
        <div class="card-title">模式切换</div>
        <div class="toggle-row">
            <span class="toggle-label">当前模式</span>
            <div class="toggle-btns">
                <button class="toggle-btn active" id="autoBtn" onclick="setMode('auto')">AUTO</button>
                <button class="toggle-btn" id="manualBtn" onclick="setMode('manual')">MANUAL</button>
            </div>
        </div>
    </div>

    <!-- 控制卡（泵控制） -->
    <div class="card">
        <div class="card-title">设备控制（MANUAL 模式）</div>
        <div class="pump-control-row">
            <span class="pump-name">换水泵</span>
            <div class="pump-btns">
                <button class="pump-btn off" id="pump1Off" onclick="controlPump(1, 0)">关</button>
                <button class="pump-btn on" id="pump1On" onclick="controlPump(1, 1)">开</button>
            </div>
        </div>
        <div class="pump-control-row">
            <span class="pump-name">加药泵</span>
            <div class="pump-btns">
                <button class="pump-btn off" id="pump2Off" onclick="controlPump(2, 0)">关</button>
                <button class="pump-btn on" id="pump2On" onclick="controlPump(2, 1)">开</button>
            </div>
        </div>
    </div>

    <!-- 阈值显示卡 -->
    <div class="card">
        <div class="card-title">当前阈值（下位机上报）</div>
        <div class="data-row">
            <span class="data-label">TDS 阈值</span>
            <div class="data-value">
                <span class="data-num" id="thr_tds_display" style="font-size:20px">--</span>
                <span class="data-unit">ppm</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">pH 阈值</span>
            <div class="data-value">
                <span class="data-num" id="thr_ph_display" style="font-size:20px">--</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">水温阈值</span>
            <div class="data-value">
                <span class="data-num" id="thr_temp_display" style="font-size:20px">--</span>
                <span class="data-unit">℃</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">浊度阈值</span>
            <div class="data-value">
                <span class="data-num" id="thr_turb_display" style="font-size:20px">--</span>
                <span class="data-unit">NTU</span>
            </div>
        </div>
    </div>

    <!-- 阈值设置卡 -->
    <div class="card">
        <div class="card-title">阈值设置</div>
        <div class="threshold-input-row">
            <span class="threshold-input-label">TDS 阈值</span>
            <input type="number" class="threshold-input" id="input_tds" placeholder="ppm">
            <button class="threshold-send" onclick="setThreshold('tds', '02')">发送</button>
        </div>
        <div class="threshold-input-row">
            <span class="threshold-input-label">pH 阈值</span>
            <input type="number" class="threshold-input" id="input_ph" placeholder="0-14" step="0.1">
            <button class="threshold-send" onclick="setThreshold('ph', '03')">发送</button>
        </div>
        <div class="threshold-input-row">
            <span class="threshold-input-label">水温阈值</span>
            <input type="number" class="threshold-input" id="input_temp" placeholder="℃" step="0.1">
            <button class="threshold-send" onclick="setThreshold('temp', '04')">发送</button>
        </div>
        <div class="threshold-input-row">
            <span class="threshold-input-label">浊度阈值</span>
            <input type="number" class="threshold-input" id="input_turb" placeholder="NTU" step="0.1">
            <button class="threshold-send" onclick="setThreshold('turb', '05')">发送</button>
        </div>
    </div>

    <!-- 消警按钮 -->
    <div class="card">
        <button class="btn btn-danger" style="width:100%" onclick="clearAlarm()">消警</button>
    </div>

    <!-- 日志卡 -->
    <div class="card log-card" onclick="toggleLog()">
        <div class="card-title">日志记录 ▼</div>
        <div class="log-content" id="logContent"></div>
    </div>

<script>
// MQTT 配置
const UPLOAD_TOPIC = '001015/001015/yangzhishuizhijiance/upload';
const CMD_TOPIC = '001015/001015/yangzhishuizhijiance/cmd';
let client = null;

// 当前数据
let currentData = {
    tds: null, ph: null, temp: null, turb: null,
    thr_tds: null, thr_ph: null, thr_temp: null, thr_turb: null,
    mode: 'AUTO',
    pump1: 0, pump2: 0  // 泵状态（乐观更新）
};

// 同步保护状态（阈值）
let waitingSync = { tds: false, ph: false, temp: false, turb: false };
let pendingValue = { tds: null, ph: null, temp: null, turb: null };
let syncTimeoutTimer = { tds: null, ph: null, temp: null, turb: null };
let lastUserSetTime = { tds: 0, ph: 0, temp: 0, turb: 0 };

// 模式和泵的乐观更新保护
let lastModeSetTime = 0;
let lastPumpSetTime = { pump1: 0, pump2: 0 };
const MODE_DEBOUNCE_MS = 1000;   // 模式切换防抖时间
const PUMP_DEBOUNCE_MS = 500;    // 泵控制防抖时间

const DEBOUNCE_MS = 500;
const SYNC_TIMEOUT_MS = 5000;

// 日志记录
let logs = [];

// 连接 MQTT
function connectMQTT() {
    client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
        clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
        reconnectPeriod: 3000
    });

    client.on('connect', () => {
        document.getElementById('connDot').classList.add('connected');
        document.getElementById('connStatus').textContent = '已连接';
        client.subscribe(UPLOAD_TOPIC);
    });

    client.on('close', () => {
        document.getElementById('connDot').classList.remove('connected');
        document.getElementById('connStatus').textContent = '未连接';
    });

    client.on('message', (topic, payload) => {
        parseMessage(payload.toString());
    });
}

// 解析消息
function parseMessage(message) {
    const parts = message.split(',');
    if (parts.length < 9) return;

    const newData = {
        tds: parseFloat(parts[0]),
        ph: parseFloat(parts[1]),
        temp: parseFloat(parts[2]),
        turb: parseFloat(parts[3]),
        thr_tds: parseFloat(parts[4]),
        thr_ph: parseFloat(parts[5]),
        thr_temp: parseFloat(parts[6]),
        thr_turb: parseFloat(parts[7]),
        mode: parts[8] || 'AUTO'
    };

    // 传感器值始终更新
    currentData.tds = newData.tds;
    currentData.ph = newData.ph;
    currentData.temp = newData.temp;
    currentData.turb = newData.turb;

    // 模式更新（乐观保护：用户操作后一段时间内不覆盖）
    const now = Date.now();
    if (!lastModeSetTime || (now - lastModeSetTime) >= MODE_DEBOUNCE_MS) {
        currentData.mode = newData.mode;
    }

    // 检查同步确认
    let hasPendingSync = false;
    for (const [key, isWaiting] of Object.entries(waitingSync)) {
        if (isWaiting) {
            hasPendingSync = true;
            const expectedValue = pendingValue[key];
            const receivedValue = newData['thr_' + key];
            if (expectedValue !== null && Math.abs(receivedValue - expectedValue) < 0.5) {
                if (syncTimeoutTimer[key]) {
                    clearTimeout(syncTimeoutTimer[key]);
                    syncTimeoutTimer[key] = null;
                }
                waitingSync[key] = false;
                pendingValue[key] = null;
                lastUserSetTime[key] = 0;
            }
        }
    }

    // 阈值更新逻辑（三重保护）
    for (const key of ['tds', 'ph', 'temp', 'turb']) {
        const threshKey = 'thr_' + key;
        if (!lastUserSetTime[key] || (now - lastUserSetTime[key]) >= DEBOUNCE_MS) {
            if (!waitingSync[key]) {
                currentData[threshKey] = newData[threshKey];
            }
        }
    }

    updateUI();
    if (hasPendingSync) {
        checkAlarmsWithPending();
    } else {
        checkAlarms();
    }
    addLog(message);
}

// 更新 UI
function updateUI() {
    // 传感器数值
    if (currentData.tds !== null) {
        document.getElementById('tds').textContent = currentData.tds.toFixed(1);
    }
    if (currentData.ph !== null) {
        document.getElementById('ph').textContent = currentData.ph.toFixed(2);
    }
    if (currentData.temp !== null) {
        document.getElementById('temp').textContent = currentData.temp.toFixed(1);
    }
    if (currentData.turb !== null) {
        document.getElementById('turb').textContent = currentData.turb.toFixed(1);
    }

    // 模式
    updateModeUI(currentData.mode);

    // 泵状态（MANUAL 模式下显示）
    if (currentData.mode === 'MANUAL') {
        updatePumpUI();
    }

    // 阈值显示（等待期间显示预测值）
    if (currentData.thr_tds !== null) {
        document.getElementById('thr_tds_display').textContent =
            waitingSync.tds ? pendingValue.tds : currentData.thr_tds;
    }
    if (currentData.thr_ph !== null) {
        document.getElementById('thr_ph_display').textContent =
            waitingSync.ph ? pendingValue.ph : currentData.thr_ph;
    }
    if (currentData.thr_temp !== null) {
        document.getElementById('thr_temp_display').textContent =
            waitingSync.temp ? pendingValue.temp : currentData.thr_temp;
    }
    if (currentData.thr_turb !== null) {
        document.getElementById('thr_turb_display').textContent =
            waitingSync.turb ? pendingValue.turb : currentData.thr_turb;
    }
}

// 更新模式 UI
function updateModeUI(mode) {
    const badge = document.getElementById('modeBadge');
    const autoBtn = document.getElementById('autoBtn');
    const manualBtn = document.getElementById('manualBtn');
    const pumpBtns = document.querySelectorAll('.pump-btn');

    if (mode === 'AUTO') {
        badge.textContent = 'AUTO';
        badge.classList.remove('manual');
        autoBtn.classList.add('active');
        manualBtn.classList.remove('active');
        pumpBtns.forEach(btn => btn.disabled = true);
    } else {
        badge.textContent = 'MANUAL';
        badge.classList.add('manual');
        autoBtn.classList.remove('active');
        manualBtn.classList.add('active');
        pumpBtns.forEach(btn => btn.disabled = false);
    }
}

// 更新泵状态 UI（乐观更新）
function updatePumpUI() {
    // 换水泵
    document.getElementById('pump1Off').classList.toggle('active', currentData.pump1 === 0);
    document.getElementById('pump1On').classList.toggle('active', currentData.pump1 === 1);
    // 加药泵
    document.getElementById('pump2Off').classList.toggle('active', currentData.pump2 === 0);
    document.getElementById('pump2On').classList.toggle('active', currentData.pump2 === 1);
}

// 报警判断
function checkAlarms() {
    const alarms = [];
    if (currentData.tds !== null && currentData.thr_tds !== null &&
        currentData.tds > currentData.thr_tds) {
        alarms.push('TDS 超阈值');
    }
    if (currentData.ph !== null && currentData.thr_ph !== null &&
        currentData.ph > currentData.thr_ph) {
        alarms.push('pH 超阈值');
    }
    if (currentData.temp !== null && currentData.thr_temp !== null &&
        currentData.temp > currentData.thr_temp) {
        alarms.push('水温超阈值');
    }
    if (currentData.turb !== null && currentData.thr_turb !== null &&
        currentData.turb > currentData.thr_turb) {
        alarms.push('浊度超阈值');
    }
    renderAlarms(alarms);
}

// 等待确认期间报警判断
function checkAlarmsWithPending() {
    const alarms = [];
    const thrTds = waitingSync.tds ? pendingValue.tds : currentData.thr_tds;
    const thrPh = waitingSync.ph ? pendingValue.ph : currentData.thr_ph;
    const thrTemp = waitingSync.temp ? pendingValue.temp : currentData.thr_temp;
    const thrTurb = waitingSync.turb ? pendingValue.turb : currentData.thr_turb;

    if (currentData.tds !== null && thrTds !== null && currentData.tds > thrTds) {
        alarms.push('TDS 超阈值');
    }
    if (currentData.ph !== null && thrPh !== null && currentData.ph > thrPh) {
        alarms.push('pH 超阈值');
    }
    if (currentData.temp !== null && thrTemp !== null && currentData.temp > thrTemp) {
        alarms.push('水温超阈值');
    }
    if (currentData.turb !== null && thrTurb !== null && currentData.turb > thrTurb) {
        alarms.push('浊度超阈值');
    }
    renderAlarms(alarms);
}

// 渲染报警
function renderAlarms(alarms) {
    const container = document.getElementById('alarmContainer');
    if (alarms.length === 0) {
        container.innerHTML = '<div class="alarm-status alarm-ok">运行正常 ✓</div>';
        // 清除报警值红色样式
        document.querySelectorAll('.data-num').forEach(el => el.classList.remove('alarm-value'));
    } else {
        let html = '<div class="alarm-status alarm-warn">报警中</div>';
        alarms.forEach(a => html += `<div class="alarm-item">${a}</div>`);
        container.innerHTML = html;
        // 报警字段标红
        if (alarms.some(a => a.includes('TDS'))) document.getElementById('tds').classList.add('alarm-value');
        if (alarms.some(a => a.includes('pH'))) document.getElementById('ph').classList.add('alarm-value');
        if (alarms.some(a => a.includes('水温'))) document.getElementById('temp').classList.add('alarm-value');
        if (alarms.some(a => a.includes('浊度'))) document.getElementById('turb').classList.add('alarm-value');
    }
}

// 发送指令
function sendCmd(cmd) {
    if (client && client.connected) {
        client.publish(CMD_TOPIC, cmd);
        addLog('发送: ' + cmd);
    }
}

// 设置阈值（带同步保护）
function setThreshold(type, cmdCode) {
    const inputId = 'input_' + type;
    const value = document.getElementById(inputId).value;
    if (!value) {
        alert('请输入阈值');
        return;
    }
    const numValue = parseFloat(value);
    if (isNaN(numValue)) {
        alert('请输入有效数字');
        return;
    }
    if (waitingSync[type]) {
        console.log('Already waiting sync for ' + type);
        return;
    }

    waitingSync[type] = true;
    pendingValue[type] = numValue;
    sendCmd(cmdCode + ',' + numValue);
    lastUserSetTime[type] = Date.now();
    currentData['thr_' + type] = numValue;
    updateUI();
    checkAlarmsWithPending();

    syncTimeoutTimer[type] = setTimeout(() => {
        if (waitingSync[type]) {
            console.warn('Sync timeout for ' + type);
            waitingSync[type] = false;
            pendingValue[type] = null;
            syncTimeoutTimer[type] = null;
        }
    }, SYNC_TIMEOUT_MS);

    document.getElementById(inputId).blur();
}

// 切换模式（乐观更新）
function setMode(mode) {
    // 1. 立即更新本地状态
    if (mode === 'auto') {
        currentData.mode = 'AUTO';
        sendCmd('10');
    } else {
        currentData.mode = 'MANUAL';
        sendCmd('11');
    }

    // 2. 记录用户操作时间（防抖）
    lastModeSetTime = Date.now();

    // 3. 立即更新 UI（乐观反馈）
    updateModeUI(currentData.mode);

    // 4. MANUAL 模式下初始化泵状态显示
    if (mode === 'manual') {
        updatePumpUI();
    }
}

// 控制泵（乐观更新）
function controlPump(pumpId, state) {
    if (currentData.mode !== 'MANUAL') {
        alert('请在 MANUAL 模式下操作');
        return;
    }

    const pumpKey = 'pump' + pumpId;

    // 1. 立即更新本地状态
    currentData[pumpKey] = state;

    // 2. 发送指令
    const cmdCode = '2' + pumpId;
    sendCmd(cmdCode + ',' + state);

    // 3. 记录用户操作时间（防抖）
    lastPumpSetTime[pumpKey] = Date.now();

    // 4. 立即更新 UI（乐观反馈）
    updatePumpUI();
}

// 消警
function clearAlarm() {
    sendCmd('01');
}

// 日志
function addLog(msg) {
    const time = new Date().toLocaleTimeString();
    logs.unshift('[' + time + '] ' + msg);
    if (logs.length > 20) logs.pop();
    const container = document.getElementById('logContent');
    container.innerHTML = logs.map(l => '<div class="log-item">' + l + '</div>').join('');
}

function toggleLog() {
    const content = document.getElementById('logContent');
    content.classList.toggle('show');
}

// 启动
connectMQTT();
</script>
