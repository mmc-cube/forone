<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能控制系统</title>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --warn: #FF9800;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 420px;
            margin: 0 auto;
            padding: 12px;
        }

        .topbar {
            padding: 10px 16px;
            background: var(--card);
            border-radius: var(--radius);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-connected { background: var(--ok); }
        .status-disconnected { background: var(--alarm); }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-child { border-bottom: none; }

        .data-name {
            font-size: 13px;
            color: var(--sub);
        }

        .data-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }

        .data-unit {
            font-size: 13px;
            color: var(--sub);
            margin-left: 4px;
        }

        .alarm-text { color: var(--alarm); }
        .warn-text { color: var(--warn); }
        .ok-text { color: var(--ok); }

        .actuator-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .actuator-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .tag-on { background: var(--ok); color: white; }
        .tag-off { background: #e0e0e0; color: var(--sub); }

        .alarm-bar {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .alarm-active {
            background: var(--alarm);
            color: white;
        }
        .alarm-normal {
            background: var(--ok);
            color: white;
        }

        .btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .btn:active { opacity: 0.8; }
        .btn-alarm { background: var(--alarm); }

        .threshold-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .threshold-label {
            font-size: 13px;
            color: var(--sub);
            flex: 1;
        }

        .threshold-input {
            width: 80px;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 15px;
        }

        .threshold-btn {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            cursor: pointer;
        }

        .threshold-display {
            font-size: 14px;
            color: var(--text);
        }

        .log-section {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: var(--sub);
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }

        details {
            margin-top: 12px;
        }

        summary {
            cursor: pointer;
            font-size: 14px;
            color: var(--sub);
            padding: 8px 0;
        }

        .light-status {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .light-strong { background: #FFC107; color: white; }
        .light-medium { background: #8BC34A; color: white; }
        .light-weak { background: #607D8B; color: white; }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: var(--card);
            display: flex;
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--sub);
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
            font-weight: 600;
        }

        .nav-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }

        /* 页面内容区 */
        .page {
            display: none;
            padding-bottom: 60px;
        }
        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 页面容器 -->
    <div id="page-home" class="page active">
        <!-- 状态栏 -->
        <div class="topbar">
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <div style="font-size: 13px; color: var(--sub);"></div>
        </div>

        <!-- 实时数据卡 -->
        <div class="card">
            <div class="card-title">实时数据</div>
            <div class="data-row">
                <span class="data-name">温度</span>
                <div>
                    <span class="data-value" id="temp">--.-</span>
                    <span class="data-unit">℃</span>
                </div>
            </div>
            <div class="data-row">
                <span class="data-name">空气湿度</span>
                <div>
                    <span class="data-value" id="humi">--</span>
                    <span class="data-unit">%</span>
                </div>
            </div>
            <div class="data-row">
                <span class="data-name">基质湿度</span>
                <div>
                    <span class="data-value" id="soil">--</span>
                    <span class="data-unit">%</span>
                </div>
            </div>
            <div class="data-row">
                <span class="data-name">光照</span>
                <div>
                    <span class="data-value" id="light">----</span>
                    <span class="data-unit" id="lightStatus"></span>
                </div>
            </div>
            <div class="data-row">
                <span class="data-name">气体浓度</span>
                <div>
                    <span class="data-value" id="gas">----</span>
                </div>
            </div>
        </div>

        <!-- 执行器状态卡 -->
        <div class="card">
            <div class="card-title">执行器状态</div>
            <div class="actuator-row">
                <span class="actuator-tag tag-off" id="heatTag">加热片</span>
                <span class="actuator-tag tag-off" id="fanTag">散热风扇</span>
                <span class="actuator-tag tag-off" id="ventTag">通风风扇</span>
                <span class="actuator-tag tag-off" id="pumpTag">水泵</span>
                <span class="actuator-tag tag-off" id="ledTag">LED</span>
            </div>
        </div>

        <!-- 报警状态卡 -->
        <div class="card" id="alarmCard">
            <div class="card-title">报警状态</div>
            <div class="alarm-bar alarm-normal" id="alarmBar">运行正常 ✓</div>
        </div>

        <!-- 消警按钮 -->
        <div class="card">
            <button class="btn btn-alarm" onclick="sendAlarm()">消警</button>
        </div>

        <!-- 阈值显示卡（只读） -->
        <div class="card">
            <div class="card-title">当前阈值（只读）</div>
            <div class="threshold-row">
                <span class="threshold-label">温度下限</span>
                <span class="threshold-display" id="threshTempL_display">--</span>
                <span class="data-unit">℃</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">温度上限</span>
                <span class="threshold-display" id="threshTempH_display">--</span>
                <span class="data-unit">℃</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">基质湿度阈值</span>
                <span class="threshold-display" id="threshSoil_display">--</span>
                <span class="data-unit">%</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">气体报警阈值</span>
                <span class="threshold-display" id="threshGas_display">----</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">浇水时长</span>
                <span class="threshold-display" id="waterTime_display">--</span>
                <span class="data-unit">秒</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">通风启动阈值</span>
                <span class="threshold-display" id="ventGasThresh_display">--</span>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">光照阈值</span>
                <span class="threshold-display" id="threshLight_display">--</span>
                <span class="data-unit"></span>
            </div>
        </div>

        <!-- 阈值设置卡 -->
        <div class="card">
            <div class="card-title">阈值设置</div>
            <div class="threshold-row">
                <span class="threshold-label">温度下限</span>
                <input type="number" class="threshold-input" id="threshTempL_input" placeholder="18">
                <button class="threshold-btn" onclick="setThreshold('tempL', '02', 10, 30)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">温度上限</span>
                <input type="number" class="threshold-input" id="threshTempH_input" placeholder="25">
                <button class="threshold-btn" onclick="setThreshold('tempH', '03', 15, 35)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">基质湿度阈值</span>
                <input type="number" class="threshold-input" id="threshSoil_input" placeholder="40">
                <button class="threshold-btn" onclick="setThreshold('soil', '04', 10, 90)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">气体报警阈值</span>
                <input type="number" class="threshold-input" id="threshGas_input" placeholder="2000">
                <button class="threshold-btn" onclick="setThreshold('gas', '05', 500, 4000)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">浇水时长</span>
                <input type="number" class="threshold-input" id="waterTime_input" placeholder="10">
                <button class="threshold-btn" onclick="setThreshold('water', '06', 1, 60)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">通风启动阈值</span>
                <input type="number" class="threshold-input" id="ventGasThresh_input" placeholder="1500">
                <button class="threshold-btn" onclick="setThreshold('ventGas', '07', 500, 4000)">发送</button>
            </div>
            <div class="threshold-row">
                <span class="threshold-label">光照阈值</span>
                <input type="number" class="threshold-input" id="threshLight_input" placeholder="1000">
                <button class="threshold-btn" onclick="setThreshold('light', '08', 100, 3000)">发送</button>
            </div>
        </div>

        <!-- 日志卡 -->
        <div class="card">
            <details>
                <summary>数据日志（点击展开）</summary>
                <div class="log-section" id="logSection"></div>
            </details>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('home')" id="nav-home">
            <span class="nav-icon">📊</span>
            实时监控
        </button>
    </div>

    <script src="mqtt.min.js"></script>
    <script>
        // ==================== MQTT 配置 ====================
        const UPLOAD_TOPIC = '8782/8782/dulaojiankang/upload';
        const CMD_TOPIC = '8782/8782/dulaojiankang/cmd';

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: 'webview_' + Math.random().toString(36).substr(2, 6),
            reconnectPeriod: 3000,
            clean: true,
            connectTimeout: 10000,
            keepalive: 60
        });

        // ==================== 当前数据 ====================
        let currentData = {
            temp: null, humi: null, soil: null, light: null, gas: null,
            heat: false, fan: false, pump: false, vent: false,
            threshTempL: null, threshTempH: null, threshSoil: null,
            threshGas: null, waterTime: null, ventGasThresh: null,
            threshLight: null
        };

        // ==================== MQTT 连接回调 ====================
        client.on('connect', () => {
            console.log('=== MQTT CONNECTED ===');
            console.log('Client ID:', client.options.clientId);
            addLog('[CONNECTED] MQTT 已连接');
            document.getElementById('statusDot').className = 'status-dot status-connected';
            document.getElementById('statusText').textContent = '已连接';
            client.subscribe(UPLOAD_TOPIC, (err) => {
                if (err) {
                    console.error('[SUBSCRIBE ERROR]', err);
                    addLog('[ERROR] 订阅失败：' + err.message);
                } else {
                    console.log('[SUBSCRIBE OK] 已订阅:', UPLOAD_TOPIC);
                    addLog('[OK] 已订阅主题：' + UPLOAD_TOPIC);
                }
            });
        });

        client.on('disconnect', () => {
            console.log('MQTT Disconnected');
            document.getElementById('statusDot').className = 'status-dot status-disconnected';
            document.getElementById('statusText').textContent = '未连接';
            addLog('[DISCONNECT] MQTT 已断开');
        });

        client.on('reconnect', () => {
            console.log('MQTT Reconnecting...');
            addLog('[RECONNECT] MQTT 重连中...');
        });

        client.on('offline', () => {
            console.log('MQTT Offline');
            addLog('[OFFLINE] MQTT 离线');
        });

        client.on('error', (err) => {
            console.error('[MQTT ERROR]', err);
            addLog('[ERROR] MQTT 错误：' + err.message);
        });

        // 监听发布事件
        client.on('packetsend', (packet) => {
            if (packet.cmd === 'publish') {
                console.log('[PACKET SENT] Publish to:', packet.topic, 'payload:', packet.payload?.toString());
            }
        });

        client.on('message', (topic, payload) => {
            console.log('[MQTT RX] Topic:', topic, 'Payload:', payload.toString());
            if (topic === UPLOAD_TOPIC) {
                parseMessage(payload.toString());
            }
        });

        // ==================== 解析消息（带同步保护） ====================
        function parseMessage(message) {
            const parts = message.split(',');
            if (parts.length < 16) return;

            const now = Date.now();

            const newData = {
                temp: parseFloat(parts[0]) / 10,
                humi: parseInt(parts[1]),
                soil: parseInt(parts[2]),
                light: parseInt(parts[3]),
                gas: parseInt(parts[4]),
                heat: parts[5] === '1',
                fan: parts[6] === '1',
                vent: parts[7] === '1',
                pump: parts[8] === '1',
                threshTempL: parseInt(parts[9]),
                threshTempH: parseInt(parts[10]),
                threshSoil: parseInt(parts[11]),
                threshGas: parseInt(parts[12]),
                waterTime: parseInt(parts[13]),
                ventGasThresh: parseInt(parts[14]),
                threshLight: parseInt(parts[15])
            };

            // 传感器值始终更新
            currentData.temp = newData.temp;
            currentData.humi = newData.humi;
            currentData.soil = newData.soil;
            currentData.light = newData.light;
            currentData.gas = newData.gas;
            currentData.heat = newData.heat;
            currentData.fan = newData.fan;
            currentData.pump = newData.pump;
            currentData.vent = newData.vent;

            // 阈值更新：直接更新下位机上报的数据
            currentData.threshTempL = newData.threshTempL;
            currentData.threshTempH = newData.threshTempH;
            currentData.threshSoil = newData.threshSoil;
            currentData.threshGas = newData.threshGas;
            currentData.waterTime = newData.waterTime;
            currentData.ventGasThresh = newData.ventGasThresh;
            currentData.threshLight = newData.threshLight;

            updateUI();

            // 使用简化后的报警判断
            checkAlarms();

            addLog(message);
        }

        // ==================== 更新 UI ====================
        function updateUI() {
            if (currentData.temp !== null) {
                document.getElementById('temp').textContent = currentData.temp.toFixed(1);
            }
            if (currentData.humi !== null) {
                document.getElementById('humi').textContent = currentData.humi;
            }
            if (currentData.soil !== null) {
                document.getElementById('soil').textContent = currentData.soil;
            }
            if (currentData.light !== null) {
                document.getElementById('light').textContent = currentData.light;
                const status = getLightStatus(currentData.light);
                document.getElementById('lightStatus').textContent = status.text;
                document.getElementById('lightStatus').className = 'light-status ' + status.class;
            }
            if (currentData.gas !== null) {
                document.getElementById('gas').textContent = currentData.gas;
            }

            // 执行器状态
            updateActuator('heat', currentData.heat);
            updateActuator('fan', currentData.fan);
            updateActuator('pump', currentData.pump);
            updateActuator('vent', currentData.vent);
            // LED 状态：根据光照值和光照阈值判断
            if (currentData.light !== null && currentData.threshLight !== null) {
                updateActuator('led', currentData.light < currentData.threshLight);
            }

            // 阈值显示（等待期间显示预测值）
            updateThreshDisplay('tempL', 'threshTempL');
            updateThreshDisplay('tempH', 'threshTempH');
            updateThreshDisplay('soil', 'threshSoil');
            updateThreshDisplay('gas', 'threshGas');
            updateThreshDisplay('water', 'waterTime');
            updateThreshDisplay('ventGas', 'ventGasThresh');
            updateThreshDisplay('light', 'threshLight');
        }

        function updateActuator(type, state) {
            const tag = document.getElementById(type + 'Tag');
            if (state) {
                tag.className = 'actuator-tag tag-on';
                tag.textContent = getActuatorName(type) + ' ON';
            } else {
                tag.className = 'actuator-tag tag-off';
                tag.textContent = getActuatorName(type);
            }
        }

        function getActuatorName(type) {
            const names = { heat: '加热片', fan: '散热风扇', pump: '水泵', vent: '通风风扇', led: 'LED' };
            return names[type] || type;
        }

        function updateThreshDisplay(key, dataKey) {
            const display = document.getElementById(dataKey + '_display');
            if (display && currentData[dataKey] !== null) {
                display.textContent = currentData[dataKey];
            }
        }

        function getLightStatus(light) {
            if (light < 1000) return { text: '弱光', class: 'light-weak' };     // 值越小越暗
            if (light < 3000) return { text: '中等', class: 'light-medium' };
            return { text: '强光', class: 'light-strong' };                      // 值越大越亮
        }

        // ==================== 报警判断 ====================
        function checkAlarms() {
            const alarms = [];

            // 温度报警
            if (currentData.temp !== null && currentData.threshTempL !== null && currentData.threshTempH !== null) {
                if (currentData.temp < currentData.threshTempL || currentData.temp > currentData.threshTempH) {
                    alarms.push('⚠ 温度异常');
                }
            }

            // 气体报警
            if (currentData.gas !== null && currentData.threshGas !== null) {
                if (currentData.gas > currentData.threshGas) {
                    alarms.push('⚠ 气体超标');
                }
            }

            // 土壤湿度报警
            if (currentData.soil !== null && currentData.threshSoil !== null) {
                if (currentData.soil < currentData.threshSoil) {
                    alarms.push('⚠ 基质偏干');
                }
            }

            renderAlarms(alarms);

            if (alarms.length > 0) {
                sendAlarmToNative({ alarms });
            }
        }

        function renderAlarms(alarms) {
            const alarmBar = document.getElementById('alarmBar');
            if (alarms.length === 0) {
                alarmBar.className = 'alarm-bar alarm-normal';
                alarmBar.textContent = '运行正常 ✓';
            } else {
                alarmBar.className = 'alarm-bar alarm-active';
                alarmBar.textContent = alarms.join(' | ');
            }
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            console.log('[SEND] 准备发送指令:', cmd);

            // 检查客户端连接状态
            if (!client || !client.connected) {
                console.error('[SEND] MQTT 客户端未连接');
                addLog('[ERROR] MQTT 未连接，无法发送指令');
                return;
            }

            // 记录发布前的详细信息
            const publishOptions = { qos: 0, retain: false };
            console.log('[SEND] 发布主题:', CMD_TOPIC);
            console.log('[SEND] 发布内容:', cmd);
            console.log('[SEND] 发布选项:', publishOptions);

            // 尝试发布消息
            try {
                const result = client.publish(CMD_TOPIC, cmd, publishOptions, (err) => {
                    if (err) {
                        console.error('[SEND ERROR] 发布失败:', err);
                        addLog('[ERROR] 指令发送失败：' + err.message);
                    } else {
                        console.log('[SEND OK] 已成功发布到:', CMD_TOPIC);
                        addLog('[OK] 指令已发送：' + cmd);
                    }
                });
                console.log('[SEND] publish() 返回值:', result);
            } catch (e) {
                console.error('[SEND EXCEPTION]', e);
                addLog('[ERROR] 发送异常：' + e.message);
            }
        }

        function sendAlarm() {
            sendCmd('01');
            alert('已发送消警指令');
        }

        // ==================== 设置阈值（带完整同步保护） ====================
        function setThreshold(type, cmdCode, min, max) {
            console.log('[SETTHRESH] 调用参数:', { type, cmdCode, min, max });

            // 根据 type 获取对应的输入框 ID
            const inputIdMap = {
                tempL: 'threshTempL_input',
                tempH: 'threshTempH_input',
                soil: 'threshSoil_input',
                gas: 'threshGas_input',
                water: 'waterTime_input',
                ventGas: 'ventGasThresh_input',
                light: 'threshLight_input'
            };

            const inputId = inputIdMap[type];
            console.log('[SETTHRESH] 查找输入框 ID:', inputId);

            const input = document.getElementById(inputId);
            if (!input) {
                console.error('[SETTHRESH] 找不到输入框：' + inputId);
                alert('系统错误：找不到输入框 ' + inputId);
                return;
            }

            const value = input.value;
            console.log('[SETTHRESH] 输入值:', value);

            if (!value || value === '') {
                console.warn('[SETTHRESH] 输入为空');
                alert('请输入阈值');
                return;
            }

            const numValue = parseFloat(value);
            if (isNaN(numValue)) {
                console.warn('[SETTHRESH] 不是有效数字:', value);
                alert('请输入有效数字');
                return;
            }

            if (numValue < min || numValue > max) {
                console.warn('[SETTHRESH] 超出范围:', numValue, '范围:', min, '-', max);
                alert(`请输入${min}-${max}范围内的值`);
                return;
            }

            console.log('[SETTHRESH] 验证通过，准备发送指令');

            // 发送指令
            const cmd = `${cmdCode},${numValue}`;
            console.log('[SETTHRESH] 发送指令:', cmd);
            sendCmd(cmd);

            alert('指令已发送');

            input.blur();
        }

        // ==================== 日志 ====================
        function addLog(message) {
            const logSection = document.getElementById('logSection');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = new Date().toLocaleTimeString() + ': ' + message;
            logSection.insertBefore(entry, logSection.firstChild);

            while (logSection.children.length > 20) {
                logSection.removeChild(logSection.lastChild);
            }
        }

        // ==================== 页面切换 ====================
        function switchPage(page) {
            // 隐藏所有页面
            document.getElementById('page-home').classList.remove('active');
            // 移除导航激活状态
            document.getElementById('nav-home').classList.remove('active');

            // 显示目标页面
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('nav-' + page).classList.add('active');
        }

        // ==================== JS Bridge (Android WebView) ====================
        function sendAlarmToNative(data) {
            if (window.Android) {
                window.Android.onAlarm(JSON.stringify(data));
            } else if (window.Notification && Notification.permission === 'granted') {
                new Notification('告警', { body: JSON.stringify(data) });
            }
        }

        // 请求通知权限
        if (window.Notification && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
