<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能坐姿矫正台灯系统</title>
    <style>
        :root {
            --bg: #F5F5F5;
            --card: #FFFFFF;
            --primary: #2196F3;
            --alarm: #F44336;
            --ok: #4CAF50;
            --text: #212121;
            --sub: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            padding: 44px 12px 20px;
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 14px;
            color: var(--sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--sub);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .status-dot.connected { background: var(--ok); }
        .status-dot.disconnected { background: var(--alarm); }
        .status-dot.bluetooth { background: #9C27B0; }

        /* ===== 实时数据 ===== */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .data-number {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
        }
        .data-unit {
            font-size: 13px;
            color: var(--sub);
        }
        .data-value.alarm .data-number {
            color: var(--alarm);
        }
        .alarm-mark {
            color: var(--alarm);
            font-size: 18px;
            font-weight: bold;
            margin-left: 4px;
        }

        /* ===== 报警状态 ===== */
        .alarm-status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        .alarm-status.normal {
            background: #E8F5E9;
            color: var(--ok);
        }
        .alarm-status.warning {
            background: #FFEBEE;
            color: var(--alarm);
        }
        .alarm-item {
            display: inline-block;
            padding: 4px 12px;
            background: var(--alarm);
            color: #fff;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px;
        }

        /* ===== 按钮 ===== */
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 100px;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-danger {
            background: var(--alarm);
            color: #fff;
        }
        .btn-success {
            background: var(--ok);
            color: #fff;
        }
        .btn-secondary {
            background: #9E9E9E;
            color: #fff;
        }
        .btn-outline {
            background: #fff;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        /* ===== 阈值设置 ===== */
        .threshold-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .threshold-input {
            width: 80px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .threshold-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-small {
            width: 60px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        /* ===== 模式切换 ===== */
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .mode-btn {
            flex: 1;
            height: 44px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            background: #fff;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--primary);
            color: #fff;
        }

        /* ===== 日志 ===== */
        .log-wrap {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: var(--sub);
        }
        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .log-wrap.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        /* ===== 蓝牙连接 ===== */
        .bt-connect-btn {
            width: 100%;
            height: 48px;
            margin-top: 8px;
        }
        .bt-debug {
            font-size: 12px;
            color: var(--sub);
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- 状态栏 -->
    <div class="card status-bar">
        <div class="status-item">
            <span class="status-dot" id="btDot"></span>
            <span>蓝牙：<span id="btStatus">未连接</span></span>
        </div>
        <div class="status-item">
            <span id="modeDisplay">模式：--</span>
        </div>
    </div>

    <!-- 实时数据卡 -->
    <div class="card">
        <div class="card-title">实时数据</div>
        <div class="data-row">
            <span class="data-label">光照值</span>
            <div class="data-value" id="lightValue">
                <span class="data-number" id="light">--</span>
                <span class="data-unit">Lux</span>
                <span class="alarm-mark" id="lightAlarm"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">坐姿距离</span>
            <div class="data-value" id="distValue">
                <span class="data-number" id="dist">--</span>
                <span class="data-unit">cm</span>
                <span class="alarm-mark" id="distAlarm"></span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">LED 亮度</span>
            <div class="data-value">
                <span class="data-number" id="brightness">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
    </div>

    <!-- 报警状态卡 -->
    <div class="card" id="alarmCard">
        <div class="card-title">报警状态</div>
        <div class="alarm-status normal" id="alarmStatus">
            运行正常 ✓
        </div>
    </div>

    <!-- 蓝牙连接卡 -->
    <div class="card">
        <div class="card-title">蓝牙连接</div>
        <button class="btn btn-primary bt-connect-btn" id="btConnectBtn" onclick="connectBluetooth()">
            连接蓝牙设备
        </button>
        <div class="bt-debug" id="btDebug">点击连接 JDY-31 蓝牙模块</div>
    </div>

    <!-- 控制卡 -->
    <div class="card">
        <div class="card-title">控制操作</div>
        <div class="btn-row">
            <button class="btn btn-danger" onclick="sendClearAlarm()">消警</button>
        </div>
        <div class="mode-switch">
            <button class="mode-btn" id="autoBtn" onclick="switchAuto()">AUTO</button>
            <button class="mode-btn" id="manualBtn" onclick="switchManual()">MANUAL</button>
        </div>
    </div>

    <!-- 阈值显示卡（只读） -->
    <div class="card">
        <div class="card-title">当前阈值（下位机上报）</div>
        <div class="data-row">
            <span class="data-label">光照阈值</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="luxThresholdDisplay">--</span>
                <span class="data-unit">Lux</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">距离阈值</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="distThresholdDisplay">--</span>
                <span class="data-unit">cm</span>
            </div>
        </div>
        <div class="data-row">
            <span class="data-label">亮度上限</span>
            <div class="data-value">
                <span class="data-number" style="font-size:20px" id="brightnessLimitDisplay">--</span>
                <span class="data-unit">%</span>
            </div>
        </div>
    </div>

    <!-- 阈值设置卡 -->
    <div class="card">
        <div class="card-title">阈值设置</div>
        <div class="threshold-row">
            <span class="data-label">目标光照</span>
            <div>
                <input type="number" class="threshold-input" id="luxThresholdInput" value="80" min="0" max="100">
                <button class="btn-small" onclick="setLuxThreshold()">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="data-label">距离阈值</span>
            <div>
                <input type="number" class="threshold-input" id="distThresholdInput" value="30" min="10" max="200">
                <button class="btn-small" onclick="setDistThreshold()">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="data-label">亮度上限</span>
            <div>
                <input type="number" class="threshold-input" id="brightnessLimitInput" value="100" min="0" max="100">
                <button class="btn-small" onclick="setBrightnessLimit()">发送</button>
            </div>
        </div>
        <div class="threshold-row">
            <span class="data-label">手动亮度</span>
            <div>
                <input type="number" class="threshold-input" id="brightnessInput" value="50" min="0" max="100">
                <button class="btn-small" onclick="setBrightness()">发送</button>
            </div>
        </div>
    </div>

    <!-- 日志卡 -->
    <div class="card">
        <div class="log-header" onclick="toggleLog()">
            <div class="card-title" style="margin:0">系统日志</div>
            <span style="font-size:12px;color:var(--sub)">点击展开</span>
        </div>
        <div class="log-wrap collapsed" id="logWrap"></div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let isBluetoothConnected = false;
        let logs = [];
        let currentData = {
            light: null,
            dist: null,
            brightness: null,
            mode: null,
            luxThreshold: null,
            distThreshold: null,
            brightnessLimit: null
        };

        // 同步保护状态
        let waitingSync = {
            lux: false,
            dist: false,
            limit: false,
            brightness: false
        };
        let pendingValue = {
            lux: null,
            dist: null,
            limit: null,
            brightness: null
        };

        // 防抖保护
        let lastUserSetTime = {
            lux: 0,
            dist: 0,
            limit: 0,
            brightness: 0
        };

        const DEBOUNCE_MS = 500;
        const SYNC_TIMEOUT_MS = 5000;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            addLog('系统初始化完成');
            checkBluetoothBridge();
        });

        function checkBluetoothBridge() {
            if (window.BluetoothBridge) {
                addLog('检测到 Android BluetoothBridge');
                document.getElementById('btDebug').textContent = '已检测到蓝牙接口，点击连接';
            } else {
                addLog('未检测到 BluetoothBridge（非 Android 环境）');
                document.getElementById('btDebug').textContent = '请在 Android APP 中打开此页面';
            }
        }

        // ==================== 蓝牙连接 ====================
        function connectBluetooth() {
            if (isBluetoothConnected) {
                disconnectBluetooth();
                return;
            }

            addLog('正在扫描蓝牙设备...');
            document.getElementById('btDebug').textContent = '正在扫描设备...';

            if (window.BluetoothBridge) {
                window.BluetoothBridge.getPairedDevices();
            } else {
                addLog('未检测到 BluetoothBridge');
                document.getElementById('btDebug').textContent = '蓝牙接口不可用';
            }
        }

        function disconnectBluetooth() {
            if (window.BluetoothBridge) {
                window.BluetoothBridge.disconnect();
            }
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
            document.getElementById('btDebug').textContent = '已断开连接';
            addLog('蓝牙已断开');
        }

        function updateBluetoothStatus(connected) {
            const dot = document.getElementById('btDot');
            const text = document.getElementById('btStatus');
            const btn = document.getElementById('btConnectBtn');
            if (connected) {
                dot.className = 'status-dot bluetooth';
                text.textContent = '已连接';
                btn.textContent = '断开蓝牙';
                btn.className = 'btn btn-secondary bt-connect-btn';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = '未连接';
                btn.textContent = '连接蓝牙设备';
                btn.className = 'btn btn-primary bt-connect-btn';
            }
        }

        // ==================== 解析上行数据 ====================
        // 格式：光照值,距离值,LED亮度,SYSTEM_MODE,光照阈值,距离阈值,亮度上限
        // 示例：1024,45,600,AUTO,500,30,1000
        function parseMessage(message) {
            const parts = message.split(',');
            if (parts.length < 7) {
                addLog('数据格式错误：' + message);
                return;
            }

            const now = Date.now();
            const newData = {
                light: parseInt(parts[0]) || 0,
                dist: parseInt(parts[1]) || 0,
                brightness: parseInt(parts[2]) || 0,
                mode: parts[3] || 'AUTO',
                luxThreshold: parseInt(parts[4]) || 500,
                distThreshold: parseInt(parts[5]) || 30,
                brightnessLimit: parseInt(parts[6]) || 1000
            };

            // 传感器值始终更新
            currentData.light = newData.light;
            currentData.dist = newData.dist;
            currentData.brightness = newData.brightness;
            currentData.mode = newData.mode;

            // 检查同步确认
            checkSyncConfirmation(newData);

            // 阈值更新（三重保护）
            updateThresholdsWithProtection(newData, now);

            updateUI();
            checkAlarms();
            addLog('收到：' + message);
        }

        function checkSyncConfirmation(newData) {
            for (const [key, isWaiting] of Object.entries(waitingSync)) {
                if (isWaiting && pendingValue[key] !== null) {
                    const expectedValue = pendingValue[key];
                    const receivedValue = newData[getThresholdKey(key)];

                    if (Math.abs(receivedValue - expectedValue) < 1) {
                        addLog(`同步确认：${key} = ${receivedValue}`);
                        waitingSync[key] = false;
                        pendingValue[key] = null;
                        lastUserSetTime[key] = 0;
                    }
                }
            }
        }

        function getThresholdKey(shortKey) {
            const map = {
                'lux': 'luxThreshold',
                'dist': 'distThreshold',
                'limit': 'brightnessLimit',
                'brightness': 'brightness'
            };
            return map[shortKey] || shortKey;
        }

        function updateThresholdsWithProtection(newData, now) {
            // 光照阈值
            if (!lastUserSetTime.lux || (now - lastUserSetTime.lux) >= DEBOUNCE_MS) {
                if (!waitingSync.lux) {
                    currentData.luxThreshold = newData.luxThreshold;
                }
            }
            // 距离阈值
            if (!lastUserSetTime.dist || (now - lastUserSetTime.dist) >= DEBOUNCE_MS) {
                if (!waitingSync.dist) {
                    currentData.distThreshold = newData.distThreshold;
                }
            }
            // 亮度上限
            if (!lastUserSetTime.limit || (now - lastUserSetTime.limit) >= DEBOUNCE_MS) {
                if (!waitingSync.limit) {
                    currentData.brightnessLimit = newData.brightnessLimit;
                }
            }
        }

        // ==================== 更新 UI ====================
        function updateUI() {
            // 光照值
            if (currentData.light !== null) {
                document.getElementById('light').textContent = currentData.light;
            }
            // 距离值
            if (currentData.dist !== null) {
                document.getElementById('dist').textContent = currentData.dist;
            }
            // 亮度（STM32 已发送百分比 0-100，直接显示）
            if (currentData.brightness !== null) {
                document.getElementById('brightness').textContent = currentData.brightness;
            }
            // 模式显示
            if (currentData.mode !== null) {
                document.getElementById('modeDisplay').textContent = '模式：' + currentData.mode;
                updateModeButtons(currentData.mode);
            }

            // 阈值显示（等待期间显示预测值）
            if (currentData.luxThreshold !== null) {
                document.getElementById('luxThresholdDisplay').textContent =
                    waitingSync.lux ? pendingValue.lux : currentData.luxThreshold;
            }
            if (currentData.distThreshold !== null) {
                document.getElementById('distThresholdDisplay').textContent =
                    waitingSync.dist ? pendingValue.dist : currentData.distThreshold;
            }
            if (currentData.brightnessLimit !== null) {
                document.getElementById('brightnessLimitDisplay').textContent =
                    waitingSync.limit ? pendingValue.limit : currentData.brightnessLimit;
            }
        }

        function updateModeButtons(mode) {
            const autoBtn = document.getElementById('autoBtn');
            const manualBtn = document.getElementById('manualBtn');
            if (mode === 'AUTO') {
                autoBtn.classList.add('active');
                manualBtn.classList.remove('active');
            } else if (mode === 'MANUAL') {
                autoBtn.classList.remove('active');
                manualBtn.classList.add('active');
            }
        }

        // ==================== 报警判断 ====================
        function checkAlarms() {
            const alarms = [];

            // 使用预测值或当前值
            const luxThr = waitingSync.lux ? pendingValue.lux : currentData.luxThreshold;
            const distThr = waitingSync.dist ? pendingValue.dist : currentData.distThreshold;

            // 光照低于阈值
            if (currentData.light !== null && luxThr !== null && currentData.light < luxThr) {
                alarms.push('光照不足');
                document.getElementById('lightAlarm').textContent = '!';
                document.getElementById('lightValue').classList.add('alarm');
            } else {
                document.getElementById('lightAlarm').textContent = '';
                document.getElementById('lightValue').classList.remove('alarm');
            }

            // 距离低于阈值（坐姿过近）
            if (currentData.dist !== null && distThr !== null && currentData.dist < distThr) {
                alarms.push('坐姿过近');
                document.getElementById('distAlarm').textContent = '!';
                document.getElementById('distValue').classList.add('alarm');
            } else {
                document.getElementById('distAlarm').textContent = '';
                document.getElementById('distValue').classList.remove('alarm');
            }

            // 更新报警状态卡
            const alarmStatus = document.getElementById('alarmStatus');
            if (alarms.length === 0) {
                alarmStatus.className = 'alarm-status normal';
                alarmStatus.innerHTML = '运行正常 ✓';
            } else {
                alarmStatus.className = 'alarm-status warning';
                alarmStatus.innerHTML = alarms.map(a => `<span class="alarm-item">${a}</span>`).join('');
                // 通知 Android 原生
                sendAlarmToNative({ alarms: alarms, light: currentData.light, dist: currentData.dist });
            }
        }

        // ==================== 发送指令 ====================
        function sendCmd(cmd) {
            if (window.BluetoothBridge && isBluetoothConnected) {
                window.BluetoothBridge.send(cmd);
                addLog('发送指令：' + cmd);
            } else {
                addLog('蓝牙未连接，无法发送指令');
            }
        }

        function sendClearAlarm() {
            sendCmd('01');
        }

        function switchAuto() {
            sendCmd('06');
            // 乐观更新
            currentData.mode = 'AUTO';
            updateUI();
        }

        function switchManual() {
            sendCmd('07');
            // 乐观更新
            currentData.mode = 'MANUAL';
            updateUI();
        }

        // ==================== 阈值设置（带同步保护） ====================
        function setThreshold(type, cmdCode, inputId, minVal, maxVal) {
            const val = document.getElementById(inputId).value;
            if (!val || val < minVal || val > maxVal) {
                alert(`请输入有效值 (${minVal}-${maxVal})`);
                return;
            }

            const numValue = parseInt(val);

            // 检查是否正在等待同步
            if (waitingSync[type]) {
                addLog(`正在等待 ${type} 同步确认`);
                return;
            }

            // 1. 设置等待同步状态
            waitingSync[type] = true;
            pendingValue[type] = numValue;

            // 2. 发送指令
            sendCmd(`${cmdCode},${numValue}`);

            // 3. 记录用户操作时间
            lastUserSetTime[type] = Date.now();

            // 4. 立即更新显示（预测状态）
            currentData[getThresholdKey(type)] = numValue;
            updateUI();

            // 5. 立即检查报警
            checkAlarms();

            // 6. 设置超时保护
            setTimeout(() => {
                if (waitingSync[type]) {
                    addLog(`${type} 同步超时，释放保护`);
                    waitingSync[type] = false;
                    pendingValue[type] = null;
                }
            }, SYNC_TIMEOUT_MS);
        }

        function setLuxThreshold() {
            setThreshold('lux', '02', 'luxThresholdInput', 0, 100);
        }

        function setDistThreshold() {
            setThreshold('dist', '03', 'distThresholdInput', 0, 200);
        }

        function setBrightnessLimit() {
            setThreshold('limit', '04', 'brightnessLimitInput', 0, 100);
        }

        function setBrightness() {
            if (currentData.mode !== 'MANUAL') {
                alert('手动亮度设置仅在 MANUAL 模式下生效');
                return;
            }
            setThreshold('brightness', '05', 'brightnessInput', 0, 100);
        }

        // ==================== 日志 ====================
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            logs.unshift(`[${timestamp}] ${message}`);
            if (logs.length > 50) logs.pop();
            renderLogs();
        }

        function renderLogs() {
            const wrap = document.getElementById('logWrap');
            wrap.innerHTML = logs.map(log => `<div class="log-item">${escapeHtml(log)}</div>`).join('');
        }

        function toggleLog() {
            const wrap = document.getElementById('logWrap');
            wrap.classList.toggle('collapsed');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==================== Android 回调函数 ====================
        // 扫描到设备列表
        window.onBtDeviceList = function(deviceArray) {
            addLog('扫描到 ' + deviceArray.length + ' 个设备');
            // 自动连接 JDY 开头的设备
            const target = deviceArray.find(d => d.name && d.name.includes('JDY'));
            if (target) {
                addLog('发现 JDY-31：' + target.name);
                if (window.BluetoothBridge) {
                    window.BluetoothBridge.connect(target.address);
                }
            } else if (deviceArray.length > 0) {
                // 没有 JDY，连接第一个
                addLog('连接第一个设备：' + deviceArray[0].name);
                if (window.BluetoothBridge) {
                    window.BluetoothBridge.connect(deviceArray[0].address);
                }
            }
        };

        // 连接成功
        window.onBtConnected = function(address) {
            isBluetoothConnected = true;
            updateBluetoothStatus(true);
            document.getElementById('btDebug').textContent = '已连接：' + address;
            addLog('蓝牙连接成功：' + address);
        };

        // 断开连接
        window.onBtDisconnected = function() {
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
            document.getElementById('btDebug').textContent = '已断开连接';
            addLog('蓝牙已断开');
        };

        // 错误通知
        window.onBtError = function(errMsg) {
            addLog('蓝牙错误：' + errMsg);
            isBluetoothConnected = false;
            updateBluetoothStatus(false);
            document.getElementById('btDebug').textContent = '错误：' + errMsg;
        };

        // 接收数据（透传）
        window.onBtData = function(line) {
            parseMessage(line);
        };

        // ==================== 报警通知（Android WebView） ====================
        function sendAlarmToNative(data) {
            if (window.Android) {
                window.Android.onAlarm(JSON.stringify(data));
            } else if (window.Notification && Notification.permission === 'granted') {
                new Notification('告警', { body: JSON.stringify(data) });
            }
        }
    </script>
</body>
</html>
